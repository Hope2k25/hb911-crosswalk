19(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1211.1", "stat": "R.S. 13:1211.1", "title": "Clerk; election; term of office", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1211.1", "\u00a71211.1. \u00a0Clerk; election; term of office", "There shall be one clerk of the Civil District Court for the parish of Orleans, who shall be elected by the qualified electors of Orleans Parish. \u00a0He shall be elected at the election for parochial and municipal officers in Orleans Parish, shall serve for a term of four years, and shall take office and begin his term on the first Monday in May following election.", "Added by Acts 1975, No. 63, \u00a73. \u00a0Amended by Acts 1981, No. 122, \u00a71; Acts 2006, No. 621, \u00a719(B), eff.when the clerk of the 41st JDC takes office; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1211", "stat": "R.S. 13:1211", "title": "Qualifications; duties; bond; fees; deputies", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1211", "SUBPART C. \u00a0CLERK", "\u00a71211. \u00a0Qualifications; duties; bond; collection of fees; deputies; minute clerks", "The qualifications and duties of the clerk of civil district court shall be as now fixed by law. \u00a0He shall furnish bond in the sum of twenty thousand dollars, which shall be examined by the court, and all testimony given in the examination shall be reduced to writing and filed of record in the court. \u00a0He shall charge and collect the fees prescribed by the legislature until superseded by those fixed by the court. \u00a0The clerk is authorized, with the approval of the judges of the civil district court, to appoint deputies and other assistants; and he may remove them at pleasure, or the court may remove them. \u00a0Each judge of the civil district court shall appoint one minute clerk, who shall be sworn as deputy clerk, and shall receive a salary as the court en banc may fix. \u00a0When directed by the court, a minute clerk shall administer the oath required by law of all witnesses and jurors.", "Amended by Acts 1977, No. 44, \u00a71; Acts 2006, No. 621, \u00a719(B), eff. when the clerk of the 41st JDC takes office; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1212.1", "stat": "R.S. 13:1212.1", "title": "Expenses", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1212.1", "\u00a71212.1. \u00a0Expenses", "NOTE: \u00a0Repealed by Acts 2006, No. 621, \u00a719(B), eff. when the clerk of the 41st JDC takes office.", "In addition to his salary, the clerk of the Civil District Court for the Parish of Orleans, shall receive a sum not to exceed ten percent of his annual salary as an expense allowance. \u00a0This allowance shall be payable out of the judicial expense fund upon the warrant of the clerk of the civil district court.", "Added by Acts 1975, No. 416, \u00a71; Acts 2006, No. 621, \u00a719(B), eff.when the clerk of the 41st JDC takes office.", "NOTE: \u00a0Acts 2006, No. 621, which created the 41st J.D.C., provided for an effective date of Jan. 1, 2009; Acts 2008, No. 873, extended the effective date to Dec. 31, 2014."]}, {"id": "RS_13-1212", "stat": "R.S. 13:1212", "title": "Salary", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1212", "\u00a71212. \u00a0Salary", "NOTE: \u00a0Repealed by Acts 2006, No. 621, \u00a719(B), eff.when the clerk of the 41st JDC takes office.", "A. \u00a0The clerk of the civil district court shall receive a salary as established in R.S. 13:782(A) based on the applicable population of the parish according to the latest United States census which shall be payable out of the judicial expense fund beginning with Fiscal Year 1997-1998 and each fiscal year thereafter. In addition to this amount, the clerk of the civil district court shall receive a salary of ten thousand dollars which shall be payable by the state.", "B.(1) \u00a0The Louisiana Clerks of Court Certification program, as established pursuant to R.S 13:782(I) and (J), shall apply to the clerk of the Civil District Court for the parish of Orleans.", "(2) \u00a0In addition to those persons eligible pursuant to R.S. 13:782(I)(3) and 1371.1(B)(2), the person holding the office of clerk of the Civil District Court for the parish of Orleans shall be eligible for participation in the clerks of court certification program.", "(3) \u00a0The requisite education and training will be provided as set forth in R.S. 13:782(I)(4).", "(4) \u00a0The clerks of court certification program committee, as created pursuant to R.S. 13:782(J) to govern the certification program, shall also apply to the clerk of the Civil District Court for the parish of Orleans.", "(5) \u00a0Documents showing the successful completion of the certification program shall be submitted to and approved by the certification committee. \u00a0Upon approval of the application for certification, a person holding the office of clerk of the Civil District Court for the parish of Orleans shall receive the designation of Certified Clerk of Court (CCC) and notice of the approval shall be forwarded to the legislative auditor by the certification committee.", "(6) \u00a0If, on July 1, 1997, a clerk has completed the educational and experience requirements as provided in R.S. 13:782(I)(4) and the documents showing the successful completion of the program have been submitted to and approved by the certification committee and notice of the approval has been forwarded to the legislative auditor, the clerk shall be granted a seven percent increase in compensation to his annual salary as set forth in Subsection A of this Section, which seven percent increase in compensation to his annual salary shall be payable out of the judicial expense fund.", "(7) \u00a0A clerk shall complete the requirements of R.S. 13:782(I)(4) in order to receive and retain the seven percent compensation enhancement. \u00a0If a clerk does not complete the certification program as provided in R.S. 13:782(I) and (J), or if after certification a clerk does not receive certification renewal within each four-year period, his salary shall revert back to the salary scale provided for in Subsection A of this Section.", "Added by Acts 1950, No. 365, \u00a71. \u00a0Amended by Acts 1962, No. 360, \u00a71; Acts 1972, No. 633, \u00a71, eff. Jan. 1, 1974; Acts 1979, No. 211, \u00a71; Acts 1997, No. 470, \u00a71; Acts 1999, No. 1216, \u00a71; Acts 2006, No. 621, \u00a719(B), eff. when the clerk of the 41st JDC takes office.", "NOTE: \u00a0Acts 2006, No. 621, which created the 41st J.D.C., provided for an effective date of Jan. 1, 2009; Acts 2008, No. 873, extended the effective date to Dec. 31, 2014."]}, {"id": "RS_13-1271", "stat": "R.S. 13:1271", "title": "Judges to appoint court reporters", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1271", "SUBPART D. \u00a0COURT REPORTERS", "\u00a71271. \u00a0Judges to appoint court reporters", "Each judge of the civil district court may appoint a qualified stenographer to serve as court reporter in his division. \u00a0All court reporters so appointed shall serve at the pleasure of the judges appointing them and may be assigned to the various divisions of the court as the judges appointing them may direct. \u00a0The judges of the civil district court, sitting en banc, may appoint additional qualified stenographers as they may deem necessary who shall serve at the pleasure of the court en banc and may be assigned to the various divisions of the court as the court en banc may direct.", "Amended by Acts 1950, No. 366, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1272", "stat": "R.S. 13:1272", "title": "Duties; salary", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1272", "\u00a71272. \u00a0Duties; salary", "Each court reporter shall attend the sessions of the division to which he is assigned and, subject to the orders of the presiding judge of such division, shall take down stenographically the testimony offered therein, and such other matters as may be directed by the presiding judge of such division. \u00a0Each court reporter shall receive such compensation as shall be fixed by the judges of the court, payable out of the judicial expense fund.", "Amended by Acts 1950, No. 366, \u00a72; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1273", "stat": "R.S. 13:1273", "title": "Transcription of testimony; fees", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1273", "\u00a71273. \u00a0Transcription of testimony; fees", "The court reporter, at the request of the parties to any proceeding or any of them, or at the direction of the presiding judge, shall transcribe prior to the submission of the case, all or part of the testimony or other matter so taken down, and furnish as many copies thereof as may be required by law for the purposes of appeal. \u00a0The party requesting such transcription shall pay into the judicial expense fund a fee of ten cents for each one hundred words transcribed. \u00a0In the event both parties or the judge should direct the transcription, each party shall pay the expense of transcribing the testimony offered by him. \u00a0No transcribed testimony shall be filed until the transcription fee shall have been paid; but no fees shall be allowed for transcribing matter other than testimony and notes of evidence. \u00a0Such fees, when collected by the clerk, shall be paid by him as additional compensation to the court reporter performing the service in the same manner as the court reporter's salary is paid, and shall be taxed as costs.", "Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1274", "stat": "R.S. 13:1274", "title": "Transcription for purpose of appeal", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1274", "\u00a71274. \u00a0Transcription for purpose of appeal", "In case the transcription of the court reporter's notes shall be requested by a litigant, after judgment, for the purposes of an appeal, the whole cost of such transcription shall be paid primarily by such party, but ultimately shall be taxed as costs.", "Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1275", "stat": "R.S. 13:1275", "title": "Failure to pay cost or file testimony", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1275", "\u00a71275. \u00a0Failure to pay cost or file testimony", "If the court should direct the transcription of the notes of testimony, and if any party refuses or fails to pay his share of the cost of such transcription, or to file such transcribed testimony within a reasonable time to be fixed by the court, the case shall be decided as if the testimony of that party, not transcribed or filed, had not been offered.", "Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1276", "stat": "R.S. 13:1276", "title": "Preservation of notes", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1276", "\u00a71276. \u00a0Preservation of notes", "The court reporters shall preserve their notes in each cause for the period of one year from the date of submission thereof.", "Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1277", "stat": "R.S. 13:1277", "title": "Supplies", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1277", "\u00a71277. \u00a0Supplies", "The clerk of the court shall furnish the court reporters with the supplies which they may need for the transcription of their notes.", "Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1278", "stat": "R.S. 13:1278", "title": "Illness, disability, or absence", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1278", "\u00a71278. \u00a0Illness, disability, or absence", "In the case of the illness, disability, or absence of any court reporter, the judges of the court may assign another court reporter to perform the duties of the court reporter who is ill, has a disability, or is absent. \u00a0The judges of the court may appoint a qualified person to serve temporarily as a court reporter during such period of illness, disability, or absence. \u00a0The person so appointed court reporter to serve temporarily shall receive the compensation and fees provided in R.S. 13:1272 and 1273.", "Amended by Acts 1950, No. 366, \u00a73; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2); Acts 2014, No. 811, \u00a75, eff. June 23, 2014."]}, {"id": "RS_13-1279", "stat": "R.S. 13:1279", "title": "Suits in forma pauperis not affected", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1279", "\u00a71279. \u00a0Suits in forma pauperis not affected", "Nothing in R.S. 13:1273 to 13:1278 shall be construed to repeal or otherwise affect the provisions of any law providing for the institution and prosecution of suits in forma pauperis.", "Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1301", "stat": "R.S. 13:1301", "title": "Sessions of court", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1301", "SUBPART E. \u00a0MISCELLANEOUS PROVISIONS", "\u00a71301. \u00a0Sessions of court", "The civil district court shall hold continuous sessions during nine-and-a-half months of the year. \u00a0The court shall remain open on all legal days during the whole year for granting interlocutory orders, issuing all writs, trial of rules to quash writs, trial of proceedings instituted by a landlord for the possession of leased property, trial of partition proceedings, and for such probate and insolvency business as the court en banc may determine by rule.", "Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1302", "stat": "R.S. 13:1302", "title": "Criers", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1302", "\u00a71302. \u00a0Criers", "The judge of each division of the civil district court shall appoint a crier for his division who shall be commissioned by the civil sheriff as a deputy sheriff, and who shall perform such duties as may be provided by law and the rules of the court. \u00a0When directed by the court, the crier shall administer the oath required by law of all witnesses and jurors. \u00a0Each crier shall receive a compensation as the court en banc may fix which in any event shall not be less than three hundred dollars per month, payable out of the judicial expense fund of the parish of Orleans on the warrant of the judge of the division in which the crier serves. \u00a0In addition to the compensation payable to each crier from any source whatsoever, each crier shall receive additional compensation of one hundred dollars per month payable by the city of New Orleans, plus additional compensation of two hundred dollars per month payable by the city of New Orleans when and if funds are made available therefor.", "Amended by Acts 1960, No. 588, \u00a71; Acts 1972, No. 608, \u00a71; Acts 1977, No. 44, \u00a72; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1303", "stat": "R.S. 13:1303", "title": "Order of trial of cases", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1303", "\u00a71303. \u00a0Order of trial of cases", "The judges of the civil district court by rule shall prescribe the order of preference for the trial of all cases filed therein.", "Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1304", "stat": "R.S. 13:1304", "title": "Divisions of court", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1304", "\u00a71304. \u00a0Divisions of court", "A. \u00a0The civil district court shall be divided into seven divisions, known as division A, division B, division C, division D, division E, division F and division G. \u00a0Each of these divisions shall be presided over by a judge of the court. \u00a0Any candidate for election to the office of judge of this court must designate the division for which he is a candidate, and, if elected, shall succeed to the office of judge of the division for which he was a candidate. \u00a0The judge oldest in continuous service in the civil district court shall preside, and in the event two or more judges shall have served the same length of time, the judge oldest in years shall preside.", "B. \u00a0The criminal district court shall be divided into six sections, known as section A, section B, section C, section D, section E, and section F. \u00a0Each of these sections shall be presided over by a judge of this court. \u00a0Any candidate for election to the office of judge of this court must designate the section for which he is a candidate, and, if elected, shall succeed to the office of judge of the section for which he was a candidate. \u00a0The judge oldest in continuous service in the criminal district court shall preside, and in the event two or more judges shall have served the same length of time, the judge oldest in years shall preside. \u00a0The judges may agree among themselves as to which section may occupy any particular courtroom.", "Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1305", "stat": "R.S. 13:1305", "title": "Judicial depository", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1305", "\u00a71305. \u00a0Judicial depository", "A. \u00a0The judges of the Civil District Court for the Parish of Orleans, sitting en banc, a majority of said judges constituting a quorum, shall, by a vote of a majority of those present, designate a solvent bank, or banks, located within the parish of Orleans, as the fiscal agent or agents, as a depository of any and all monies received by the clerk of the said Civil District Court for the Parish of Orleans deposited in the \"Registry of the Court\". \u00a0The said funds shall be so deposited and held subject to the orders of the court, and in accordance with all laws or parts of laws now or hereafter enacted governing any such funds so held and deposited.", "B. \u00a0The bank or banks so designated as fiscal agent for such funds shall furnish adequate security, satisfactory to the said judges, to secure the return and payment of any such deposited funds.", "C. \u00a0It shall be the duty of the judges to endeavor to receive interest on all monies so deposited, and if, for any reason, the fiscal agent, or agents, so designated are unable or unwilling to pay interest on such deposit, the judges of the said Civil District Court are hereby authorized to purchase certificates of deposit, and/or other forms of certificates of indebtedness bearing interest, or they may purchase short-term United States bonds, treasury notes or certificates.", "D. \u00a0Any and all interest received on all such monies so deposited, or from any certificates of deposit, certificates of indebtedness, or United States bonds, treasury notes or certificates, shall be distributed in the following manner:", "(1) \u00a0One-half of all interest so received, as received, shall be transferred to and shall form part of the Judicial Expense Fund, in reimbursement and payment for the services rendered in administering said \"Registry of the Court\" fund by the judges, clerk and other employees whose salaries are paid out of said Judicial Expense Fund.", "(2) \u00a0The ultimate recipient of any of said funds so deposited in the registry of the court shall receive interest on such sum received by him, to be calculated on the following basis, to wit:", "(a) \u00a0The rate of interest per annum to be paid such recipient shall be one-half of the average interest rate received from the fiscal agent and/or from certificates of deposit, certificates of indebtedness, United States government bonds, treasury notes or certificates, during the period that the funds being disbursed were on deposit in the registry of the court.", "(b) \u00a0Interest shall be paid such recipient on the same percentage of such sum he receives as the total amount of such registry funds invested with interest bears to the total of such funds held in the registry of the court during the preceding year.", "(c) \u00a0In determining the amount of such registry funds invested with interest, and the total of such funds held in the registry of the court, as provided in the preceding Subparagraph (b), the basis for such determination shall be the average daily balance of the total funds invested and the average daily balances of the total funds held in the registry of the court fund during the period that the funds being disbursed were on deposit in the said registry of the court fund.", "E. \u00a0In the event it becomes necessary to disburse funds which have been deposited in the registry of the court fund, in accordance with a duly rendered court order, in excess of the amount held by the fiscal agent of said fund, in its noninterest bearing account, the clerk of court and/or the presiding judge or the acting presiding judge of the Civil District Court, on an order issued by the majority of the judges of the Civil District Court, sitting en banc, shall have the authority, and they are hereby authorized and empowered to borrow such funds so needed for disbursal from the said fiscal agent, or others, at the then prevailing interest rate for loans of this character, using as collateral to secure any such loan an amount of bonds, or certificates of deposit, or certificates of indebtedness in which said funds have been invested, and, if required so to do by any such lending agency, to execute any note or other form of agreement to repay such loan.", "Amended by Acts 1969, No. 160, \u00a71; Acts 1970, No. 200, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1306", "stat": "R.S. 13:1306", "title": "Interest on unclaimed judicial deposits", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1306", "\u00a71306. \u00a0Interest on unclaimed judicial deposits; use by sheriff", "Where interest, which has accrued on any judicial deposit made by the sheriff of the parish of Orleans with the judicial depository of the parish of Orleans, of funds belonging to a litigant or litigants, shall not be called for or claimed for a period of ten years from date of accrual, the sheriff of the parish of Orleans may withdraw the accrued interest from the judicial depository, and use it for the costs and expenses of his office, in the manner provided by law for the use and disposition of other funds received by him for that purpose.", "Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a7\u00a72 and 4(B)(2)."]}, {"id": "RS_13-1307", "stat": "R.S. 13:1307", "title": "Judicial depository turns interest to sheriff", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1307", "\u00a71307. \u00a0Same; judicial depository to turn interest over to sheriff", "The judicial depository of the parish of Orleans is directed to turn over to the \u00a0sheriff of the parish of Orleans any accrued interest on any judicial deposit made by him, under the conditions prescribed in R.S. 13:1306.", "Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a7\u00a72 and 4(B)(2)."]}, {"id": "RS_13-1308", "stat": "R.S. 13:1308", "title": "Registry of court", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1308", "\u00a71308. \u00a0Registry of court", "The sheriffs, clerks or other officers of the civil district court of the parish of Orleans shall deposit with the judicial depository, selected by the court, all moneys, notes, bonds or securities, except such notes or documents as may be filed with suits or in evidence, which shall be kept by the clerk of the court, coming into their hands, and make written return thereof, within forty-eight hours after the same has been received by such officer or officers.", "Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1309", "stat": "R.S. 13:1309", "title": "Failure to make deposit and return; penalty", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1309", "\u00a71309. \u00a0Same; failure to make deposit and return; penalty", "Any sheriff, clerk or officer failing to make the deposit and written return as provided in R.S. 13:1308 shall be imprisoned not more than six months and fined not more than five hundred dollars.", "Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1310", "stat": "R.S. 13:1310", "title": "Deposit of unclaimed funds in court registry", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1310", "\u00a71310. \u00a0Deposit of unclaimed funds in court registry; procedure; use of funds", "The clerk of the civil district court for the parish of Orleans shall deposit into the treasury of the city of New Orleans all unclaimed funds which have been deposited in the registry of the court for seven years or more and whose owners are unknown, or whose owners' whereabouts are unknown, and have not been heard from for a period of seven years or more.", "(1) \u00a0The said funds shall be withdrawn and deposited as herein provided only after the clerk of the civil district court for the parish of Orleans has filed in the proceeding wherein the funds are being held a rule stating:", "(a) \u00a0That the funds have been deposited in the registry of the court for a period of more than seven years, and", "(b) \u00a0That no claim has been filed for said funds, and", "(c) \u00a0That the owners of said funds are unknown, or the owners' whereabouts are unknown, and have not been heard from for seven years or more, and has obtained an order of the judge of the civil district court for the parish of Orleans, seized with jurisdiction in the matter, authorizing the withdrawal and deposit of the funds in the manner provided for by this section.", "(2) \u00a0Upon the deposit of the funds into the treasury of the city of New Orleans in the manner provided by this section, and the filing of a receipt in the court record, the clerk of the civil district court for the parish of Orleans shall be relieved of all liability therefor and the city of New Orleans shall be responsible therefor.", "(3) \u00a0The clerk of civil district court for the parish of Orleans shall also deposit into the treasury of the city of New Orleans the so-called \"interest fund\" now being carried in the judicial depository of the civil district court for the parish of Orleans. \u00a0The said \"interest fund\" shall be withdrawn and deposited upon a rule brought in separate proceedings before the presiding judge of the civil district court for the parish of Orleans, who shall upon a showing that no claim for said \"interest fund\" has been made for seven years or more, direct the deposit of the said \"interest fund\" into the treasury of the city of New Orleans. \u00a0Upon the deposit of the said \"interest fund\" into the treasury of the city of New Orleans, and the filing of a receipt in the proceedings, the clerk of the civil district court shall be relieved of all liability therefor, and the city of New Orleans shall be responsible therefor.", "(4) \u00a0The city of New Orleans shall have the use of all funds so deposited and is hereby authorized to invest the same in time certificates of fiscal agent banks, or in short-term United States bonds, treasury notes, or certificates; all interest or income received on such investments shall belong exclusively to the city of New Orleans and may be used by it for general fund purposes, and no person, firm or corporation shall have any claim to any portion of such interest or income received by the city of New Orleans on said investments.", "Added by Acts 1960, No. 113, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1311", "stat": "R.S. 13:1311", "title": "Sheriff, constables, deputies; powers", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1311", "\u00a71311. Sheriff, constables, and deputies; powers of peace officers; exemption from liability", "A. The sheriff for the parish of Orleans and his deputies are hereby granted the powers of peace officers when carrying out the duties of the court, and are authorized to require incarceration of the subject involved in any of the city, parish or state prisons, precinct stations, or houses of detention in the parish of Orleans. They shall be exempt from liability for their actions in the exercise of this power in the same manner and fashion as liability is excluded generally for peace officers of this state and political subdivisions.", "B. The constables of the First and Second City Courts of New Orleans and their deputies are hereby granted the powers of peace officers when acting under the direction and control of the constables and when carrying out the duties of the court, and are authorized to require incarceration of the subject involved in any of the city, parish or state prisons, precinct stations, or houses of detention in the parish of Orleans. They shall be exempt from liability for their actions in the exercise of this power in the same manner and fashion as liability is excluded generally for peace officers of this state and political subdivisions.", "Acts 1964, No. 381, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a7\u00a72 and 4(B)(2); Acts 2015, No. 461, \u00a72, eff. July 1, 2015."]}, {"id": "RS_13-1312", "stat": "R.S. 13:1312", "title": "Judicial expense fund; sources, control", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1312", "\u00a71312. \u00a0Judicial expense fund; sources, control, and administration", "A. \u00a0The clerks of the First and Second City Court shall place all sums collected or received under this Section in a separate account to be designated as the Judicial Expense Fund for the Civil District Court for the Parish of Orleans. \u00a0The judges, en banc, of the Civil District Court for the Parish of Orleans and the First and Second City Courts of the city of New Orleans shall have control over the fund and all disbursements made therefrom. \u00a0They shall cause to be conducted annually an audit of the fund and the books and accounts relating thereto, and shall file the audit with the office of the legislative auditor where it shall be available for public inspection.", "B. \u00a0The judges of the Civil District Court for the Parish of Orleans and the First and Second City Courts of the city of New Orleans, sitting en banc, shall have control over the judicial expense fund for the parish of Orleans, accruing and accrued, and to this end shall fix and regulate from time to time the number of deputies and employees of the offices of the clerks of the City Courts and their expenses, and also shall have the power to fix the tariff of costs and charges to be paid for official services in the offices, which are paid into, and constitute the fund; due publication of which tariff, when made, shall be given. \u00a0They shall have power to determine whether any amounts from the fund shall be devoted to the expense or payment of taking testimony by shorthand and to regulate and provide for the same. \u00a0The judges are authorized to contribute out of the fund, to the embellishment, maintenance, improvement or repair, or both, of each courtroom, the courthouse itself or its furnishings, or both, and may contribute to any pension, retirement system and group hospitalization plans to which officers and employees paid out of the fund may belong.", "C. \u00a0The judges, en banc, may further appoint such secretarial, clerical, research, administrative, or other personnel as they deem necessary to expedite the business and function of the court and fix and pay all or any part of the salaries of such personnel out of the monies in the judicial expense fund. \u00a0In like manner, the judges, en banc, may utilize the monies in the judicial expense fund to pay all or any part of the cost of establishing or maintaining, or both, a law library for the court, or for buying or maintaining, or both, any type of equipment, supplies, or other items consistent with or germane to the efficient operation of the court. \u00a0In general, the judicial expense fund is established and may be used for any purpose or purposes connected with, incidental to, or related to the proper administration or function of the said court or the offices of the individual judges and is in addition to any and all other funds, salaries, expenses, or other monies that are now or hereafter provided, authorized, or established by law for any of the aforesaid purposes.", "D.(1) \u00a0The judges, en banc, may utilize the monies in the judicial expense fund to pay all or any part of the cost of planning, designing, and constructing a new courthouse for the parish of Orleans, which shall house the following courts and all related support offices:", "(a) \u00a0Civil District Court.", "(b) \u00a0First and Second City Courts.", "(c) \u00a0Juvenile Courts.", "(2) \u00a0No additional fees or costs shall be imposed to fund any portion of the planning, designing or construction of a new courthouse.", "(3) \u00a0Any additional funds used for the planning, design or construction of a new courthouse shall come from commercial leasing revenues, contributions from agencies located or to be located in the courthouse, and any other non-court cost related source.", "(4) \u00a0Before any construction of a new courthouse is begun, the plans and costs shall be submitted to and approved by the Joint Legislative Committee on the Budget.", "(5) \u00a0Any contract for the planning, designing or construction of a new courthouse shall be subject to the public bid laws.", "Acts 1983, No. 192, \u00a71, eff. June 24, 1983; Acts 2002, 1st Ex. Sess., No. 121, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a7\u00a72 and 4(B)(2)."]}, {"id": "RS_13-1335", "stat": "R.S. 13:1335", "title": "Criminal District Court for Orleans Parish", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1335", "PART III. \u00a0CRIMINAL DISTRICT COURT", "SUBPART A. \u00a0JUDGES", "\u00a71335. \u00a0Criminal district court for the parish of Orleans", "There shall be one criminal district court for the parish of Orleans, which shall be composed of twelve judges.", "Added by Acts 1975, No. 143, \u00a71. \u00a0Amended by Acts 1980, No. 86, \u00a71; Acts 1995, No. 217, \u00a71, eff. Jan. 1, 1997; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2008, No. 879, \u00a71; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1336", "stat": "R.S. 13:1336", "title": "Criminal District Court; jurisdiction; powers", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1336", "\u00a71336. \u00a0Criminal district court for the Parish of Orleans; jurisdiction; powers; probation officers", "A. \u00a0The criminal district court for the Parish of Orleans shall have exclusive jurisdiction of the trial and punishment of all crimes, misdemeanors, and offenses committed within the parish of Orleans if the jurisdiction is not vested by law in some other court.", "B. \u00a0The judges of the criminal district court for the Parish of Orleans shall have power to act as committing magistrates in all felony charges and to hold preliminary examinations, with authority to bail, or discharge, or to hold for trial, in all cases before said court. \u00a0They also may adopt all necessary rules with respect thereto.", "C.(1) \u00a0Pursuant to the authority vested by Sections 16 and 32 of Article V of the Constitution, the criminal district court for the Parish of Orleans is hereby vested with additional jurisdiction of certain cases previously under the jurisdiction of the civil district court for the Parish of Orleans as provided for in Paragraph (2) of this Subsection.", "(2) \u00a0The criminal district court for the Parish of Orleans shall have exclusive jurisdiction over civil commitment proceedings when the court determines a mentally defective defendant, who is under the jurisdiction of the court on pending criminal charges but is incapable of standing trial, is a danger to himself or others, and is unlikely in the foreseeable future to be capable of standing trial.", "Added by Acts 1975, No. 144, \u00a71; Acts 1995, No. 304, \u00a71; Acts 2005, No. 174, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2008, No. 879, \u00a71; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1337", "stat": "R.S. 13:1337", "title": "Appellate and supervisory jurisdiction; writs", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1337", "\u00a71337. \u00a0Appellate and supervisory jurisdiction; writs", "A. \u00a0The Criminal District Court for the Parish of Orleans shall have appellate jurisdiction of all cases tried before the Municipal Court of New Orleans and the Traffic Court of New Orleans. \u00a0Appeals from the municipal and traffic courts shall be on the law and the facts and shall be tried upon the records made and the evidence offered in said courts by the judge to whom the appeal shall be allotted. \u00a0In all cases tried before the judges of the criminal district court in which an appeal does not lie to the supreme court, an appeal shall lie on questions of law and fact to two or more of the judges of the criminal district court, as prescribed by said court. \u00a0The criminal district court shall adopt rules regulating the manner of taking and hearing and deciding such appeals.", "B. \u00a0The Criminal District Court for the Parish of Orleans shall have general supervisory jurisdiction over the municipal and traffic courts of New Orleans and shall have authority to issue writs of habeas corpus in criminal cases, as well as such other writs and orders as are necessary in aid of the jurisdiction of the court.", "C. \u00a0The Traffic Court of New Orleans shall have exclusive appellate jurisdiction of all appeals by any person aggrieved by an administrative hearing officer's decision concerning a traffic violation enforced by the city of New Orleans' automated traffic enforcement system. \u00a0Any aggrieved person shall file such appeal within thirty days after the date of such decision. \u00a0The traffic court shall have de novo review over such appeals. \u00a0The traffic court shall adopt rules regulating the manner of taking, hearing, and deciding such appeals.", "Added by Acts 1975, No. 144, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 312, \u00a71; Acts 2012, No. 474, \u00a74(B)(2); Acts 2012, No. 497, \u00a71."]}, {"id": "RS_13-1338", "stat": "R.S. 13:1338", "title": "Transfer of cases", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1338", "\u00a71338. \u00a0Transfer of cases", "A. \u00a0All pending cases filed in the Civil District Court for the Parish of Orleans over civil commitment proceedings where the Criminal District Court for the Parish of Orleans has determined a mentally defective defendant is incapable of standing trial, is a danger to himself or others, and is unlikely in the foreseeable future to be capable of standing trial are hereby transferred to the Criminal District Court for the Parish of Orleans for further proceedings in accordance with law. \u00a0A judge of the civil district court or the criminal district court on his own motion, or upon motion by the district attorney of Orleans Parish or the attorney of the defendant, may have such case transferred upon the signing of the order to transfer by either a judge of the Criminal District Court for the Parish of Orleans or a judge of the Civil District Court for the Parish of Orleans. \u00a0Upon the signing of such an order, the clerk of the Civil District Court for the Parish of Orleans or the clerk of the Criminal District Court for the Parish of Orleans shall effect delivery of the record to the clerk of the Criminal District Court for the Parish of Orleans, who shall receipt the same and properly file it in his office. \u00a0The Criminal District Court for the Parish of Orleans shall hear and dispose of the case with the same legal effect as if it had been instituted in that court in the first instance.", "B. \u00a0With respect to cases and jurisdiction transferred according to this Section, the criminal sheriff for the parish of Orleans is vested with the power and authority to serve all notices, subpoenas, papers, writs, and orders and to make proper return thereto to the Criminal District Court for the Parish of Orleans.", "Acts 2005, No. 174, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1341.2", "stat": "R.S. 13:1341.2", "title": "Office expenses, reimbursement to judges", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1341.2", "\u00a71341.2. \u00a0Office expenses, reimbursement to judges", "The provisions of R.S. 13:698 shall be applicable to judges of the criminal district court and to judges of the civil district court.", "Added by Acts 1970, No. 166, \u00a71. \u00a0Amended by Acts 1974, No. 605, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1341", "stat": "R.S. 13:1341", "title": "Previously repealed by Acts 1975", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1341", "\u00a71341. \u00a0\u00a7\u00a71341, 1341.1 Repealed by Acts 1975, No. 743, \u00a79, eff. Aug. 1, 1975"]}, {"id": "RS_13-1342", "stat": "R.S. 13:1342", "title": "Vacations of judges", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1342", "\u00a71342. \u00a0Vacations of judges", "Each of the judges of the criminal district court may have an annual vacation of two months and a half at any time during the calendar year as they may regulate among themselves. \u00a0No more than three judges may be on vacation at the same time.", "Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1343", "stat": "R.S. 13:1343", "title": "Allotment of cases among judges", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1343", "\u00a71343. \u00a0Allotment of cases among judges; holding of preliminary examination not ground for recusation", "A. \u00a0All cases pending in the criminal district court shall be allotted equally among Sections A, B, C, D, E, F, G, H, I, J, K, and L of the court. \u00a0Except on Sundays, legal holidays, and legal half-holidays, the allotment of cases shall be made public by classes daily at noon by the clerk or a deputy clerk selected by him, in the presence of the district attorney. \u00a0The fact the accused was committed for trial at a preliminary examination shall not be grounds for the recusation of the trial judge who held the preliminary examination.", "B. \u00a0The judges of the criminal district court, by rule adopted by a majority vote of the judges sitting en banc, may assign a certain division of the court as a reentry division of court. \u00a0The division shall establish a workforce development sentencing project pilot program. \u00a0The program shall establish guidelines for the issuance of sentences providing inmate rehabilitation and workforce development. \u00a0The division of court and sentencing project shall work in conjunction with the Louisiana Workforce Investment Council and all efforts shall be coordinated and consistent with the provisions of R.S. 23:1 et seq.", "C. \u00a0Repealed by Acts 2012, No. 399, \u00a72.", "Amended by Acts 1975, No. 143, \u00a72; Acts 1995, No. 217, \u00a72, eff. Jan. 1, 1997; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 743, \u00a77, eff. July 1, 2008; Acts 2008, No. 792, \u00a71, eff. Jan. 1, 2009; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2010, No. 726, \u00a71; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 399, \u00a72; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1344", "stat": "R.S. 13:1344", "title": "Homicide section; Orleans Criminal District Court", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1344", "\u00a71344. \u00a0Homicide section; Orleans Parish Criminal District Court; assignment of judges; jurisdiction; transfer of cases; expedited handling of writs and appeals; applicability of section to other district courts", "A. \u00a0The judges of the Criminal District Court for the parish of Orleans who are in office on August 15, 2009, may create the homicide section of that court, by rule of court adopted by the judges sitting en banc. \u00a0The rule may designate not less than one incumbent judge who may be assigned to a homicide section in accordance with the rules of the Criminal District Court for the parish of Orleans.", "B. \u00a0Any homicide section may be assigned the following cases:", "(1) \u00a0Solicitation for murder (R.S. 14:28.1)", "(2) \u00a0First degree murder (R.S. 14:30)", "(3) \u00a0Second degree murder (R.S. 14:30.1)", "(4) \u00a0Manslaughter (R.S. 14:31)", "(5) \u00a0First degree feticide (R.S. 14:32.6)", "(6) \u00a0Assault by drive-by shooting (R.S. 14:37.1)", "(7) \u00a0Second degree feticide (R.S. 14:32.7)", "(8) \u00a0Aggravated assault upon a peace officer with a firearm (R.S. 14:37.2)", "(9) \u00a0Aggravated assault with a firearm (R.S. 14:37.4)", "(10) \u00a0Attempt to commit the crimes enumerated in Paragraphs (1) through (4) and (6) of this Subsection.", "(11) \u00a0Any other crime committed using a firearm as designated by the judges en banc.", "C. \u00a0If a homicide division is created by the judges of the Criminal District Court for the Parish of Orleans, cases shall be assigned to the homicide section. \u00a0If more than one homicide section is created, cases shall be assigned by random allotment among those sections. \u00a0As to cases pending in the criminal district court at the time any homicide section is created the judge of each division shall determine which cases on the court's docket are enumerated in Paragraphs (B)(1) through (11) of this Section. \u00a0The criminal district court en banc shall determine which cases shall be transferred to a homicide section. \u00a0Any judge of the criminal district court, on his own motion, may transfer any such case by signing the necessary order to transfer the case to a homicide section respecting the principle of random allotment.", "D. \u00a0Any homicide section, court, or division adopted pursuant to R.S. 13:587.4 shall conform to the extent practicable to the provisions of this Section.", "Acts 2009, No. 215, \u00a71, eff. June 30, 2009; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1345", "stat": "R.S. 13:1345", "title": "Previously repealed by Acts 1975", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1345", "\u00a71345. \u00a0Repealed by Acts 1975, No. 143, \u00a73."]}, {"id": "RS_13-1346", "stat": "R.S. 13:1346", "title": "Magistrate section; judge; election; salary", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1346", "\u00a71346. \u00a0Magistrate section; judge; election; salary; powers; jurisdiction", "A.(1) \u00a0In addition to the judges provided for in R.S. 13:1335, there shall be one additional judgeship for the Criminal District Court for the parish of Orleans as created by Act No. 236 of 1972 and as amended by Act No. 178 of 1975. \u00a0The additional judgeship shall continue to be assigned to the Magistrate Section of the Criminal District Court for the parish of Orleans as otherwise provided for in this Section. \u00a0The judge presiding over the additional judgeship shall receive the same salary, payable in the same manner, as the state pays to the other judges of the Criminal District Court for the parish of Orleans. \u00a0The salary paid by the state may be supplemented by the city of New Orleans in an amount not to exceed the supplemental salaries which the city of New Orleans is authorized to pay the other judges of the Criminal District Court for the parish of Orleans. \u00a0The judge elected to the additional judgeship shall be elected at the same time, shall take office at the same time, and shall serve for the same term of office as the other judges of the Criminal District Court for the parish of Orleans.", "(2) \u00a0In order to effectuate the provisions of this Subsection relative to the term of office, the term of office of the judge serving as judge of the additional judgeship on the effective date of this Section is hereby extended until December 31, 1984.", "B. \u00a0The additional judge created herein shall have and possess all of the powers, duties, jurisdiction, rights, prerogatives, and qualifications as are now prescribed by the constitution and laws of this state relative to judges of the Criminal District Court for the Parish of Orleans, except as provided herein.", "C. \u00a0In addition to the sections of the Criminal District Court for the parish of Orleans now existing, there is hereby created the Magistrate Section of the Criminal District Court for the Parish of Orleans, and the additional judge created herein shall be known as the Magistrate and shall preside over the Magistrate Section. \u00a0Said judge shall have jurisdiction to act as committing magistrate in felony and misdemeanor charges and to hold preliminary examinations, with the authority to bail or discharge, or to hold for trial, in all cases before the Criminal District Court for the Parish of Orleans, and shall have the power to adopt all necessary rules with respect thereto.", "D. \u00a0The additional judge created herein shall hold court in the same building as is provided for the other judges of said court by the city of New Orleans, and with the approval of the judges of the Criminal District Court for the Parish of Orleans, acting en banc, may hear preliminary motions, conduct extradition hearings, accept pleas in misdemeanor cases, hear and render judgments in other matters, including misdemeanor cases, preliminary to the trial on the merits, conduct trials of misdemeanor cases, preside over jury trials of misdemeanor cases, and sign and issue search and arrest warrants upon probable cause being shown in accordance with law. \u00a0The judge shall have the right to appoint a court reporter, deputy court reporter, and minute clerk as provided by law, and the criminal sheriff for the parish of Orleans shall appoint a crier and deputy sheriff for the section of the court created herein as provided by law.", "E. \u00a0The Criminal District Court for the Parish of Orleans, including the Magistrate of the Magistrate Section of said court, acting en banc, shall prescribe rules and procedures not inconsistent with the constitution and laws of this state to be followed in all matters to be presented before the Magistrate Section.", "Added by Acts 1972, No. 236, \u00a71, emerg. eff. July 5, 1972 at 10:30 A.M. \u00a0Amended by Acts 1975, No. 178, \u00a71, eff. July 12, 1975; Acts 1980, No. 86, \u00a71; Acts 1980, No. 714, \u00a71; Acts 1983, No. 309, \u00a71; Acts 1986, No. 936, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1347", "stat": "R.S. 13:1347", "title": "Commissioners of magistrate section", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1347", "\u00a71347. \u00a0Commissioners of magistrate section", "A.(1) \u00a0In addition to the judgeships, including the judge of the magistrate section of the Criminal District Court for the parish of Orleans, the four offices of commissioner of said court created under R.S. 13:1347, Act No. 548 of the 1974 Regular Session as amended by the Louisiana Legislature are hereby approved, confirmed, ratified, affirmed, and validated in the magistrate section of said court. \u00a0The persons appointed to the offices of commissioner created by this Section shall be known as commissioners and shall not be judges, but shall have the same qualifications, powers, duties, jurisdiction, and functions, all as is now or hereafter provided for the judge in the magistrate section of said criminal district court.", "(2) \u00a0The salary of the commissioners of the Criminal District Court for the parish of Orleans shall be fifty-five percent of the salary paid to a judge of the Criminal District Court for the parish of Orleans per annum, said salary and related benefits as provided for by law, to be payable in the same manner and from the same sources as the salary and benefits of a judge of the Criminal District Court for the parish of Orleans. \u00a0The support services and personnel including minute clerks and stenographers, as shall be necessary for the offices of commissioner, and such supporting services and personnel shall be paid in the same amount and from the same source as the same positions in the criminal district court are paid.", "(3) \u00a0The judges of the criminal district court, sitting en banc, shall determine the further powers, duties, functions, and policy affecting the offices of commissioner, not inconsistent with the provisions of this Section.", "B. \u00a0The initial appointments by the governor of the three commissioners created in R.S. 13:1347, Act No. 548 of the 1974 Regular Session of the Louisiana Legislature, are hereby approved, confirmed, ratified, continued, validated, and affirmed and said appointment shall be for a term of six years from the date thereof.", "C. \u00a0Should there be a vacancy created by the removal, resignation or death of any commissioner, the judges of the criminal district court sitting en banc shall fill the vacancy by appointment for the unexpired term. \u00a0At the termination of the initial term and or any subsequent terms of a commissioner, the judges of the criminal district court sitting en banc shall appoint successors to the office for like terms. \u00a0All commissioners are subject to removal for any reason for which a judge of the criminal district court may be removed from office. \u00a0Such removal shall be by order of the judges of the criminal district court sitting en banc, after notice and hearing. \u00a0No one shall serve in the office of commissioner unless he has practiced law in the state of Louisiana for a period of not less than five years. \u00a0Commissioners shall be allowed to practice civil law but shall not engage in the practice of criminal law.", "D. \u00a0There is hereby created an additional commissioner of the Criminal District Court of the parish of Orleans. \u00a0The commissioner shall have the same qualifications, powers, duties, jurisdiction, and functions all as is now or hereafter provided for the other commissioners in the magistrate section of said criminal district court.", "(1) \u00a0The commissioner shall receive an annual salary which shall be fifty-five percent of the salary paid to a judge of the Criminal District Court for the parish of Orleans per annum, said salary and related benefits as provided for by law, to be payable in the same manner and from the same sources as the salary and benefits of a judge of the Criminal District Court for the parish of Orleans, payable by the state on his own warrant. \u00a0He shall otherwise be subject to the provisions of this Section.", "(2) \u00a0The judges of the Criminal District Court of the parish of Orleans sitting en banc, shall make the initial appointment of the additional commissioner of the Criminal District Court of the parish of Orleans for a term of six years. \u00a0The commissioner shall be subject to removal for the same reasons and in the same manner as other commissioners of the criminal district court. \u00a0Further, a vacancy created by death, resignation, or removal shall be filled as provided in Subsection C of this Section.", "E. \u00a0No commissioner of the magistrate section of the Criminal District Court for Orleans Parish shall practice law before said court.", "F. \u00a0The annual salary of the minute clerk of each commissioner to be paid by the state of Louisiana out of the state general fund is hereby fixed at thirteen thousand one hundred sixty-three dollars per annum, payable monthly by the state treasurer upon the warrant of said minute clerks.", "G. \u00a0The annual salary of the stenographer of each commissioner to be paid by the state of Louisiana out of the state general fund is hereby fixed at nine thousand nine hundred twenty-three dollars per annum, payable monthly by the state treasurer upon the warrant of said stenographers.", "Acts 1974, No. 548, \u00a71; Acts 1975, No. 594, \u00a71, eff. July 17, 1975; Acts 1978, No. 39, \u00a723, eff. June 1, 1978; Acts 1979, No. 236, \u00a72, eff. Sept. 1, 1979; Acts 1979, No. 724 \u00a71; Acts 1980, No. 169, \u00a71, eff. Sept. \u00a01, 1980; Acts 1981, No. 636, \u00a71, eff. Sept. 1, 1981; Acts 1984, No. 620, \u00a71; Acts 1990, No. 271, \u00a71, eff. July 1, 1990; Acts 2001, No. 279, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1371", "stat": "R.S. 13:1371", "title": "Salary of clerk; payment", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1371", "SUBPART B. \u00a0CLERK AND EMPLOYEES OF COURT", "\u00a71371. \u00a0Salary of clerk; payment", "The clerk of the criminal district court shall receive an annual salary as established in R.S. 13:782(A) based on the applicable population of the parish according to the latest United States census. \u00a0This salary shall be paid by the city of New Orleans monthly beginning with Fiscal Year 1997-1998 and each fiscal year thereafter.", "Amended by Acts 1952, No. 75, \u00a71; Acts 1997, No. 470, \u00a71; Acts 2006, No. 621, \u00a719(B), eff. when the clerk of the 41st JDC takes office; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1372", "stat": "R.S. 13:1372", "title": "Salaries of deputies; payment", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1372", "\u00a71372. \u00a0Salaries of deputies; payment", "A. \u00a0The salaries of the deputy clerks of the criminal district court shall be as follows:", "Chief Clerk (Administrative Assistant), seven hundred and ten to nine hundred five dollars a month; Property Clerk (Deputy Court Clerk IV), five hundred and fifty-six to seven hundred and ten dollars a month; Deputy Clerk II, three hundred fifty-eight to four hundred fifty-eight a month; and Deputy Clerk I a minimum three hundred ten dollars to three hundred ninety-five dollars a month. \u00a0These salaries shall be paid by the city of New Orleans.", "B. \u00a0The salaries of the deputy clerks of the criminal district court paid in accordance with the provisions of Subsection A hereof may be increased in accordance with the salary ranges established in the official pay plan for the city of New Orleans as adopted and approved by the city council. \u00a0The salaries, as so increased shall be paid by the city of New Orleans.", "Amended by Acts 1952, No. 76, \u00a71; Acts 1972, No. 185, \u00a71; Acts 1974, No. 575, \u00a71; Acts 1976, No. 190, \u00a71; Acts 1976, No. 612, \u00a71; Acts 2006, No. 621, \u00a719(B), eff. when the clerk of the 41st JDC takes office; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1377", "stat": "R.S. 13:1377", "title": "Previously repealed", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1377", "NOTE: See Acts 2020, No. 110, \u00a76, and Acts 2022, No. 654, \u00a71, about the provisions of the Act ceasing to be effective on July 1, 2024.", "\u00a71377. Repealed by Acts 2020, No. 110, \u00a75."]}, {"id": "RS_13-1381.1", "stat": "R.S. 13:1381.1", "title": "Indigent transcript fund; reporters fees", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1381.1", "\u00a71381.1. \u00a0Indigent transcript fund; reporter's fees", "A. \u00a0The auditor for the Criminal District Court for the parish of Orleans shall establish an indigent transcript fund for the deposit of all monies that may be received under the provisions of this Section relative to the payment of court reporter fees for transcripts prepared for indigents. \u00a0All funds received and deposited therein shall be used and paid out solely to compensate court reporters for the preparation of all transcripts for indigent defendants, including bills of exceptions, trials, motions, hearings on writs, and all court proceedings.", "B. \u00a0Court reporters shall be paid two dollars and fifty cents per thirty-one line page for such work, if funds are available, all such payments to be made from the indigent transcript fund by the auditor of the Criminal District Court for the parish of Orleans. \u00a0In the parish of Orleans, an additional cost of fourteen dollars may be taxed against every nonindigent defendant who is convicted after trial or after a plea of guilty or who forfeits his bond in connection with any other criminal offense.", "C. \u00a0The judges of the Criminal District Court in the parish of Orleans, sitting en banc, may, by a majority vote of all members, authorize the payment of fees, to be determined by the court, to the deputy court reporters for the transcription of indigent defendant cases.", "Acts 1983, No. 76, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1381.2", "stat": "R.S. 13:1381.2", "title": "Sheriffs detention and prison security fee fund", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1381.2", "NOTE: See Acts 2020, No. 110, \u00a76, and Acts 2022, No. 654, \u00a71, about the provisions of the Act ceasing to be effective on July 1, 2024.", "\u00a71381.2. Sheriff's detention and prison security fee fund", "A. Any defendant, other than an indigent, who pleads guilty or is convicted of an offense by the Criminal District Court for the Parish of Orleans shall be assessed a fee of not less than twenty-five dollars, such costs to be in addition to any fine, clerk's fees, costs due to the criminal court cost fund or sentence imposed by the court.", "B. Costs assessed against defendants pursuant to this Section shall be collected by the sheriff of the parish of Orleans. All sums so collected shall be deposited in a bank or banks in the city of New Orleans in which deposits are insured or guaranteed by the federal government or any agency thereof. No deposit shall be made in any such bank in excess of the amount of the federal insurance or guaranty unless the amount deposited in excess of the federal insurance or guaranty is secured by any security authorized by law as security for the deposit of state funds. The deposits shall be credited to a special fund to be designated as the sheriff's detention and prison security fee fund.", "C. The sheriff's fee fund shall be administered by the sheriff of the parish of Orleans. Disbursements shall be made from the fund upon the signature of the sheriff of the parish of Orleans. Such fund is to be expended to assist in the operation security and maintenance of the office of the sheriff of the parish of Orleans.", "D. When any bail bond posted in the Criminal District Court for the Parish of Orleans guaranteeing the appearance of any defendant in any case in the Criminal District Court for the Parish of Orleans has been forfeited, the surety company, the local agent, or the insurance company for which the agent is writing bail bonds, shall be assessed costs not more than twenty-five dollars. The forfeiture of any bond referred to hereinabove shall not be set aside until the above costs have been paid, in addition to the other legal requirements of law having been met for the setting aside of the forfeiture. Costs assessed against surety companies pursuant to this Section shall be collected and administered in the same manner as that set out in Subsection B of this Section.", "Added by Acts 1974, No. 549, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a7\u00a72 and 4(B)(2); Acts 2020, No. 110, \u00a71; Acts 2022, No. 654, \u00a71, eff. June 18, 2022."]}, {"id": "RS_13-1381.3", "stat": "R.S. 13:1381.3", "title": "Clerk of Criminal District Court expense fund", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1381.3", "\u00a71381.3. \u00a0Clerk of the Criminal District Court expense fund", "There is hereby established the Clerk of the Criminal District Court Expense Fund for the parish of Orleans. \u00a0All funds collected as clerk's fees, interest accrued on investments of funds by the clerk of the Criminal District Court pursuant to R.S. 39:1271, and any funds otherwise generated by the clerk of the Criminal District Court shall be deposited in said fund and may be expended from this fund for purposes of defraying the operating expenses of the clerk's office.", "Added by Acts 1981, No. 833, \u00a71, eff. Aug. \u00a02, 1981; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1381.4", "stat": "R.S. 13:1381.4", "title": "Judicial expense fund for Criminal District Court", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1381.4", "NOTE: See Acts 2020, No. 110, \u00a76, and Acts 2022, No. 654, \u00a71, about the provisions of the Act ceasing to be effective on July 1, 2024.", "\u00a71381.4. Judicial expense fund for Criminal District Court", "A. The judicial expense fund is established and may be used for any purpose connected with, incidental to, or related to the proper administration or function of the court or the office of the judges thereof.", "B. No salary shall be paid from the judicial expense fund to any judges of the court.", "C. The judges of the court shall cause to be conducted annually an audit of the fund and the books and accounts relating thereto and shall file the audit with the office of the legislative auditor where it shall be available for public inspection.", "Acts 1987, No. 204, \u00a71, eff. June 30, 1987; Acts 1988, No. 300, \u00a71; Acts 1989, No. 711, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2); Acts 2013, No. 350, \u00a71, eff. June 17, 2013; Acts 2020, No. 110, \u00a71; Acts 2022, No. 654, \u00a71, eff. June 18, 2022."]}, {"id": "RS_13-1381.5", "stat": "R.S. 13:1381.5", "title": "Orleans Parish administration of criminal justice fund", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1381.5", "NOTE: See Acts 2020, No. 110, \u00a76, and Acts 2022, No. 654, \u00a71, about the provisions of the Act ceasing to be effective on July 1, 2024.", "\u00a71381.5. The Orleans Parish administration of criminal justice fund", "A. There is hereby created an Orleans Parish administration of criminal justice fund which shall be maintained and supervised by the criminal sheriff of the parish of Orleans for the purpose of collecting and distributing proceeds received from the annual licensing fee pursuant to R.S. 22:822.", "B.(1) All funds collected and deposited in the Orleans Parish administration of criminal justice fund are to be distributed per quarter within thirty days of receipt from the sources required to deposit funds.", "(2) Each quarterly distribution shall be calculated and allocated as follows:", "(a)(i) Twenty percent of all funds received to the Orleans Parish clerk of court.", "(ii) The funds received by the court pursuant to this Subparagraph shall be deposited into a special escrow account, retained for one year, and shall then be disbursed to the city of New Orleans to be used in defraying the expenses of the criminal justice system in Orleans Parish. No funds shall be disbursed from the special escrow account for any purpose previously set forth by the provisions of R.S. 13:1381.4 prior to August 1, 2020.", "(b) Twenty percent of all funds received to the Orleans Parish criminal sheriff's operating fund.", "(c) Twenty percent of all funds received to the Orleans Parish district attorney's operating fund.", "(d) Twenty percent of all funds received to the Orleans Parish indigent defender's program.", "(e) Twenty percent of all funds received to the Clerk of the Criminal District Court Expense Fund for the parish of Orleans.", "C. A committee shall be created consisting of the chief judge, or his designee, of the Orleans Parish criminal district court, the sheriff, or his designee, of the Orleans Parish criminal sheriff's office, the district attorney, or his designee, from the Orleans Parish district attorney's office and the director, or his designee, from the Orleans Parish indigent defender's program. This committee shall be empowered by unanimous consent to modify or alter the distribution of funds for emergencies or in the interest of the administration of criminal justice for the parish of Orleans. However, the committee may not authorize the payment of any funds to any entity other than those authorized by this Section to receive funds.", "Acts 1993, No. 834, \u00a72, eff. June 22, 1993; Acts 2001, No. 928, \u00a71, eff. June 26, 2001; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 415, \u00a72, eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2); Acts 2020, No. 110, \u00a71; Acts 2022, No. 654, \u00a71, eff. June 18, 2022."]}, {"id": "RS_13-1381.6", "stat": "R.S. 13:1381.6", "title": "Filing by facsimile in criminal cases", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1381.6", "\u00a71381.6. \u00a0Filing of pleadings and documents in criminal cases by facsimile transmission", "Any pleading or document in a traffic or criminal action may be filed with the court by facsimile transmission in compliance with the provisions of the Code of Criminal Procedure Article 14.1 if permitted by the policy of the clerk of court.", "Acts 2001, No. 319, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1381.7", "stat": "R.S. 13:1381.7", "title": "Clerk of Orleans Parish Criminal District Court", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1381.7", "\u00a71381.7. \u00a0Clerk of the Orleans Parish Criminal District Court", "A. \u00a0The legislature finds that adequate funding of the office of Clerk of the Criminal District Court for the parish of Orleans is necessary for the efficient performance of the powers and duties required of a judicial officer of the state. \u00a0Pursuant to the exercise of the police power of the state, actions for obtaining adequate funding are necessary to promote judicial efficiency and to protect and promote the lives, health, morals, comfort, and general welfare of people as a whole. \u00a0The amounts to be appropriated and paid by the city of New Orleans for expenses, including salaries and maintenance of constitutional officers, their deputies, subordinates, and employees shall not be reduced by the city of New Orleans without the consent of the legislature.", "B. \u00a0The legislature further finds that state statutes mandating payment by the city of New Orleans to the state's employees and officers of the Clerk for the Criminal District Court for the parish of Orleans constitute a valid exercise of state's police power, and such statutes do not violate the provisions of the Louisiana Constitution of 1921 or the Louisiana Constitution of 1974.", "C. \u00a0Nothing contained in this Section shall be construed as giving to the city of New Orleans any rights, powers, authority, or jurisdiction over any constitutional officers, their deputies, employees, subordinates, or over any state or district officers, their deputies, subordinates, or employees.", "Acts 2013, No. 229, \u00a71."]}, {"id": "RS_13-1381", "stat": "R.S. 13:1381", "title": "Fees", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1381", "SUBPART C. \u00a0MISCELLANEOUS PROVISIONS", "\u00a71381. \u00a0Fees", "The following charges may be made for the services of the clerk of the criminal district court:", "(1) \u00a0For filing and recording affidavit, two dollars.", "(2) \u00a0For filing information or indictment, and for recording, docketing and indexing the same, for all, two dollars.", "(3) \u00a0For filing and processing of appearance or witness bond, five dollars.", "(4) \u00a0For orders to bring in prisoners into court and remanding same, one charge, one dollar.", "(5) \u00a0For issuing notice of arraignment, on principal and surety, for each original, with one copy, certified with seal, two dollars.", "(6) \u00a0For issuing notice of trial to principal and surety, for each original, with one copy, certified with seal, two dollars.", "(7) \u00a0For issuing notice of judgment on forfeiture of bonds on principal and surety, for each original, with one copy, with certificates and seals, two dollars.", "(8) \u00a0For issuing subpoena to witnesses, one dollar and sixty cents.", "(9) \u00a0For issuing attachment against witness, four dollars.", "(10) \u00a0For issuing copy of indictment or information to be served on accused, as required by law, three dollars.", "(11) \u00a0For issuing copy of jury list, to be served on accused when required by law, two dollars.", "(12) \u00a0For issuing capias, two dollars.", "(13) \u00a0For issuing copy of sentence, with certificate and seal, two dollars.", "(14) \u00a0For each commitment, with seal, two dollars.", "(15) \u00a0For issuing each subpoena duces tecum, with one copy, with certificate and seal for both, three dollars; and for each additional copy, one dollar.", "(16) \u00a0For filing plea in abatement, special plea in bar, or plea to quash, each forty cents.", "(17) \u00a0For filing motion for new trial, or in arrest of judgment, and for issuing one copy thereof, with certificate and seal, for all, three dollars.", "(18) \u00a0For issuing writ of fieri facias, two dollars.", "(19) \u00a0For administering oaths, affixing jurat, certificate and seal, for all, one dollar.", "Provided, that no charge shall be made for administering the oath to the affidavit of indigents hereinafter provided for.", "(20) \u00a0For making transcript of appeal, for each one hundred words, including certificate and seal thereto, sixty cents.", "(21) \u00a0For making copies of any paper, document or other proceeding, the original of which is in the custody of the clerk of the criminal district court including certificate and seal thereto, for each one hundred words, sixty cents.", "(22) \u00a0For filing a motion to suppress, three dollars.", "(23) \u00a0For filing a w
