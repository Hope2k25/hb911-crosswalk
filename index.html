// ═══════════════════ MODE 3: SIDE-BY-SIDE ═══════════════════
function renderSideMode(){
  const main=document.getElementById('mainLayout');
  main.innerHTML=`
    <div class="panel left-panel" id="leftPanel" style="flex:1 1 50%"></div>
    <div class="resizer" id="resizer"></div>
    <div class="panel right-panel" id="rightPanel" style="flex:1 1 50%;padding-bottom:45%"></div>
    <div class="results-drawer closed" id="resultsDrawer">
      <div class="drawer-header" onclick="toggleDrawer()"><span id="drawerTitle">Results (0)</span><span class="toggle" id="drawerToggle">▲</span></div>
      <div class="drawer-body" id="drawerBody"></div>
    </div>`;

  // Left: laws with a selector
  const leftPanel = document.getElementById('leftPanel');
  let lawSelector = `<div style="padding:8px 12px;position:sticky;top:0;z-index:6;background:var(--bg);border-bottom:1px solid var(--border)">
    <select class="law-select" id="lawSelector" onchange="loadLaw(this.value)" style="width:100%">
      <option value="__all__">-- All Statutes --</option>`;
  for(const law of LAWS){
    lawSelector+=`<option value="${escHtml(law.id)}">${escHtml(law.stat)} -- ${escHtml(law.title)} [${escHtml(law.cat)}]</option>`;
  }
  lawSelector+=`</select></div><div id="lawContent"></div>`;
  leftPanel.innerHTML=lawSelector;
  loadLaw('__all__');

  // Right: bill
  renderBillText('rightPanel');

  // Make lines clickable for cross-search
  setupClickToSearch();
  initResizer();
}

function toggleDrawer(){
  const d=document.getElementById('resultsDrawer');
  const tog=document.getElementById('drawerToggle');
  if(d.classList.contains('open')){d.classList.remove('open');d.classList.add('closed');tog.textContent='▲'}
  else{d.classList.remove('closed');d.classList.add('open');tog.textContent='▼'}
}

function loadLaw(lawId){
  const container=document.getElementById('lawContent');
  let html='';let gIdx=0;
  const lawsToShow = lawId==='__all__' ? LAWS : LAWS.filter(l=>l.id===lawId);
  for(const law of lawsToShow){
    html+=`<div class="law-marker">${escHtml(law.stat)} -- ${escHtml(law.title)} <span style="font-weight:400;opacity:0.7">[${escHtml(law.cat)}]</span></div>`;
    // Find the global index for this law's first line
    let startGIdx=0;
    for(const l2 of LAWS){
      if(l2.id===law.id)break;
      startGIdx+=l2.lines.length;
    }
    for(let i=0;i<law.lines.length;i++){
      const gi=startGIdx+i;
      html+=`<div class="text-line clickable" data-gidx="${gi}" data-side="law" onclick="clickLine(this,'law')"><span class="line-num">${i+1}</span><span class="line-text">${escHtml(law.lines[i])}</span></div>`;
    }
  }
  container.innerHTML=html;
}

function setupClickToSearch(){
  document.getElementById('rightPanel').addEventListener('click',(e)=>{
    const line=e.target.closest('.text-line');
    if(!line)return;
    const gid=parseInt(line.dataset.gid);
    if(isNaN(gid))return;
    const billLine=BILL.find(l=>l.id===gid);
    if(!billLine)return;
    // Clear ALL user selections across both panels, then set this one
    document.querySelectorAll('.text-line.selected-src').forEach(el=>el.classList.remove('selected-src'));
    // Also clear any previous search-result highlights from BOTH panels
    document.querySelectorAll('.text-line.highlighted,.text-line.active-hl').forEach(el=>{
      el.classList.remove('highlighted','active-hl');
      const orig=el.querySelector('.line-text');
      if(orig && orig.dataset.orig) orig.innerHTML=orig.dataset.orig;
    });
    line.classList.add('selected-src');
    document.getElementById('searchInput').value=billLine.t;
    searchDirection='laws';
    updateDirIndicator();
    doSideSearch(billLine.t,'laws');
  });
}

function clickLine(el, side){
  // Clear ALL user selections across both panels
  document.querySelectorAll('.text-line.selected-src').forEach(e=>e.classList.remove('selected-src'));
  // Clear any previous search-result highlights from BOTH panels
  document.querySelectorAll('.text-line.highlighted,.text-line.active-hl').forEach(e=>{
    e.classList.remove('highlighted','active-hl');
    const orig=e.querySelector('.line-text');
    if(orig && orig.dataset.orig) orig.innerHTML=orig.dataset.orig;
  });
  el.classList.add('selected-src');
  const text = el.querySelector('.line-text').textContent;
  document.getElementById('searchInput').value = text;
  if(side==='law'){
    searchDirection='bill';
    updateDirIndicator();
    doSideSearch(text,'bill');
  } else {
    searchDirection='laws';
    updateDirIndicator();
    doSideSearch(text,'laws');
  }
}

function doSideSearch(text, direction){
  const t0=performance.now();
  const engine = direction==='bill' ? billEngine : lawEngine;
  const results = searchEngine(engine, text);
  const ms=(performance.now()-t0).toFixed(0);
  document.getElementById('stats').textContent=`${results.length} matches in ${ms}ms`;

  const targetPanel = direction==='bill' ? 'rightPanel' : 'leftPanel';
  // Clear previous search-result highlights only on target panel (source has selected-src)
  document.querySelectorAll(`#${targetPanel} .text-line.highlighted, #${targetPanel} .text-line.active-hl`).forEach(el=>{
    el.classList.remove('highlighted','active-hl');
    const orig = el.querySelector('.line-text');
    if(orig && orig.dataset.orig) orig.innerHTML = orig.dataset.orig;
  });

  const qTokens = tokenize(text);

  // Populate drawer results
  const drawer = document.getElementById('resultsDrawer');
  const drawerTitle = document.getElementById('drawerTitle');
  const drawerBody = document.getElementById('drawerBody');
  if(drawer){
    drawerTitle.textContent = `Results (${results.length})`;
    if(results.length>0){
      drawer.classList.remove('closed');drawer.classList.add('open');
      document.getElementById('drawerToggle').textContent='▼';
    }
    let rhtml='';
    for(let i=0;i<results.length;i++){
      const r=results[i];
      const pct=(r.score*100).toFixed(0);
      const sc=r.score>0.5?'score-high':r.score>0.25?'score-mid':'score-low';
      let loc='';
      if(direction==='bill'){
        const bl=BILL[r.passageIds[0]];
        const blEnd=BILL[r.passageIds[r.passageIds.length-1]];
        if(bl){const pl=bl.pl!=null?bl.pl:'?';const plEnd=blEnd?.pl!=null?blEnd.pl:pl;
          loc=`p.${bl.p}${blEnd&&blEnd.p!==bl.p?'-'+blEnd.p:''}, L${pl}${plEnd!==pl?'-'+plEnd:''}`;
          const sec=bl.s;if(sec!=null)loc+=` [Sec ${sec}]`;}
      } else {
        loc=escHtml(r.meta?.stat||'');
        if(r.meta?.title)loc+=` \u2014 ${escHtml(r.meta.title)}`;
      }
      const hl=highlightText(r.text.substring(0,160),qTokens);
      rhtml+=`<div class="result-card" onclick="sideNavResult(${i},'${direction}')"><div class="result-meta"><span class="result-loc">${loc}</span><span><span class="result-score ${sc}">${pct}%</span><span class="save-btn" onclick="event.stopPropagation();captureResult(${i},'${direction}')">+ Save</span></span></div><div class="result-text">${hl}</div></div>`;
    }
    drawerBody.innerHTML=rhtml||'<div class="empty-state"><p>No matches</p></div>';
    window._sideResults=results;
    window._sideDirection=direction;
  }

  if(results.length>0){
    for(let i=0;i<Math.min(results.length,10);i++){
      const r=results[i];
      for(const pIdx of r.passageIds){
        let el;
        if(direction==='bill'){
          const billLine=BILL[pIdx];
          if(billLine) el=document.querySelector(`#rightPanel [data-gid="${billLine.id}"]`);
        } else {
          el=document.querySelector(`#leftPanel [data-gidx="${pIdx}"]`);
        }
        if(el){
          el.classList.add(i===0?'active-hl':'highlighted');
          const textEl=el.querySelector('.line-text');
          if(textEl){
            if(!textEl.dataset.orig) textEl.dataset.orig=textEl.innerHTML;
            textEl.innerHTML=highlightText(textEl.textContent, qTokens);
          }
        }
      }
    }
    const first=results[0];
    let scrollTarget;
    if(direction==='bill'){
      const bl=BILL[first.passageIds[0]];
      if(bl) scrollTarget=document.querySelector(`#rightPanel [data-gid="${bl.id}"]`);
    } else {
      scrollTarget=document.querySelector(`#leftPanel [data-gidx="${first.passageIds[0]}"]`);
    }
    if(scrollTarget){
      const panel=document.getElementById(targetPanel);
      panel.scrollTo({top:scrollTarget.offsetTop-panel.offsetTop-80,behavior:'smooth'});
    }
  }
}

function sideNavResult(i, direction){
  const results=window._sideResults;
  if(!results||!results[i])return;
  const qTokens=tokenize(document.getElementById('searchInput').value);
  const panelId=direction==='bill'?'rightPanel':'leftPanel';

  // 1. Clear all line highlights on target panel and restore text
  document.querySelectorAll(`#${panelId} .text-line.highlighted, #${panelId} .text-line.active-hl`).forEach(el=>{
    el.classList.remove('highlighted','active-hl');
    const textEl=el.querySelector('.line-text');
    if(textEl && textEl.dataset.orig) textEl.innerHTML=textEl.dataset.orig;
  });

  // 2. Re-highlight ALL results as .highlighted
  for(const r of results){
    for(const pIdx of r.passageIds){
      let el;
      if(direction==='bill'){
        const bl=BILL[pIdx];
        if(bl)el=document.querySelector(`#${panelId} [data-gid="${bl.id}"]`);
      } else {
        el=document.querySelector(`#${panelId} [data-gidx="${pIdx}"]`);
      }
      if(el){
        el.classList.add('highlighted');
        const textEl=el.querySelector('.line-text');
        if(textEl && !textEl.dataset.orig) textEl.dataset.orig=textEl.innerHTML;
      }
    }
  }

  // 3. Mark selected result as active-hl with word highlighting
  const r=results[i];
  for(const pIdx of r.passageIds){
    let el;
    if(direction==='bill'){
      const bl=BILL[pIdx];
      if(bl)el=document.querySelector(`#${panelId} [data-gid="${bl.id}"]`);
    } else {
      el=document.querySelector(`#${panelId} [data-gidx="${pIdx}"]`);
    }
    if(el){
      el.classList.remove('highlighted');
      el.classList.add('active-hl');
      const textEl=el.querySelector('.line-text');
      if(textEl) textEl.innerHTML=highlightText(textEl.textContent,qTokens);
    }
  }

  // 4. Scroll to selected result
  const firstPIdx=r.passageIds[0];
  const scrollTarget = direction==='bill'
    ? document.querySelector(`#${panelId} [data-gid="${BILL[firstPIdx]?.id}"]`)
    : document.querySelector(`#${panelId} [data-gidx="${firstPIdx}"]`);
  if(scrollTarget){
    const panel=document.getElementById(panelId);
    panel.scrollTo({top:scrollTarget.offsetTop-panel.offsetTop-80,behavior:'smooth'});
  }

  // 5. Mark active result card in drawer
  document.querySelectorAll('#drawerBody .result-card.active').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('#drawerBody .result-card')[i]?.classList.add('active');
}

// ═══════════════════ MAIN SEARCH (modes 1 & 2) ═══════════════════
function doSearch(){
  const query=document.getElementById('searchInput').value.trim();
  if(!query)return;

  if(currentMode==='align'){
    const q = query.toLowerCase();
    document.querySelectorAll('#billAlignContent .text-line, #lawAlignContent .text-line').forEach(el=>{
      const txt = el.querySelector('.line-text');
      if(txt && txt.textContent.toLowerCase().includes(q)){
        el.style.outline='2px solid var(--accent)';
        el.style.outlineOffset='-1px';
      } else {
        el.style.outline='';el.style.outlineOffset='';
      }
    });
    return;
  }
  if(currentMode==='align'){
    const q = query.toLowerCase();
    document.querySelectorAll('#billAlignContent .text-line, #lawAlignContent .text-line').forEach(el=>{
      const txt = el.querySelector('.line-text');
      if(txt && txt.textContent.toLowerCase().includes(q)){
        el.style.outline='2px solid var(--accent)';
        el.style.outlineOffset='-1px';
      } else {
        el.style.outline='';el.style.outlineOffset='';
      }
    });
    return;
  }
  if(currentMode==='side'){
    doSideSearch(query, searchDirection);
    return;
  }

  const t0=performance.now();
  const engine = searchDirection==='bill' ? billEngine : lawEngine;
  const results = searchEngine(engine, query);
  const ms=(performance.now()-t0).toFixed(0);
  document.getElementById('stats').textContent=`${results.length} results in ${ms}ms`;

  const qTokens = tokenize(query);
  renderSearchResults(results, qTokens);

  // Highlight + scroll in left panel
  document.querySelectorAll('.text-line.highlighted,.text-line.active-hl').forEach(el=>{
    el.classList.remove('highlighted','active-hl');
  });

  if(results.length>0){
    // Highlight first result and scroll to it
    navResult(0);
  }
}

function renderSearchResults(results, qTokens){
  const panel=document.getElementById('rightPanel');
  if(!results.length){
    panel.innerHTML='<div class="empty-state"><h3>No matches</h3><p>Try different text.</p></div>';
    return;
  }
  let html=`<div style="padding:8px 12px;font-size:0.85em;color:var(--muted);border-bottom:1px solid var(--border)">${results.length} matches</div>`;
  for(let i=0;i<results.length;i++){
    const r=results[i];
    const pct=(r.score*100).toFixed(0);
    const sc=r.score>0.5?'score-high':r.score>0.25?'score-mid':'score-low';
    let loc='';
    if(searchDirection==='bill'){
      const bl=BILL[r.passageIds[0]];
      const blEnd=BILL[r.passageIds[r.passageIds.length-1]];
      if(bl){
        const pl=bl.pl!=null?bl.pl:'?';
        const plEnd=blEnd?.pl!=null?blEnd.pl:pl;
        loc=`p.${bl.p}${blEnd&&blEnd.p!==bl.p?'-'+blEnd.p:''}, L${pl}${plEnd!==pl?'-'+plEnd:''}`;
      }
    } else {
      loc=escHtml(r.meta?.stat||'');
      if(r.meta?.title) loc+=` -- ${escHtml(r.meta.title)}`;
    }
    const hl=highlightText(r.text.substring(0,150),qTokens);
    html+=`<div class="result-card" onclick="navResult(${i})"><div class="result-meta"><span class="result-loc">${loc}</span><span class="result-score ${sc}">${pct}%</span></div><div class="result-text">${hl}</div></div>`;
  }
  panel.innerHTML=html;
  window._searchResults=results;
}

function navResult(i){
  const results=window._searchResults;
  if(!results||!results[i])return;
  const qTokens=tokenize(document.getElementById('searchInput').value);

  // 1. Clear all previous line highlights and restore original text
  document.querySelectorAll('#leftPanel .text-line.highlighted, #leftPanel .text-line.active-hl').forEach(el=>{
    el.classList.remove('highlighted','active-hl');
    const textEl=el.querySelector('.line-text');
    if(textEl && textEl.dataset.orig) textEl.innerHTML=textEl.dataset.orig;
  });

  // 2. Re-highlight ALL results as .highlighted (light)
  for(const r of results){
    for(const pIdx of r.passageIds){
      let el;
      if(searchDirection==='bill'){
        const bl=BILL[pIdx];
        if(bl)el=document.querySelector(`#leftPanel [data-gid="${bl.id}"]`);
      } else {
        el=document.querySelector(`#leftPanel [data-gidx="${pIdx}"]`);
      }
      if(el){
        el.classList.add('highlighted');
        const textEl=el.querySelector('.line-text');
        if(textEl && !textEl.dataset.orig) textEl.dataset.orig=textEl.innerHTML;
      }
    }
  }

  // 3. Mark the selected result as active-hl with word highlighting
  const r=results[i];
  for(const pIdx of r.passageIds){
    let el;
    if(searchDirection==='bill'){
      const bl=BILL[pIdx];
      if(bl)el=document.querySelector(`#leftPanel [data-gid="${bl.id}"]`);
    } else {
      el=document.querySelector(`#leftPanel [data-gidx="${pIdx}"]`);
    }
    if(el){
      el.classList.remove('highlighted');
      el.classList.add('active-hl');
      const textEl=el.querySelector('.line-text');
      if(textEl) textEl.innerHTML=highlightText(textEl.textContent,qTokens);
    }
  }

  // 4. Scroll to the selected result
  const firstPIdx=r.passageIds[0];
  const scrollTarget = searchDirection==='bill'
    ? document.querySelector(`#leftPanel [data-gid="${BILL[firstPIdx]?.id}"]`)
    : document.querySelector(`#leftPanel [data-gidx="${firstPIdx}"]`);
  if(scrollTarget){
    const panel=document.getElementById('leftPanel');
    panel.scrollTo({top:scrollTarget.offsetTop-panel.offsetTop-80,behavior:'smooth'});
  }

  // 5. Mark the active result card
  document.querySelectorAll('#rightPanel .result-card.active').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('#rightPanel .result-card')[i]?.classList.add('active');
}

// ═══════════════════ RESIZER ═══════════════════
function initResizer(){
  const resizer=document.getElementById('resizer');
  if(!resizer)return;
  const main=document.getElementById('mainLayout');
  let isR=false;
  resizer.addEventListener('mousedown',e=>{isR=true;resizer.classList.add('active');document.body.style.cursor='col-resize';document.body.style.userSelect='none';e.preventDefault()});
  document.addEventListener('mousemove',e=>{
    if(!isR)return;
    const rect=main.getBoundingClientRect();
    const pct=((e.clientX-rect.left)/rect.width)*100;
    const c=Math.max(20,Math.min(80,pct));
    const left=main.querySelector('.panel:first-child')||main.querySelector('.left-panel')||main.querySelector('.full-panel');
    const right=main.querySelector('.panel:last-child')||main.querySelector('.right-panel')||main.querySelector('.results-sidebar');
    if(left)left.style.flex=`0 0 ${c}%`;
    if(right)right.style.flex=`0 0 ${100-c-0.5}%`;
  });
  document.addEventListener('mouseup',()=>{if(isR){isR=false;resizer.classList.remove('active');document.body.style.cursor='';document.body.style.userSelect=''}});
}

// ═══════════════════ CAPTURES (localStorage) ═══════════════════
// Captures stored in localStorage, isolated by file:// origin.
// On file:// protocol, each file gets its own unique origin in modern browsers.
const STORAGE_KEY='hb911_crosswalk_v1_captures';
function loadCaptures(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[]}catch(e){return[]}
}
function saveCaptures(caps){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(caps));
  renderCaptures();
}
function captureResult(i, direction){
  const r=window._sideResults[i];
  if(!r)return;
  const query=document.getElementById('searchInput').value.trim();

  // === Determine SOURCE info (what the user clicked) ===
  let srcLawStat='', srcLawText='', srcBillPage='', srcBillLine='', srcBillSec='', srcBillText='';
  const srcEl=document.querySelector('.text-line.selected-src');
  if(srcEl){
    const srcTextContent=srcEl.querySelector('.line-text')?.textContent||query;
    if(direction==='bill'){
      // User clicked a LAW line -> searching into bill
      const gidx=srcEl.dataset.gidx;
      if(gidx!=null){
        const lp=lawPassages[parseInt(gidx)];
        if(lp) srcLawStat=lp.meta.stat||'';
      }
      srcLawText=srcTextContent.substring(0,150);
    } else {
      // User clicked a BILL line -> searching into laws
      const gid=parseInt(srcEl.dataset.gid);
      if(!isNaN(gid)){
        const bl=BILL.find(l=>l.id===gid);
        if(bl){
          srcBillPage=String(bl.p);
          srcBillLine=bl.pl!=null?String(bl.pl):'';
          srcBillSec=bl.s!=null?String(bl.s):'';
        }
      }
      srcBillText=srcTextContent.substring(0,150);
    }
  }

  // === Determine TARGET info (from the search result) ===
  let tgtLawStat='', tgtLawText='', tgtBillPage='', tgtBillLine='', tgtBillLineEnd='', tgtBillSec='', tgtBillText='';
  if(direction==='bill'){
    const bl=BILL[r.passageIds[0]];
    const blEnd=BILL[r.passageIds[r.passageIds.length-1]];
    if(bl){
      tgtBillPage=String(bl.p);
      tgtBillLine=bl.pl!=null?String(bl.pl):'';
      tgtBillLineEnd=blEnd?.pl!=null?String(blEnd.pl):tgtBillLine;
      tgtBillSec=bl.s!=null?String(bl.s):'';
    }
    tgtBillText=r.text.substring(0,150);
  } else {
    tgtLawStat=r.meta?.stat||'';
    tgtLawText=r.text.substring(0,150);
  }

  // === Merge: always have both law and bill info ===
  const lawStat = srcLawStat || tgtLawStat || '';
  const lawText = srcLawText || tgtLawText || '';
  const billPage = srcBillPage || tgtBillPage || '';
  const billLine = srcBillLine || tgtBillLine || '';
  const billLineEnd = tgtBillLineEnd || srcBillLine || '';
  const billSec = srcBillSec || tgtBillSec || '';
  const billText = srcBillText || tgtBillText || '';
  const billLoc = billPage ? `p.${billPage}, L${billLine}${billLineEnd&&billLineEnd!==billLine?'-'+billLineEnd:''} [Sec ${billSec}]` : '';

  const cap={
    id:Date.now(),
    timestamp:new Date().toISOString(),
    direction,
    lawStat, lawText,
    billPage, billLine, billLineEnd, billSec, billLoc, billText,
    score:(r.score*100).toFixed(0)+'%'
  };
  const caps=loadCaptures();
  caps.push(cap);
  saveCaptures(caps);
}
function deleteCapture(id){
  const caps=loadCaptures().filter(c=>c.id!==id);
  saveCaptures(caps);
}
function clearCaptures(){
  if(!confirm('Clear all captured mappings?'))return;
  saveCaptures([]);
}
function renderCaptures(){
  const caps=loadCaptures();
  document.getElementById('capCount').textContent=caps.length;
  const list=document.getElementById('capturesList');
  if(!list)return;
  if(!caps.length){list.innerHTML='<div class="empty-state" style="padding:20px"><p>No captures yet. Click <strong>+ Save</strong> on a search result to capture a mapping.</p></div>';return}
  let html='';
  for(const c of caps){
    html+=`<div class="capture-item"><span class="cap-del" onclick="deleteCapture(${c.id})">&times;</span>`;
    html+=`<div style="margin-bottom:3px"><span class="cap-stat">${escHtml(c.lawStat||'(no statute)')}</span>`;
    html+=`<span class="cap-arrow">\u2194</span>`;
    html+=`<span class="cap-bill">${escHtml(c.billLoc||'(no bill ref)')}</span>`;
    html+=` <span class="cap-score">${escHtml(c.score)}</span></div>`;
    if(c.lawText) html+=`<div class="cap-text" style="color:var(--purple)">Law: ${escHtml(c.lawText)}</div>`;
    if(c.billText) html+=`<div class="cap-text" style="color:var(--accent)">Bill: ${escHtml(c.billText)}</div>`;
    html+=`</div>`;
  }
  list.innerHTML=html;
}
function toggleCaptures(){
  document.getElementById('capturesPanel').classList.toggle('open');
  renderCaptures();
}
function exportTXT(){
  const caps=loadCaptures();
  if(!caps.length){alert('No captures to export.');return}
  const NL=String.fromCharCode(10);
  let txt='HB911 CROSSWALK CAPTURES'+NL;
  txt+='Generated: '+new Date().toLocaleString()+NL;
  txt+='='.repeat(80)+NL+NL;
  for(let i=0;i<caps.length;i++){
    const c=caps[i];
    txt+='['+(i+1)+'] '+(c.lawStat||'N/A')+' <-> '+(c.billLoc||'N/A')+' ('+c.score+')'+NL;
    txt+='  Direction   : '+(c.direction==='bill'?'Law -> Bill':'Bill -> Law')+NL;
    txt+='  Law Statute : '+(c.lawStat||'N/A')+NL;
    if(c.lawText)  txt+='  Law Text    : '+c.lawText+NL;
    txt+='  Bill Page   : '+(c.billPage||'N/A')+NL;
    txt+='  Bill Lines  : '+(c.billLine||'?')+'-'+(c.billLineEnd||'?')+NL;
    txt+='  Bill Section: '+(c.billSec||'N/A')+NL;
    if(c.billText) txt+='  Bill Text   : '+c.billText+NL;
    txt+='  Timestamp   : '+c.timestamp+NL;
    txt+='-'.repeat(80)+NL;
  }
  txt+=NL+'Total captures: '+caps.length+NL;
  const blob=new Blob([txt],{type:'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='hb911_crosswalk_captures.txt';
  a.click();URL.revokeObjectURL(url);
}

function renderAlignMode(){
  const main=document.getElementById('mainLayout');
  main.innerHTML=`
    <div class="panel left-panel" id="leftPanel" style="flex:1 1 50%;overflow-y:auto">
      <div class="align-legend">
        <strong>HB911 Bill Text</strong>
        <div class="align-legend-item"><div class="align-legend-swatch" style="background:#34d399"></div>Mapped to existing law</div>
        <div class="align-legend-item"><div class="align-legend-swatch" style="background:#ef4444"></div>Novel (no law equivalent)</div>
        <div class="align-legend-item"><div class="align-legend-swatch" style="background:#1f2937"></div>Not analyzed</div>
      </div>
      <div class="align-stats" id="billStats"></div>
      <div id="billAlignContent"></div>
    </div>
    <div class="resizer" id="resizer"></div>
    <div class="panel right-panel" id="rightPanel" style="flex:1 1 50%;overflow-y:auto">
      <div class="align-legend">
        <strong>Current Law Text</strong>
        <div class="align-legend-item"><div class="align-legend-swatch" style="background:#34d399"></div>Carried into bill</div>
        <div class="align-legend-item"><div class="align-legend-swatch" style="background:#ef4444"></div>Dropped / not in bill</div>
        <div class="align-legend-item"><div class="align-legend-swatch" style="background:#1f2937"></div>Not analyzed</div>
      </div>
      <div class="align-stats" id="lawStats"></div>
      <div id="lawAlignContent"></div>
    </div>`;

  renderAlignBillText();
  renderAlignLawText();
  initResizer();

  // Bill stats
  const bSents = new Set();
  let bMapped=0, bUnmapped=0;
  for(const lid in BILL_LINE_MAP){
    const e = BILL_LINE_MAP[lid];
    if(bSents.has(e.si)) continue;
    bSents.add(e.si);
    if(e.mp) bMapped++; else bUnmapped++;
  }
  document.getElementById('billStats').innerHTML =
    `<span class="align-stat-chip" style="background:#34d39922;color:#34d399">Mapped: ${bMapped}</span>` +
    `<span class="align-stat-chip" style="background:#ef444422;color:#ef4444">Novel: ${bUnmapped}</span>` +
    `<span style="margin-left:auto;color:var(--muted)">Click any highlighted sentence to jump to its match</span>`;

  let lMapped=0, lUnmapped=0;
  for(const key in LAW_LINE_MAP){
    if(LAW_LINE_MAP[key].mp) lMapped++; else lUnmapped++;
  }
  document.getElementById('lawStats').innerHTML =
    `<span class="align-stat-chip" style="background:#34d39922;color:#34d399">Carried: ${lMapped}</span>` +
    `<span class="align-stat-chip" style="background:#ef444422;color:#ef4444">Dropped: ${lUnmapped}</span>`;
}

function renderAlignBillText(){
  const panel = document.getElementById('billAlignContent');
  let h = '';
  let cp = 0, cs = -1;
  for(const l of BILL){
    if(l.p !== cp){cp = l.p; h += `<div class="page-marker">PAGE ${cp}</div>`;}
    if(l.s != null && l.s !== cs){
      cs = l.s;
      const stLabel = (l.st||'').replace(/_/g,' ');
      h += `<div class="section-marker">Section ${cs} \u2014 ${stLabel}</div>`;
    }
    const pl = l.pl != null ? l.pl : '';
    const fmtClass = l.f==='new'?'fmt-new':l.f==='mixed'?'fmt-mixed':'fmt-plain';
    const ltClass = l.lt==='section_header'?'lt-section-header':l.lt==='statute_header'?'lt-statute-header':'';

    const alInfo = BILL_LINE_MAP[String(l.id)];
    let alClass = 'al-none';
    let alAttrs = '';
    let titleAttr = '';
    if(alInfo){
      alClass = alInfo.mp ? 'al-mapped' : 'al-unmapped';
      alAttrs = ` data-al-si="${alInfo.si}" data-al-side="bill"`;
      titleAttr = ` title="${alInfo.st}${alInfo.ms.length ? ' | ' + alInfo.ms.length + ' match(es)' : ''}"`;
      if(alInfo.ms && alInfo.ms.length > 0){
        // Store targets as stat::lineIdx pairs
        const tgts = alInfo.ms.map(m => m.sh + '::' + m.ln).join('|');
        alAttrs += ` data-al-targets="${tgts}"`;
      }
    }

    h += `<div class="text-line ${fmtClass} ${ltClass} ${alClass}" data-gid="${l.id}"${alAttrs}${titleAttr}><span class="line-num">${pl}</span><span class="line-text">${escHtml(l.t)}</span></div>`;
  }
  panel.innerHTML = h;
  panel.addEventListener('click', e => {
    const line = e.target.closest('.text-line[data-al-si]');
    if(!line) return;
    alignNavigate(line, 'bill');
  });
}

function renderAlignLawText(){
  const panel = document.getElementById('lawAlignContent');
  let h = '';
  for(const law of LAWS){
    h += `<div class="law-marker">${escHtml(law.stat)} -- ${escHtml(law.title)} <span style="font-weight:400;opacity:0.7">[${escHtml(law.cat)}]</span></div>`;
    for(let i = 0; i < law.lines.length; i++){
      const key = `${law.stat}::${i}`;
      const alInfo = LAW_LINE_MAP[key];

      let alClass = 'al-none';
      let alAttrs = '';
      let titleAttr = '';
      if(alInfo){
        alClass = alInfo.mp ? 'al-mapped' : 'al-unmapped';
        alAttrs = ` data-al-si="${alInfo.si}" data-al-side="law"`;
        titleAttr = ` title="${alInfo.st}${alInfo.ms.length ? ' | ' + alInfo.ms.length + ' match(es)' : ''}"`;
        if(alInfo.ms && alInfo.ms.length > 0){
          // Store bill sentence indices for navigation
          const tgts = alInfo.ms.map(m => String(m.bi)).join('|');
          alAttrs += ` data-al-targets="${tgts}"`;
        }
      }

      h += `<div class="text-line ${alClass}" data-law-key="${escHtml(key)}"${alAttrs}${titleAttr}><span class="line-num">${i+1}</span><span class="line-text">${escHtml(law.lines[i])}</span></div>`;
    }
  }
  panel.innerHTML = h;
  panel.addEventListener('click', e => {
    const line = e.target.closest('.text-line[data-al-si]');
    if(!line) return;
    alignNavigate(line, 'law');
  });
}

function alignNavigate(clickedLine, side){
  // Clear previous highlights
  document.querySelectorAll('.al-nav-target,.al-nav-source').forEach(el => {
    el.classList.remove('al-nav-target','al-nav-source');
  });

  // Highlight source sentence (all lines of same sentence)
  const si = clickedLine.dataset.alSi;
  const srcPanel = side === 'bill' ? 'billAlignContent' : 'lawAlignContent';
  document.querySelectorAll(`#${srcPanel} [data-al-si="${si}"]`).forEach(el => {
    el.classList.add('al-nav-source');
  });

  const targets = clickedLine.dataset.alTargets;
  if(!targets){
    document.getElementById('stats').textContent = `No mapped equivalent found`;
    return;
  }
  const tgtList = targets.split('|');
  const scrollContainer = side === 'bill' ? document.getElementById('rightPanel') : document.getElementById('leftPanel');
  const tgtPanelId = side === 'bill' ? 'lawAlignContent' : 'billAlignContent';

  let firstTarget = null;
  if(side === 'bill'){
    // Targets are "stat::lineIdx" -> find law lines by data-law-key
    for(const tgt of tgtList){
      const els = document.querySelectorAll(`#${tgtPanelId} [data-law-key="${tgt}"]`);
      els.forEach(el => el.classList.add('al-nav-target'));
      if(!firstTarget && els.length > 0) firstTarget = els[0];
    }
  } else {
    // Targets are bill sentence indices -> find bill lines by data-al-si
    for(const tgt of tgtList){
      const els = document.querySelectorAll(`#${tgtPanelId} [data-al-si="${tgt}"]`);
      els.forEach(el => el.classList.add('al-nav-target'));
      if(!firstTarget && els.length > 0) firstTarget = els[0];
    }
  }

  if(firstTarget){
    const containerRect = scrollContainer.getBoundingClientRect();
    const targetRect = firstTarget.getBoundingClientRect();
    const offset = targetRect.top - containerRect.top + scrollContainer.scrollTop - 100;
    scrollContainer.scrollTo({top: offset, behavior: 'smooth'});
  }

  document.getElementById('stats').textContent = `${tgtList.length} match${tgtList.length!==1?'es':''} highlighted on other side`;
}
