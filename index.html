ment_and_enactment", "lt": "continuation"}, {"id": 579, "p": 21, "pl": 2, "t": "prior to the transfer. In like manner, and in order to prevent any violation of the", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 580, "p": 21, "pl": 3, "t": "provisions, terms, or conditions of any gift, donation, deed, will, trust, or other", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 581, "p": 21, "pl": 4, "t": "instrument or disposition by which property of any kind has been vested in a fund", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 582, "p": 21, "pl": 5, "t": "transferred by this Section, or diversion from the purposes for which such property", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 583, "p": 21, "pl": 6, "t": "was thus vested in any fund, it is hereby specifically provided that each such", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 584, "p": 21, "pl": 7, "t": "instrument or disposition hereafter shall be deemed to have been vested in the", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 585, "p": 21, "pl": 8, "t": "Consolidated Judicial Expense Fund for the Forty-First Judicial District to which the", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 586, "p": 21, "pl": 9, "t": "fund is transferred in the same manner and to the same extent as if originally so", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 587, "p": 21, "pl": 10, "t": "done.", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 588, "p": 21, "pl": 11, "t": "E.  The Consolidated Judicial Expense Fund for the Forty-First Judicial", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "subsection"}, {"id": 589, "p": 21, "pl": 12, "t": "District to which each fund is transferred shall be the successor in every way to each", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 590, "p": 21, "pl": 13, "t": "fund transferred and from which functions are or may be merged and consolidated,", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 591, "p": 21, "pl": 14, "t": "including all of the obligations and debts of each fund.  In like manner, all other", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 592, "p": 21, "pl": 15, "t": "dedications and allocations of revenues and sources of revenues heretofore made,", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 593, "p": 21, "pl": 16, "t": "which are constitutional under the Constitution of Louisiana of 1974, shall continue,", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 594, "p": 21, "pl": 17, "t": "until otherwise hereafter provided by the constitution, in the same manner, to the", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 595, "p": 21, "pl": 18, "t": "same extent, and for the same purposes as were provided prior to the enactment of", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 596, "p": 21, "pl": 19, "t": "this Section.", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 597, "p": 21, "pl": 20, "t": "F.  The provisions of this Section shall not be construed or applied in any way", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "subsection"}, {"id": 598, "p": 21, "pl": 21, "t": "which will prevent full compliance by the state, or any department, office, or agency", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 599, "p": 21, "pl": 22, "t": "thereof, with the requirements of any Act of the Congress of the United States or any", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 600, "p": 21, "pl": 23, "t": "regulation made thereunder by which federal aid or other federal assistance has been", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 601, "p": 21, "pl": 24, "t": "or hereafter is made available to this state, or any department, office, agency, or", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 602, "p": 21, "pl": 25, "t": "subdivision thereof, anything contained in this Subpart to the contrary", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 603, "p": 21, "pl": 26, "t": "notwithstanding, and such compliance hereafter shall be insofar as such compliance", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 604, "p": 21, "pl": 27, "t": "affects any fund transferred in accordance with the provisions of this Section.", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 605, "p": 21, "pl": 28, "t": "G.  Upon the transfer of each fund in accordance with this Section, any", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "subsection"}, {"id": 606, "p": 21, "pl": 29, "t": "pending or unfinished business of each such fund shall be taken over and be", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 607, "p": 21, "pl": 30, "t": "completed by the Consolidated Judicial Expense Fund for the Forty-First Judicial", "f": "plain", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 608, "p": 22, "pl": 1, "t": "District with the same power and authority as that of the fund transferred.  The", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 609, "p": 22, "pl": 2, "t": "Consolidated Judicial Expense Fund shall be the successor in every way to each", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 610, "p": 22, "pl": 3, "t": "fund, and every act done by the Consolidated Judicial Expense Fund in the exercise", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 611, "p": 22, "pl": 4, "t": "of the functions of each shall be deemed to have the same force and effect under any", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 612, "p": 22, "pl": 5, "t": "provisions of the constitution and laws in effect on the effective date of this Section", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 613, "p": 22, "pl": 6, "t": "as if done by the fund transferred.", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 614, "p": 22, "pl": 7, "t": "\u00a7996.63.  Indigent transcript fund; reporter's fees", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "statute_header"}, {"id": 615, "p": 22, "pl": 8, "t": "A.  The additional cost of fourteen dollars may be taxed against every", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "subsection"}, {"id": 616, "p": 22, "pl": 9, "t": "nonindigent defendant who is convicted after trial or after a plea of guilty or who", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 617, "p": 22, "pl": 10, "t": "forfeits his bond in connection with any other criminal offense.", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 618, "p": 22, "pl": 11, "t": "B.  All funds received under this Section shall be used to pay court reporter", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "subsection"}, {"id": 619, "p": 22, "pl": 12, "t": "fees for transcripts prepared for indigent defendants, including bills of exceptions,", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 620, "p": 22, "pl": 13, "t": "trials, motions, hearings on writs, and all court proceedings.", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 621, "p": 22, "pl": 14, "t": "C.  The judges of the Forty-First Judicial District Court, sitting en banc, may,", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "subsection"}, {"id": 622, "p": 22, "pl": 15, "t": "by a majority vote of all members, authorize the payment of fees, to be determined", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 623, "p": 22, "pl": 16, "t": "by the court, to the deputy court reporters for the transcription of indigent defendant", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 624, "p": 22, "pl": 17, "t": "cases.", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 625, "p": 22, "pl": 18, "t": "\u00a7996.64.  Fees; fines; assessed, collected in Forty-First Judicial District Court", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "statute_header"}, {"id": 626, "p": 22, "pl": 19, "t": "A.  Any defendant, other than an indigent, who pleads guilty or is convicted", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "subsection"}, {"id": 627, "p": 22, "pl": 20, "t": "of an offense in the Forty-First Judicial District Court shall be assessed a fee of not", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 628, "p": 22, "pl": 21, "t": "less than twenty-five dollars, such costs to be in addition to any fine, clerk's fees,", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 629, "p": 22, "pl": 22, "t": "costs due to the Consolidated Judicial Expense Fund or sentence imposed by the", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 630, "p": 22, "pl": 23, "t": "court.", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 631, "p": 22, "pl": 24, "t": "B.  Costs assessed against defendants pursuant to this Section collected by", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "subsection"}, {"id": 632, "p": 22, "pl": 25, "t": "the sheriff of the parish.  All sums so collected shall be deposited in the Consolidated", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 633, "p": 22, "pl": 26, "t": "Judicial Expense Fund for the Forty-First Judicial District Court.", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 634, "p": 22, "pl": 27, "t": "C.  When any bail bond posted in the Forty-First Judicial District Court", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "subsection"}, {"id": 635, "p": 22, "pl": 28, "t": "guaranteeing the appearance of any defendant in any case in the district court has", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 636, "p": 22, "pl": 29, "t": "been forfeited, the surety company, local agent, or  insurance company for which the", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 637, "p": 22, "pl": 30, "t": "agent is writing bail bonds, shall be assessed costs not more than twenty-five dollars.", "f": "plain", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 638, "p": 23, "pl": 1, "t": "The forfeiture of any bond referred to hereinabove shall not be set aside until the", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 639, "p": 23, "pl": 2, "t": "above costs have been paid, in addition to the other legal requirements of law having", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 640, "p": 23, "pl": 3, "t": "been met for the setting aside of the forfeiture.  Costs assessed against surety", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 641, "p": 23, "pl": 4, "t": "companies pursuant to this Section shall be collected and administered in the same", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 642, "p": 23, "pl": 5, "t": "manner as that set out in Subsection B of this Section.", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 643, "p": 23, "pl": 6, "t": "D.(1)  In all nonindigent criminal cases over which the Forty-First Judicial", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "subsection"}, {"id": 644, "p": 23, "pl": 7, "t": "District Court has original, appellate, supervisory, or concurrent jurisdiction,", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 645, "p": 23, "pl": 8, "t": "including traffic violations other than parking, there shall be taxed as costs against", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 646, "p": 23, "pl": 9, "t": "every defendant who is convicted after trial or plea of guilty or nolo contendere or", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 647, "p": 23, "pl": 10, "t": "who forfeits his bond the sum of five dollars, which shall be in addition to all other", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 648, "p": 23, "pl": 11, "t": "fines, costs, or forfeitures lawfully imposed and which shall be transmitted to the", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 649, "p": 23, "pl": 12, "t": "Consolidated Judicial Expense Fund.", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 650, "p": 23, "pl": 13, "t": "(2)  In addition to all other fines, costs, or forfeitures lawfully imposed by", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "paragraph"}, {"id": 651, "p": 23, "pl": 14, "t": "this Section or any other provision, the court may impose an additional cost against", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 652, "p": 23, "pl": 15, "t": "any defendant who has been finally convicted of a misdemeanor, excluding traffic", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 653, "p": 23, "pl": 16, "t": "violations, or a felony.  The additional costs authorized in this Paragraph shall not", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 654, "p": 23, "pl": 17, "t": "exceed five hundred dollars in the case of a misdemeanor nor exceed two thousand", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 655, "p": 23, "pl": 18, "t": "five hundred dollars in the case of a felony.  All such sums collected shall be", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 656, "p": 23, "pl": 19, "t": "transmitted to the Consolidated Judicial Expense Fund.", "f": "new", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "continuation"}, {"id": 657, "p": 23, "pl": 20, "t": "*         *         *", "f": "plain", "s": "4", "st": "statutory_amendment_and_enactment", "lt": "separator"}, {"id": 658, "p": 23, "pl": 21, "t": "Section 5.  R.S. 44:181.5, 181.6 and 182.2 through 182.10 are hereby enacted to read", "f": "plain", "s": "5", "st": "statutory_enactment", "lt": "section_header"}, {"id": 659, "p": 23, "pl": 22, "t": "as follows:", "f": "plain", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 660, "p": 23, "pl": 23, "t": "\u00a7181.5.  Separate account", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "statute_header"}, {"id": 661, "p": 23, "pl": 24, "t": "A.  A separate account is hereby established in the Consolidated Judicial", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "subsection"}, {"id": 662, "p": 23, "pl": 25, "t": "Expense Fund, and all sums collected or received by the clerk of court as parish", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 663, "p": 23, "pl": 26, "t": "recorder, except as otherwise provided for the Archival Trust Fund, shall be", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 664, "p": 23, "pl": 27, "t": "deposited in the separate account to be disbursed by the judges of the courts, en banc,", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 665, "p": 23, "pl": 28, "t": "as provided in R.S. 13:1312.1.", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 666, "p": 23, "pl": 29, "t": "B.  Subject to the authority and approval of the judges of the courts, en banc,", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "subsection"}, {"id": 667, "p": 23, "pl": 30, "t": "as provided in R.S. 13:1312.1, the courts may authorize the expenditure of funds", "f": "plain", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 668, "p": 24, "pl": 1, "t": "connected with the administration or function of the recordation of documents by the", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 669, "p": 24, "pl": 2, "t": "office of the clerk of court as the parish recorder, including salaries, benefits, and", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 670, "p": 24, "pl": 3, "t": "pension contributions.  The separate account shall be audited annually, and a copy", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 671, "p": 24, "pl": 4, "t": "of the report furnished to the legislative auditor as provided by law, where it shall be", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 672, "p": 24, "pl": 5, "t": "available for public inspection, and with the Joint Legislative Committee on the", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 673, "p": 24, "pl": 6, "t": "Budget.  The audit report shall also be published, at the sole expense of the clerk of", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 674, "p": 24, "pl": 7, "t": "court for the Forty-First Judicial District Court, in the official journal of the parish", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 675, "p": 24, "pl": 8, "t": "of Orleans, no later than January first of each year.", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 676, "p": 24, "pl": 9, "t": "C.  The administrator  of the Consolidated Judicial Expense Fund, designated", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "subsection"}, {"id": 677, "p": 24, "pl": 10, "t": "by the judges of the courts having authority over the fund, beginning in 2029, on or", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 678, "p": 24, "pl": 11, "t": "before July seventh, annually, shall submit to the clerk of court a financial statement", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 679, "p": 24, "pl": 12, "t": "and accounting of all sums which have been deposited therein by the clerk of court", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 680, "p": 24, "pl": 13, "t": "as parish recorder.", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 681, "p": 24, "pl": 14, "t": "\u00a7181.6.  Office; facilities", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "statute_header"}, {"id": 682, "p": 24, "pl": 15, "t": "The city of New Orleans shall provide an office and other reasonable", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 683, "p": 24, "pl": 16, "t": "facilities in the building in which the Civil Section of the Forty-First Judicial District", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 684, "p": 24, "pl": 17, "t": "Court holds court or other quarters contiguous thereto which shall be good and", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 685, "p": 24, "pl": 18, "t": "sufficient for the proper and efficient operation of the office of the clerk as the parish", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 686, "p": 24, "pl": 19, "t": "recorder, including the installation and maintenance of an appropriate fire protection", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 687, "p": 24, "pl": 20, "t": "and climate control system.", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 688, "p": 24, "pl": 21, "t": "*          *          *", "f": "plain", "s": "5", "st": "statutory_enactment", "lt": "separator"}, {"id": 689, "p": 24, "pl": 22, "t": "\u00a7182.2.  List of notaries", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "statute_header"}, {"id": 690, "p": 24, "pl": 23, "t": "A.  The clerk of court as the parish recorder shall keep an accurate", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "subsection"}, {"id": 691, "p": 24, "pl": 24, "t": "alphabetical list of all notaries public in and for the parish of Orleans, showing their", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 692, "p": 24, "pl": 25, "t": "business and residence addresses and the expiration date of their bonds, if the notary", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 693, "p": 24, "pl": 26, "t": "is required by law to furnish a bond.  The list shall be kept at all times open to public", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 694, "p": 24, "pl": 27, "t": "inspection during his office hours, and he shall furnish the secretary of state and the", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 695, "p": 24, "pl": 28, "t": "district attorney in and for the parish of Orleans, annually on or before October first,", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 696, "p": 24, "pl": 29, "t": "a certified list of all notaries in and for the parish of Orleans, showing the number of", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 697, "p": 25, "pl": 1, "t": "notaries and the number and names of those who have ceased to be notaries, and the", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 698, "p": 25, "pl": 2, "t": "number and names of those whose bonds have expired.", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 699, "p": 25, "pl": 3, "t": "B.  He shall diligently, by every means in his power, keep the list accurate", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "subsection"}, {"id": 700, "p": 25, "pl": 4, "t": "and up to date at all times, and shall immediately notify the governor and the", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 701, "p": 25, "pl": 5, "t": "secretary of state of each vacancy caused by death, resignation, removal from", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 702, "p": 25, "pl": 6, "t": "Orleans Parish, or any other cause, as soon as such facts are ascertained by him.", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 703, "p": 25, "pl": 7, "t": "\u00a7182.3.  Statement furnished parish recorder by notaries", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "statute_header"}, {"id": 704, "p": 25, "pl": 8, "t": "Each notary shall, annually, before September first, furnish to the clerk of", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 705, "p": 25, "pl": 9, "t": "court as the parish recorder a statement showing his office and residence address, the", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 706, "p": 25, "pl": 10, "t": "date of his bond, if required by law, and the surety or sureties thereon, and their", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 707, "p": 25, "pl": 11, "t": "addresses.  Failure to furnish this statement shall be cause for the revocation of the", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 708, "p": 25, "pl": 12, "t": "commission of the notary.", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 709, "p": 25, "pl": 13, "t": "\u00a7182.4.  Fee payable to parish recorder by notaries", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "statute_header"}, {"id": 710, "p": 25, "pl": 14, "t": "Each notary shall pay an annual fee of twenty dollars, on or before September", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 711, "p": 25, "pl": 15, "t": "first of each year, to the clerk of court as the parish recorder.  The fees collected by", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 712, "p": 25, "pl": 16, "t": "the clerk of court pursuant to this Section shall be deposited in the Consolidated", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 713, "p": 25, "pl": 17, "t": "Judicial Expense Fund to be used by the clerk subject to allocation by the committee", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 714, "p": 25, "pl": 18, "t": "provided in R.S. 13:996.62 for expenses and maintenance of the recordation of", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 715, "p": 25, "pl": 19, "t": "historical and other archival documents.", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 716, "p": 25, "pl": 20, "t": "\u00a7182.5.  Testing sureties on bonds; new bond; forfeiture of commission for failure", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "statute_header"}, {"id": 717, "p": 25, "pl": 21, "t": "to give", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 718, "p": 25, "pl": 22, "t": "A.  The clerk of court as the parish recorder may institute proceedings by rule", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "subsection"}, {"id": 719, "p": 25, "pl": 23, "t": "in the Forty-First Judicial District Court for the parish of Orleans, if he deems it", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 720, "p": 25, "pl": 24, "t": "proper and necessary, without the payment of costs by the recorder, on all notaries", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 721, "p": 25, "pl": 25, "t": "in the parish, who are required to furnish a notarial bond to test the surety on their", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 722, "p": 25, "pl": 26, "t": "official bonds.", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 723, "p": 25, "pl": 27, "t": "B.  If the surety on an official bond so tested is judicially declared not good", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "subsection"}, {"id": 724, "p": 25, "pl": 28, "t": "and solvent as required by law, the notary whose surety has been so declared shall", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 725, "p": 25, "pl": 29, "t": "pay the costs of the rule.  The notary shall be allowed thirty days within which to", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 726, "p": 25, "pl": 30, "t": "give a new bond, and shall not be entitled to act as a notary, until time as such good", "f": "plain", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 727, "p": 26, "pl": 1, "t": "and solvent bond has been furnished.  If the notary fails to furnish such bond within", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 728, "p": 26, "pl": 2, "t": "thirty days, he shall forfeit his commission and shall pay all costs which have been", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 729, "p": 26, "pl": 3, "t": "assessed against him in any proceeding filed by the clerk of court as the parish", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 730, "p": 26, "pl": 4, "t": "recorder under the provisions of this Chapter.", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 731, "p": 26, "pl": 5, "t": "C.  Whenever the notary's commission is revoked for failure to comply with", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "subsection"}, {"id": 732, "p": 26, "pl": 6, "t": "the requirements of this Part, no judgment of any court reinstating the notary, which", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 733, "p": 26, "pl": 7, "t": "is rendered after the expiration of thirty days as provided in Subsection B of this", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 734, "p": 26, "pl": 8, "t": "Section, shall be valid.", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 735, "p": 26, "pl": 9, "t": "\u00a7182.6.  Proceedings by clerk of court against absent notaries", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "statute_header"}, {"id": 736, "p": 26, "pl": 10, "t": "Should the proper official be unable to find any notary upon whom he desires", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 737, "p": 26, "pl": 11, "t": "to make service of process in any cause brought by the clerk of court as the parish", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 738, "p": 26, "pl": 12, "t": "recorder under the authority of this Chapter, the clerk of court shall advertise such", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 739, "p": 26, "pl": 13, "t": "cause at least three times at intervals of not less than seven or more than ten days, in", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 740, "p": 26, "pl": 14, "t": "the official journal of the parish of Orleans, and if no appearance has been made by", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 741, "p": 26, "pl": 15, "t": "the defendant notary in the cause, the clerk of court shall proceed against him as", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 742, "p": 26, "pl": 16, "t": "against an absent defendant, as provided by law.", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 743, "p": 26, "pl": 17, "t": "\u00a7182.7.  Revocation of notary's commission for failure to furnish bond", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "statute_header"}, {"id": 744, "p": 26, "pl": 18, "t": "Failure of any notary to furnish proper surety bond as required by law shall", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 745, "p": 26, "pl": 19, "t": "be just cause for revocation of his notarial commission by a court of proper", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 746, "p": 26, "pl": 20, "t": "jurisdiction.", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 747, "p": 26, "pl": 21, "t": "\u00a7182.8.  Notice by clerk of court of expiration date of bond", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "statute_header"}, {"id": 748, "p": 26, "pl": 22, "t": "It is the duty of the clerk of court as the parish recorder to notify each notary", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 749, "p": 26, "pl": 23, "t": "of the expiration date of his bond, if required by law to furnish bond, within sixty and", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 750, "p": 26, "pl": 24, "t": "not less than thirty days of the date of expiration, but the failure of the clerk to give", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 751, "p": 26, "pl": 25, "t": "such notice shall not prevent the clerk from proceeding to cancel the notary's", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 752, "p": 26, "pl": 26, "t": "commission as provided herein, nor shall it relieve the notary of any duties", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 753, "p": 26, "pl": 27, "t": "prescribed by law.", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 754, "p": 26, "pl": 28, "t": "\u00a7182.9.  Rule to revoke notary's commission", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "statute_header"}, {"id": 755, "p": 26, "pl": 29, "t": "Should any notary fail or refuse to pay the annual fee fixed by R.S. 44:182.4,", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 756, "p": 26, "pl": 30, "t": "or fail or refuse to furnish the information required, or fail to provide the proper bond", "f": "plain", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 757, "p": 27, "pl": 1, "t": "as required by law, the clerk of court as the parish recorder shall promptly file a rule", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 758, "p": 27, "pl": 2, "t": "in the Forty-First Judicial District Court, or in any other court of proper jurisdiction,", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 759, "p": 27, "pl": 3, "t": "to have the notary's commission revoked, and the notary shall pay all costs of the", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 760, "p": 27, "pl": 4, "t": "proceeding.  Those monies recovered or received pursuant to this proceeding shall", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 761, "p": 27, "pl": 5, "t": "be deposited by the clerk of court in the Consolidated Judicial Expense Fund.", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 762, "p": 27, "pl": 6, "t": "\u00a7182.10.  Misdemeanor to act after expiration of bond or after surety canceled", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "statute_header"}, {"id": 763, "p": 27, "pl": 7, "t": "A notary who knowingly and willfully acts as such after the expiration of his", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 764, "p": 27, "pl": 8, "t": "bond, or after the surety on his bond has been canceled as provided by law, is guilty", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 765, "p": 27, "pl": 9, "t": "of a misdemeanor, punishable by a fine of not less than fifty dollars nor more than", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 766, "p": 27, "pl": 10, "t": "five hundred dollars or by imprisonment for not less than ten days nor more than six", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 767, "p": 27, "pl": 11, "t": "months.", "f": "new", "s": "5", "st": "statutory_enactment", "lt": "continuation"}, {"id": 768, "p": 27, "pl": 12, "t": "Section 6.  Except as expressly otherwise provided in this Act, the term \"clerk of", "f": "plain", "s": "6", "st": "definition", "lt": "section_header"}, {"id": 769, "p": 27, "pl": 13, "t": "court\" as used in Sections 5 through 18 of this Act shall mean the clerk of the Civil District", "f": "plain", "s": "6", "st": "definition", "lt": "continuation"}, {"id": 770, "p": 27, "pl": 14, "t": "Court for the parish of Orleans, until such time as the clerk of the Forty-First Judicial District", "f": "plain", "s": "6", "st": "definition", "lt": "continuation"}, {"id": 771, "p": 27, "pl": 15, "t": "Court has been elected and takes office, after which time references to the clerk of court", "f": "plain", "s": "6", "st": "definition", "lt": "continuation"}, {"id": 772, "p": 27, "pl": 16, "t": "shall mean the clerk of the Forty-First Judicial District Court.", "f": "plain", "s": "6", "st": "definition", "lt": "continuation"}, {"id": 773, "p": 27, "pl": 17, "t": "Section 7.  The city of New Orleans shall continue to provide quarters for the conduct", "f": "plain", "s": "7", "st": "transition", "lt": "section_header"}, {"id": 774, "p": 27, "pl": 18, "t": "of the functions of the offices transferred to the clerk of court as provided in this Act in the", "f": "plain", "s": "7", "st": "transition", "lt": "continuation"}, {"id": 775, "p": 27, "pl": 19, "t": "city of New Orleans in the building in which the Civil Section of the Forty-First Judicial", "f": "plain", "s": "7", "st": "transition", "lt": "continuation"}, {"id": 776, "p": 27, "pl": 20, "t": "District Court holds court or other quarters contiguous thereto which shall be good and", "f": "plain", "s": "7", "st": "transition", "lt": "continuation"}, {"id": 777, "p": 27, "pl": 21, "t": "sufficient for the proper and efficient operation of the recordation of records and documents,", "f": "plain", "s": "7", "st": "transition", "lt": "continuation"}, {"id": 778, "p": 27, "pl": 22, "t": "including the installation and maintenance of appropriate fire protection and climate control", "f": "plain", "s": "7", "st": "transition", "lt": "continuation"}, {"id": 779, "p": 27, "pl": 23, "t": "systems.", "f": "plain", "s": "7", "st": "transition", "lt": "continuation"}, {"id": 780, "p": 27, "pl": 24, "t": "Section 8.  All books, papers, records, money, actions, and other property of every", "f": "plain", "s": "8", "st": "procedural", "lt": "section_header"}, {"id": 781, "p": 27, "pl": 25, "t": "kind and description, movable and immovable, real and personal, possessed, controlled, or", "f": "plain", "s": "8", "st": "procedural", "lt": "continuation"}, {"id": 782, "p": 27, "pl": 26, "t": "used by each office transferred to the clerk of court by this Act shall be transferred with each", "f": "plain", "s": "8", "st": "procedural", "lt": "continuation"}, {"id": 783, "p": 27, "pl": 27, "t": "office to the office of the clerk of court as the parish recorder and shall continue to be", "f": "plain", "s": "8", "st": "procedural", "lt": "continuation"}, {"id": 784, "p": 27, "pl": 28, "t": "controlled and used by each office so transferred until the respective office is abolished as", "f": "plain", "s": "8", "st": "procedural", "lt": "continuation"}, {"id": 785, "p": 27, "pl": 29, "t": "provided in this Act.", "f": "plain", "s": "8", "st": "procedural", "lt": "continuation"}, {"id": 786, "p": 28, "pl": 1, "t": "Section 9.  The legislature hereby specifically states that this Act is in no way and", "f": "plain", "s": "9", "st": "savings_clause", "lt": "section_header"}, {"id": 787, "p": 28, "pl": 2, "t": "to no extent intended to nor shall it be construed in any manner  "lt": "continuation"}, {"id": 798, "p": 28, "pl": 13, "t": "documents in the continuation, disposition, and enforcement of said legal proceeding shall", "f": "plain", "s": "11", "st": "savings_clause", "lt": "continuation"}, {"id": 799, "p": 28, "pl": 14, "t": "be applicable to the office of clerk of court as the parish recorder without the necessity for", "f": "plain", "s": "11", "st": "savings_clause", "lt": "continuation"}, {"id": 800, "p": 28, "pl": 15, "t": "amendment of any document.", "f": "plain", "s": "11", "st": "savings_clause", "lt": "continuation"}, {"id": 801, "p": 28, "pl": 16, "t": "Section 12.  Wherever any office transferred hereby is referred to or designated by", "f": "plain", "s": "12", "st": "transition", "lt": "section_header"}, {"id": 802, "p": 28, "pl": 17, "t": "the constitution or by any law or contract or other document, after the effective date of the", "f": "plain", "s": "12", "st": "transition", "lt": "continuation"}, {"id": 803, "p": 28, "pl": 18, "t": "transfer of such office such reference or designation shall be deemed to apply to the office", "f": "plain", "s": "12", "st": "transition", "lt": "continuation"}, {"id": 804, "p": 28, "pl": 19, "t": "of the clerk of court as the parish recorder.", "f": "plain", "s": "12", "st": "transition", "lt": "continuation"}, {"id": 805, "p": 28, "pl": 20, "t": "Section 13.  The clerk of court as the recorder for the parish of Orleans shall be the", "f": "plain", "s": "13", "st": "procedural", "lt": "section_header"}, {"id": 806, "p": 28, "pl": 21, "t": "successor in every way to the offices of the custodian of notarial records, the register of", "f": "plain", "s": "13", "st": "procedural", "lt": "continuation"}, {"id": 807, "p": 28, "pl": 22, "t": "conveyances, and the recorder of mortgages upon the abolition of the respective office, and", "f": "plain", "s": "13", "st": "procedural", "lt": "continuation"}, {"id": 808, "p": 28, "pl": 23, "t": "every act done in the exercise of such functions by the clerk of court as the recorder for the", "f": "plain", "s": "13", "st": "procedural", "lt": "continuation"}, {"id": 809, "p": 28, "pl": 24, "t": "parish of Orleans shall be deemed to have the same force and effect under any provision of", "f": "plain", "s": "13", "st": "procedural", "lt": "continuation"}, {"id": 810, "p": 28, "pl": 25, "t": "the constitution and laws, as if done by the office of the custodian of notarial records, the", "f": "plain", "s": "13", "st": "procedural", "lt": "continuation"}, {"id": 811, "p": 28, "pl": 26, "t": "register of conveyances, or the recorder of mortgages, as the case may be.", "f": "plain", "s": "13", "st": "procedural", "lt": "continuation"}, {"id": 812, "p": 28, "pl": 27, "t": "Section 14.(A)  R.S. 13:1031 through 1147, 1271 through  1312,  1335 through 1347,", "f": "plain", "s": "14", "st": "repeal", "lt": "section_header"}, {"id": 813, "p": 28, "pl": 28, "t": "and 1381.1 through 1400 are hereby repealed in their entirety effective on January 1, 2027.", "f": "plain", "s": "14", "st": "repeal", "lt": "continuation"}, {"id": 814, "p": 28, "pl": 29, "t": "(B)  R.S. 13:1211 through 1212.1, 1371, 1372, and 1381 are hereby repealed in their", "f": "plain", "s": "14", "st": "repeal", "lt": "continuation"}, {"id": 815, "p": 28, "pl": 30, "t": "entirety on the date that the clerk of the Forty-First Judicial District Court takes office.", "f": "plain", "s": "14", "st": "repeal", "lt": "continuation"}, {"id": 816, "p": 29, "pl": 1, "t": "Section 15.(A)  This Section, Sections 4 through 18, of this Act shall become", "f": "plain", "s": "15", "st": "effective_date", "lt": "section_header"}, {"id": 817, "p": 29, "pl": 2, "t": "effective upon signature by the governor or, if not signed by the governor, upon expiration", "f": "plain", "s": "15", "st": "effective_date", "lt": "continuation"}, {"id": 818, "p": 29, "pl": 3, "t": "of the time for bills to become law without signature by the governor, as provided by Article", "f": "plain", "s": "15", "st": "effective_date", "lt": "continuation"}, {"id": 819, "p": 29, "pl": 4, "t": "III, Section 18 of the Constitution of Louisiana.  If this Act is vetoed by the governor and", "f": "plain", "s": "15", "st": "effective_date", "lt": "continuation"}, {"id": 820, "p": 29, "pl": 5, "t": "subsequently approved by the legislature, the provisions of this Section, Sections 4 through", "f": "plain", "s": "15", "st": "effective_date", "lt": "continuation"}, {"id": 821, "p": 29, "pl": 6, "t": "18, of this Act shall become effective on the day following such approval.", "f": "plain", "s": "15", "st": "effective_date", "lt": "continuation"}, {"id": 822, "p": 29, "pl": 7, "t": "(B)  For purposes of qualification and election of one clerk of the Forty-First Judicial", "f": "plain", "s": "15", "st": "effective_date", "lt": "continuation"}, {"id": 823, "p": 29, "pl": 8, "t": "District Court as provided therein, the provisions of R.S. 13:751.1(A)(1) as enacted by", "f": "plain", "s": "15", "st": "effective_date", "lt": "continuation"}, {"id": 824, "p": 29, "pl": 9, "t": "Section 2 of this Act and the provisions of Section 17 of this Act shall become effective", "f": "plain", "s": "15", "st": "effective_date", "lt": "continuation"}, {"id": 825, "p": 29, "pl": 10, "t": "upon signature by the governor or, if not signed by the governor, upon expiration of the time", "f": "plain", "s": "15", "st": "effective_date", "lt": "continuation"}, {"id": 826, "p": 29, "pl": 11, "t": "for bills to become law without signature by the governor, as provided by Article III, Section", "f": "plain", "s": "15", "st": "effective_date", "lt": "continuation"}, {"id": 827, "p": 29, "pl": 12, "t": "18 of the Constitution of Louisiana.  If vetoed by the governor and subsequently approved", "f": "plain", "s": "15", "st": "effective_date", "lt": "continuation"}, {"id": 828, "p": 29, "pl": 13, "t": "by the legislature, such provisions shall become effective on the day following such", "f": "plain", "s": " const LAWS = [{"id": "RS_13-0001", "stat": "R.S. 13:1", "title": "Duties of minute clerks of courts of Orleans Parish", "cat": "amended", "action": "Amend", "lines": ["RS 13:1", "TITLE 13. \u00a0COURTS AND JUDICIAL PROCEDURE", "CHAPTER 1. \u00a0JUDICIAL OFFICERS AND EMPLOYEES, IN GENERAL", "PART I. \u00a0GENERAL PROVISIONS", "\u00a71. \u00a0Duties of the minute clerks of courts of Orleans Parish", "The minute clerks of the court of appeals and of the civil and criminal district courts of the parish of Orleans shall attend the sessions of the court for which they are appointed, and shall, under the supervision of the judge or judges of the courts, keep the minutes of the court, issue all notices, copies of rules and orders entered on the minutes, which are required to be issued, and make due entries on the dockets of the causes and of the proceedings therein, and shall perform such other duties as the judges may direct.", "Acts 2006, No. 621, \u00a72, eff. Jan 1, 2009; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2012, No. 474, \u00a75(A)."]}, {"id": "RS_13-0474", "stat": "R.S. 13:474", "title": "Registry of the district court; designation", "cat": "amended", "action": "Amend", "lines": ["RS 13:474", "\u00a7474. \u00a0Registry of the district court; designation", "The district judges shall designate in each of the parishes in their respective judicial districts, the fiscal agent of each parish in his district, the parish of Orleans excepted, as a depository of any and all monies, stocks, bonds, notes, deeds, contracts or documents of any nature belonging to minors, interdicts, absentees or persons unknown, when, for any purpose, and for the benefit of such person or persons it is desired to keep such property safely. \u00a0The bank so designated as the fiscal agent shall be known as the registry of the court in and for the parish and district concerned.", "Acts 2006, No. 621, \u00a72, eff. Jan. 1, 2009; Acts 2012, No. 474, \u00a75(A)."]}, {"id": "RS_13-0842", "stat": "R.S. 13:842", "title": "Advance costs", "cat": "amended", "action": "Amend", "lines": ["RS 13:842", "\u00a7842. \u00a0Advance costs", "A. \u00a0The clerks of the district courts shall demand and receive from the plaintiff or plaintiffs in each ordinary suit, whether accompanied by conservatory writs or not, not less than twenty dollars or such other amount as may be fixed by law for advanced costs, to be disbursed to the clerk's salary fund or to others as their fees accrue. \u00a0Whenever the costs have exhausted the amount of the original advance deposit, the clerk may refuse to perform any further function in the proceeding until the additional costs for the function have been paid, in accordance with the fees set forth in R.S. 13:841 or, in Orleans Parish, in R.S. 13:1213.", "B. \u00a0After an ordinary suit has been filed, if a period of five years elapses without any pleadings being filed and the suit has been completely inactive during this five-year period, the clerk shall refund any unused balance remaining in the clerk's advance deposit fund (to the credit of this particular suit) to the person who made the original deposit, after paying all fees or other charges of record in the suit. \u00a0Probate matters are specifically excepted from the provisions of this Subsection.", "Amended by Acts 1954, No. 483, \u00a71; Acts 1974, No. 541, \u00a71; Acts 1978, No. 180, \u00a71; Acts 2006, No. 621, \u00a72, eff. Jan. 1, 2009; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2012, No. 474, \u00a75(A)."]}, {"id": "RS_13-0474.1", "stat": "R.S. 13:474.1", "title": "Judicial depository for 41st JDC", "cat": "enacted", "action": "Enact", "lines": ["RS 13:474.1", "\u00a7474.1. \u00a0Repealed by Acts 2012, No. 474, \u00a74."]}, {"id": "RS_13-0477", "stat": "R.S. 13:477", "title": "Judicial districts - 41st District", "cat": "enacted", "action": "Enact", "lines": ["RS 13:477", "\u00a7477. Judicial districts", "There shall be forty-one judicial districts in the tle": "Fees and fines - 41st JDC", "cat": "enacted", "action": "Enact", "lines": ["RS 13:996.64", "\u00a7996.64. \u00a0Repealed by Acts 2012, No. 474, \u00a74."]}, {"id": "RS_44-0181.5", "stat": "R.S. 44:181.5", "title": "Separate account for parish recorder", "cat": "enacted", "action": "Enact", "lines": ["RS 44:181.5", "\u00a7181.5. \u00a0Repealed by Acts 2012, No. 474, \u00a74."]}, {"id": "RS_44-0181.6", "stat": "R.S. 44:181.6", "title": "Office and facilities for parish recorder", "cat": "enacted", "action": "Enact", "lines": ["RS 44:181.6", "\u00a7181.6. \u00a0Repealed by Acts 2012, No. 474, \u00a74."]}, {"id": "RS_44-0182.10", "stat": "R.S. 44:182.10", "title": "Criminal penalty - Acting after bond expiration", "cat": "enacted", "action": "Enact", "lines": ["RS 44:182.10", "\u00a7182.10. \u00a0Repealed by Acts 2007, No. 212, \u00a71, eff. July 2, 2007."]}, {"id": "RS_44-0182.2", "stat": "R.S. 44:182.2", "title": "Notary list", "cat": "enacted", "action": "Enact", "lines": ["RS 44:182.2", "\u00a7182.2. \u00a0Repealed by Acts 2007, No. 212, \u00a71, eff. July 2, 2007."]}, {"id": "RS_44-0182.3", "stat": "R.S. 44:182.3", "title": "Notary statement to parish recorder", "cat": "enacted", "action": "Enact", "lines": ["RS 44:182.3", "\u00a7182.3. \u00a0Repealed by Acts 2007, No. 212, \u00a71, eff. July 2, 2007."]}, {"id": "RS_44-0182.4", "stat": "R.S. 44:182.4", "title": "Notary annual fee", "cat": "enacted", "action": "Enact", "lines": ["RS 44:182.4", "\u00a7182.4. \u00a0Repealed by Acts 2007, No. 212, \u00a71, eff. July 2, 2007."]}, {"id": "RS_44-0182.5", "stat": "R.S. 44:182.5", "title": "Testing sureties on bonds", "cat": "enacted", "action": "Enact", "lines": ["RS 44:182.5", "\u00a7182.5. \u00a0Repealed by Acts 2007, No. 212, \u00a71, eff. July 2, 2007."]}, {"id": "RS_44-0182.6", "stat": "R.S. 44:182.6", "title": "Proceedings against absent notaries", "cat": "enacted", "action": "Enact", "lines": ["RS 44:182.6", "\u00a7182.6. \u00a0Repealed by Acts 2007, No. 212, \u00a71, eff. July 2, 2007."]}, {"id": "RS_44-0182.7", "stat": "R.S. 44:182.7", "title": "Revocation for failure to furnish bond", "cat": "enacted", "action": "Enact", "lines": ["RS 44:182.7", "\u00a7182.7. \u00a0Repealed by Acts 2007, No. 212, \u00a71, eff. July 2, 2007."]}, {"id": "RS_44-0182.8", "stat": "R.S. 44:182.8", "title": "Notice of bond expiration", "cat": "enacted", "action": "Enact", "lines": ["RS 44:182.8", "\u00a7182.8. \u00a0Repealed by Acts 2007, No. 212, \u00a71, eff. July 2, 2007."]}, {"id": "RS_44-0182.9", "stat": "R.S. 44:182.9", "title": "Rule to revoke notarys commission", "cat": "enacted", "action": "Enact", "lines": ["RS 44:182.9", "\u00a7182.9. \u00a0Repealed by Acts 2007, No. 212, \u00a71, eff. July 2, 2007."]}, {"id": "RS_09-2745", "stat": "R.S. 09:2745", "title": "Orleans Parish notarial/conveyance provision", "cat": "repealed", "action": "Repeal", "lines": ["RS 9:2745", "\u00a72745. \u00a0Repealed by Acts 2006, No. 621, \u00a720(B), eff. Jan. 1, 2009, and Acts 2006, No. 730, \u00a72."]}, {"id": "RS_13-1031", "stat": "R.S. 13:1031", "title": "Bonds", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1031", "SUBPART B. \u00a0CLERKS", "\u00a71031. \u00a0Bonds", "The clerks of the civil and criminal district courts shall give bond before they enter upon the discharge of the duties of their office. \u00a0The clerk of the criminal district court in the sum of ten thousand dollars, and the clerk of the civil district court shall give bond in the sum of ten thousand dollars, each with at least two solvent sureties, in favor of the governor of the state of Louisiana, for the faithful discharge of their official duties.", "Acts 1999, No. 243, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1032", "stat": "R.S. 13:1032", "title": "Sureties", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1032", "\u00a71032. \u00a0Sureties", "The sureties on the clerk's bond shall be residents of the state of Louisiana. \u00a0Prior to being accepted as surety, they shall make an oath in writing upon the bond before the judge of the court receiving the bond. \u00a0The oath shall state that after their debts and liabilities have been paid, they are worth the amount of the bond in unencumbered immovable property liable to seizure within the parish of Orleans or the state of Louisiana.", "Acts 1999, No. 243, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1033", "stat": "R.S. 13:1033", "title": "Approval; recordation", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1033", "\u00a71033. \u00a0Approval; recordation", "The bond of the clerk of the civil district court shall be examined by a majority of the judges of the court and approved by them, if they deem it good and sufficient, and the bond of the clerk of the criminal district court shall be examined by the two judges of that court and approved by them, if they deem it good and sufficient. \u00a0These bonds shall be copied in full on the minutes of the respective courts, and then shall be transmitted to and deposited and recorded in the office of the recorder of mortgages for the parish of Orleans, and recorded in the mortgage records of the several parishes of the state wherein the clerks own immovables. \u00a0They shall operate as a mortgage from the date of the registry upon the immovables of the principal obligor therein, in favor of the state, parish and all persons in interest. \u00a0Before the clerks shall commence the discharge of their duties or be recognized they shall make affidavit before their respective courts, and have the same recorded in the minutes, that they have caused their official bonds to be recorded as provided in this act. \u00a0A certified copy of the bonds, with a certificate of registry, shall be forwarded to the auditor of public accounts.", "Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1136", "stat": "R.S. 13:1136", "title": "Civil district court; judges", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1136", "PART II. \u00a0CIVIL DISTRICT COURT", "SUBPART A. \u00a0JUDGES", "\u00a71136. \u00a0Civil \u00a0district court for the parish of Orleans; judges", "A. \u00a0There shall be one civil district court for the parish of Orleans. \u00a0It shall be composed of fourteen judges. \u00a0The judges of division A through J of said court on July 1, 1979, shall continue to serve the terms for which they were elected. \u00a0Their successors shall be elected by the qualified electors of the parish of Orleans for terms of six years.", "B. \u00a0Divisions K and L of the civil district court for the parish of Orleans are hereby created for the purpose of nomination and election of the judges elected to fill the two additional judgeships created by this Section. \u00a0Judges elected to those divisions shall be elected by the qualified voters of Orleans Parish and shall have jurisdiction throughout the parish. \u00a0One judge shall be elected to and shall preside over division K and one judge shall be elected to and shall preside over \u00a0division L.", "C. \u00a0The judges elected to division K and L shall be elected for six-year terms at the congressional elections held in 1984 and every sixth year thereafter.", "D. \u00a0Divisions M and N of the civil district court for the parish of Orleans are hereby created for the purpose of nomination and election of the judges elected to fill the two additional judgeships created by this Section. \u00a0Judges elected to these divisions shall be elected by the qualified voters of Orleans Parish and shall have jurisdiction throughout the parish.", "E. \u00a0The judges elected to divisions M and N shall be elected for a six-year term at the congressional election held in 1996 and every sixth year thereafter.", "F. \u00a0The additional judges shall have the same qualifications and shall receive the same emoluments of office, compensation, and expense allowances, payable from the same sources and in the same manner, as are now or may hereafter be provided for other judges of the civil district court for the parish of Orleans. Each of such judges shall have the right to appoint a crier, stenographer and minute clerk for his own section of said court, who shall perform the same duties and receive the same compensation, payable in the same manner and from the same sources, as similar officials in other sections of divisions of said court.", "G. \u00a0All of the judges of the civil district court for the parish of Orleans shall be elected at the congressional elections, commencing in 1984 and every sixth year thereafter. Each judge shall take office on the first day of January of the year following election and shall serve through December thirty-first of the last year of his term. The term of office of judges of the civil district court for the parish of Orleans shall be six years.", "Acts 1975, No. 129, \u00a71; Acts 1979, No. 460, \u00a71, eff. July 1, 1979; Acts 1980, No. 86, \u00a71; Acts 1990, No. 8, \u00a72, eff. Jan. 1, 1991; Acts 1990, No. 8, \u00a72, eff. June 4, 1990; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2008, No. 879, \u00a71; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1137", "stat": "R.S. 13:1137", "title": "Civil District Court; jurisdiction", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1137", "\u00a71137. \u00a0Civil District Court for the Parish of Orleans; jurisdiction", "A. \u00a0The Civil District Court for the Parish of Orleans has the same civil jurisdiction as the district courts throughout the state, except as otherwise provided by law.", "B. \u00a0The court has appellate jurisdiction over all cases tried in the city courts of New Orleans where the amount in dispute, value of the movable property involved, or fund to be distributed does not exceed one hundred dollars, exclusive of interest. \u00a0These appeals shall be tried de novo by a single judge, and without a jury; however, the Civil District Court for the Parish of Orleans may provide by rule that no evidence shall be admitted on the trial de novo which was not offered in the city court unless it is shown to the satisfaction of the court that despite the exercise of reasonable diligence by the party offering it such evidence could not have been produced at the trial in the city court.", "Added by Acts 1975, No. 62, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2008, No. 879, \u00a71; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1138", "stat": "R.S. 13:1138", "title": "Domestic Relations Divisions", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1138", "\u00a71138. Domestic Relations Divisions", "A. The judges of the Civil District Court for the parish of Orleans who are in office on July 1, 1979, shall create the Domestic Relations Section of that court, by rule of court adopted on or before December 1, 1979, by the judges sitting en banc. The rule shall designate not less than two incumbent judges who shall be assigned to the Domestic Relations Section in accordance with the rules of the Civil District Court for the parish of Orleans. The Domestic Relations Section shall be assigned all cases involving domestic relations problems as defined in this Section.", "B.(1) The first two judgeships becoming vacant by death, resignation, retirement, or removal on or after August 15, 2011, shall be abolished and two new judgeships shall be created and limited, pursuant to the provisions of Article V, Section 15(A) of the Constitution of Louisiana, to family matters as provided by law, including the domestic relations matters provided for in Subsection C of this Section. In addition to such family and domestic relations matters, the judges provided for in this Subsection may serve as a duty judge and shall have the same authority as other judges of the court serving in the same capacity as a duty judge.", "(2) The provisions of this Section shall not apply to Divisions B and E unless there is a vacancy in one or both of those divisions on or after February 1, 2012.", "(3) Upon creation of the judgeships provided in Paragraph (1) of this Subsection, those judgeships shall be designated as Domestic Sections 1 and 2.", "C.(1) Domestic relations matters shall include:", "(a) Actions for divorce, annulment of marriage, establishment or disavowal of paternity of children, alimony, support of children, custody by habeas corpus or otherwise, visitation rights, and all matters incidental to any of the foregoing proceedings.", "(b) The issuance, modification, or dissolution of conservatory writs for the protection of community property.", "(c) The issuance of writs of fieri facias and garnishment under judgments for alimony, child support, and attorney fees, partition proceedings following divorce judgments, and suits for separation of property.", "(2) For the purposes of this Subsection, family or domestic relations matters shall not include tutorship proceedings.", "D. The provisions of this Section shall apply to the Civil District Court for the parish of Orleans and shall supersede to the extent of conflict with any other provision of law.", "Acts 1979, No. 460, \u00a72, eff. July 1, 1979; Acts 1990, No. 361, \u00a72, eff. Jan. 1, 1991; Acts 1991, No. 976, \u00a72; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a71, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2); Acts 2015, No. 180, \u00a71."]}, {"id": "RS_13-1139", "stat": "R.S. 13:1139", "title": "Transfer of cases", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1139", "\u00a71139. Transfer of cases", "It is the express intent of this Section that the jurisdiction conferred by law, particularly the Children's Code, upon Orleans Parish Juvenile Court shall be the same as it was prior to the enactment of Act No. 620 of the 1976 Regular Session of the Legislature and shall remain unchanged, except as otherwise provided in the Children's Code. The court shall continue to be known as Orleans Parish Juvenile Court, notwithstanding its change of name effected by Act No. 620 of the 1976 Regular Session of the Legislature and the subsequent repeal of the provisions of that Act shall not be construed or interpreted to change its jurisdiction, its powers, its duties, its various departments or its personnel, except as herein set forth and provided.", "Added by Acts 1979, No. 460, \u00a73, eff. July 1, 1979; Acts 1991, No. 976, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a7\u00a72, 3, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2); Acts 2021, No. 158, \u00a72."]}, {"id": "RS_13-1140.1", "stat": "R.S. 13:1140.1", "title": "Separate environmental docket", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1140.1", "\u00a71140.1. \u00a0Separate environmental docket of the Civil District Court for the parish of Orleans or successor court", "A separate environmental docket of the Civil District Court for the parish of Orleans, or the successor to such court, is established into which the public authority, as defined in R.S. 33:1373(B)(6), or other party may request allotment or transfer of cases brought pursuant to R.S. 33:1373.", "Acts 2008, No. 736, \u00a71, eff. July 3, 2008; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1140", "stat": "R.S. 13:1140", "title": "Jurisdiction of Civil District Court", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1140", "\u00a71140. \u00a0Jurisdiction of civil district court for the parish of Orleans", "A. \u00a0Pursuant to the authority vested by Sections 16, 18 and 32 of Article V of the Constitution, the civil district court for the parish of Orleans is hereby vested with jurisdiction of certain cases previously under the jurisdiction of the Orleans Parish Family Court, it being the intent of this Section that all facets and cases involving domestic relation problems hereafter shall be filed and heard before a single court, namely, the civil district court for the parish of Orleans which court shall have exclusive original jurisdiction over all cases involving domestic relations problems, more specifically the following, to wit:", "(1) \u00a0Actions for divorce, annulment of marriage, establishment or disavowal of paternity of children, alimony, support of children, custody by habeas corpus or otherwise, visitation rights, and all matters incidental to any of the foregoing proceedings.", "(2) \u00a0The issuance, modification, or dissolution of conservatory writs for the protection of community property.", "(3) \u00a0Repealed by Acts 1991, No. 976, \u00a72.", "B. \u00a0The civil district court for the parish of Orleans shall continue to retain jurisdiction with respect to the issuance of writs of fieri facias and garnishment under judgments for alimony, child support, and attorney fees. \u00a0The civil district court likewise shall retain jurisdiction over tutorships, partition proceedings following divorce judgments, and suits for separation of property.", "C. \u00a0With respect to cases and jurisdiction transferred herein, the civil sheriff for the parish of Orleans is hereby vested with the power and authority to serve all notices, subpoenas, papers, and writs and to make proper return thereto to the civil district court for the parish of Orleans.", "D. \u00a0The said civil district court shall have all other jurisdiction it had prior to the adoption of Act 620 of the Regular Session of the Legislature of 1976.", "Acts 1979, No. 460, \u00a74, eff. July 1, 1979; Acts 1990, No. 361, \u00a72, eff. Jan. 1, 1991; Acts 1991, No. 976, \u00a72; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2008, No. 879, \u00a71; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1141", "stat": "R.S. 13:1141", "title": "Domestic Relations Section; nonrefundable fee", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1141", "\u00a71141. Domestic Relations Section; nonrefundable fee; assessment and disposition", "A. In addition to all other fees and costs now or hereafter provided by law, the clerk of the Civil District Court for the parish of Orleans, except as otherwise provided by law and subject to the provisions of Code of Civil Procedure Article 5181 et seq., shall collect from every person filing any suit or proceeding in the Civil District Court for the parish of Orleans, Domestic Relations Section, a nonrefundable fee of ten dollars per such suit.", "NOTE: Subsection B eff. until Oct. 1, 2027. See Acts 2025, No. 477.", "B. The clerk of the civil district court, within thirty days of the close of each fiscal year, shall remit all costs collected pursuant to this Section to be deposited in the state treasurer's account for credit to a special statutorily dedicated fund account after meeting the requirements of Article VII, Section 9 of the Constitution of Louisiana. The monies in this account shall be invested by the state treasurer in the same manner as monies in the state general fund, and interest earned on the investment of these monies shall be credited to the account following compliance with the requirement of Article VII, Section 9(B) of the Constitution of Louisiana relative to the Bond Security and Redemption Fund. Disbursement of funds shall be made by the office of children and family services in the Department of Children and Family Services, or its successor, in accordance with Paragraph (E)(2) of this Section and only in amounts appropriated by the legislature. Monies deposited into this account shall be categorized as fees and self-generated revenue for the sole purpose of reporting related to the executive budget, supporting documents, and general appropriations bills and shall be available for annual appropriation by the legislature.", "NOTE: Subsection B as enacted by Acts 2025, No. 477, eff. Oct. 1, 2027.", "B. The clerk of the civil district court, within thirty days of the close of each fiscal year, shall remit all costs collected pursuant to this Section to be deposited in the state treasurer's account for credit to a special statutorily dedicated fund account after meeting the requirements of Article VII, Section 9 of the Constitution of Louisiana. The monies in this account shall be invested by the state treasurer in the same manner as monies in the state general fund, and interest earned on the investment of these monies shall be credited to the account following compliance with the requirement of Article VII, Section 9(B) of the Constitution of Louisiana relative to the Bond Security and Redemption Fund. Disbursement of funds shall be made by the Department of Children and Family Services, or its successor, in accordance with Paragraph (E)(2) of this Section and only in amounts appropriated by the legislature. Monies deposited into this account shall be categorized as fees and self-generated revenue for the sole purpose of reporting related to the executive budget, supporting documents, and general appropriations bills and shall be available for annual appropriation by the legislature.", "C. The monies appropriated by the legislature and disbursed from the special account shall not displace, replace, or supplant appropriations from the general fund. This Subsection shall mean that no appropriation for any fiscal year from the special account shall be made for any purpose for which a general fund appropriation was made in the previous year unless the total appropriations for the fiscal year from the state general fund for such purpose exceed general fund appropriations for the previous year.", "D. All monies in this account shall be used solely for the purpose of providing fiscal support to those non-profit organizations located and operating in the parish of Orleans and providing shelter for battered women and their children. A shelter is defined for purposes of this Section as a temporary residence providing assistance to battered women and their children in the reestablishment of independent living from a financial, emotional, and psychological perspective.", "NOTE: Paragraph (E)(1)(intro. para.) eff. until Oct. 1, 2027. See Acts 2025, No. 477.", "E.(1) Within thirty days of the receipt of such funds, the office of children and family services shall distribute the funds among those qualifying organizations. A qualifying organization must be recognized as a nonprofit organization under Section 501(c)(3) of the Internal Revenue Code and be located within the parish of Orleans and shall provide:", "NOTE: Paragraph (E)(1)(intro. para.) as enacted by Acts 2025, No. 477, eff. Oct. 1, 2027.", "E.(1) Within thirty days of the receipt of such funds, the department shall distribute the funds among those qualifying organizations. A qualifying organization shall be recognized as a nonprofit organization under Section 501(c)(3) of the Internal Revenue Code and be located within the parish of Orleans and shall provide:", "(a) A shelter with a minimum of twelve beds.", "(b) Two in-house meals per day.", "(c) Residencies for no less than fifteen days nor more than six months.", "(d) A meaningful program to assist in the reestablishment of independent living from a financial, emotional, and psychological perspective.", "(2) Funds shall be apportioned among the qualifying organizations on the same percentage basis that the qualifying organizations' points bear to the total number of points of all qualifying organizations. Each qualifying organization shall receive five points per available bed, one point for each percentage of bed occupancy during the year, and two points for each person sheltered for at least fifteen days. All figures shall be based on the qualifying organizations' performance during the preceding calendar year.", "NOTE: Paragraph (E)(3) eff. until Oct. 1, 2027. See Acts 2025, No. 477.", "(3) Organizations seeking to be qualified shall apply on an annual basis to the office of community services within the time and in the manner designated by the office of community services and afford such reasonable proof as is required to establish its entitlement to funds.", "NOTE: Paragraph (E)(3) as enacted by Acts 2025, No. 477, eff. Oct. 1, 2027.", "(3) Organizations seeking to be qualified shall apply on an annual basis to the department within the time and in the manner designated by the department and afford such reasonable proof as is required to establish its entitlement to funds.", "Acts 2006, No. 621, \u00a726, eff. Jan. 1, 2009; Acts 2009, No. 409, \u00a71, eff. July 1, 2009; Acts 2012, No. 474, \u00a7\u00a74(B)(2) and 6; Acts 2019, No. 404, \u00a73, eff. July 1, 2020; Acts 2025, No. 477, \u00a76, eff. Oct. 1, 2027."]}, {"id": "RS_13-1143", "stat": "R.S. 13:1143", "title": "Compensation of retired judge", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1143", "\u00a71143. \u00a0Compensation of retired judge", "When a judge of the civil district court retires as authorized by the constitution, he shall receive from the city of New Orleans and from the judicial expense fund two-thirds of the remuneration which he was receiving from these sources immediately prior to his retirement.", "Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1144", "stat": "R.S. 13:1144", "title": "Provision in budget", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1144", "\u00a71144. \u00a0Provision in budget", "The city of New Orleans shall provide in its budget a sum sufficient for the payment of the remuneration to retired judges of the civil district court. \u00a0This sum shall be payable to the retired judge monthly upon his own warrant.", "Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1145", "stat": "R.S. 13:1145", "title": "Assignment of cases", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1145", "\u00a71145. \u00a0Assignment of cases", "All cases, after being filed in the civil district court shall be assigned or allotted, and from time to time may be reassigned or reallotted, among the judges thereof, in accordance with rules adopted by the court.", "Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1146", "stat": "R.S. 13:1146", "title": "Judgments homologating accounts", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1146", "\u00a71146. \u00a0Judgments homologating accounts; absence or disability of judge to whom allotted", "Judgments of the civil district court homologating accounts, which have been duly advertised, and in other cases as may be designated by rules of the court, may be rendered and signed either in term time or vacation by any judge, in the absence or disability of the judge to whom the case has been allotted.", "Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1147", "stat": "R.S. 13:1147", "title": "Rules; sitting en banc", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1147", "\u00a71147. \u00a0Rules; sitting en banc", "The judges of the civil district court may adopt rules regulating the allotment, assignment and disposition of cases, and the proceedings in such trials, and may sit en banc for the purpose of testing the bonds and sureties of the clerk of the court, the recorder of mortgages, the register of conveyances, and the civil sheriff; for the trial and removal of the clerk and civil sheriff, or either of them, for the selection of jurors, and in other cases when the action of the court as a whole is required. \u00a0When sitting en banc the judge who has been longest in continuous service in the court, and in his absence the judge longest in service of those present, shall preside; and when a certificate or authentication from the court is required such judge shall be authorized to sign the same as presiding judge. \u00a0The court may, by its rules, grant the presiding judge further authority not in conflict with these provisions. \u00a0In rendering judgments en banc, the court shall conform, as far as practicable to the rules and practice of the supreme court.", "Acts 2006, No. 621, \u00a7
