rit of habeas corpus, five dollars.", "(24) \u00a0For furnishing a copy of an indictment, two dollars.", "(25) \u00a0For making transcripts of appeal and all transcripts in nonindigent cases, including bills of exceptions, motions, writs, and all court proceedings, one dollar and fifty cents per thirty-one line page to be turned over to the official court reporter or deputy court reporter who prepared same.", "(26) \u00a0In all cases where a noncommercial surety bond is actually collected by the sheriff, the clerk shall be paid the sum of seven dollars and fifty cents by the sheriff out of the amount of the forfeited bond; however, the fee provided for in this Paragraph shall not be collected in addition to any fee collected pursuant to the provisions of R.S. 13:846(A)(1)(c) for noncommercial surety bonds actually collected by the sheriff.", "Amended by Acts 1972, No. 184, \u00a71; Acts 1972, No. 638, \u00a72; Acts 1973, No. 151, \u00a71; Acts 1978, No. 776, \u00a71; Acts 1982, No. 89, \u00a71; Acts 1994, 3rd Ex. Sess., No. 43, \u00a71, eff. July 1, 1994; Acts 2006, No. 621, \u00a719(B), eff. when the clerk of the 41st JDC takes office; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1382", "stat": "R.S. 13:1382", "title": "Jury terms", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1382", "\u00a71382. \u00a0Jury terms", "A. \u00a0There shall be monthly jury terms of the criminal district court, beginning on the first Monday of each calendar month and continuing until the first Monday of the next ensuing calendar month. \u00a0When any first Monday is a legal holiday, the jury term shall begin on the next succeeding day not a legal holiday. \u00a0The jury term shall be assigned to the several sections of the court as follows: the January, April, July and October terms to sections \"A\" and \"B\"; the February, May, August, and November terms to sections \"C\" and \"D\"; the March, June, September, and December terms to sections \"E\" and \"F\".", "B. \u00a0Whenever any judge of the criminal district court deems it expedient to hold a special jury term in his section of the court, he shall issue an order to the jury commissioners, not earlier than the 12th and not later than the 17th day of any calendar month, to draw a jury for his section of the court for the next ensuing calendar month. \u00a0The jury commissioners then shall draw not less than seventy-five names for the special session in the same manner that juries are drawn for the regular monthly terms of the criminal district court.", "C. \u00a0When any jury term of any section of the court occurs during the vacation, absence or disability of the presiding judge of the section, then a judge of the court not on vacation, absent or suffering from disability selected by the remaining judges of the court, shall hold the jury term and preside at the sessions of the section. \u00a0Should the remaining judges of the court fail to make this selection, then the presiding judge of the court shall assign a judge of the court to act until the absent judge shall have resumed the discharge of his duties.", "Amended by Acts 1950, No. 382, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1383", "stat": "R.S. 13:1383", "title": "Sections; court buildings", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1383", "\u00a71383. \u00a0Sections; court buildings", "There shall be ten separate sections of Criminal District Court for the Parish of Orleans, designated as Sections A through J. \u00a0Each shall be presided over by one of the judges. \u00a0The judges shall hold court in one building to be provided by the city of New Orleans.", "Added by Acts 1975, No. 143, \u00a71; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1384", "stat": "R.S. 13:1384", "title": "Criminal district courts; office positions", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1384", "\u00a71384. \u00a0Criminal district courts; office or positions and functions", "Each criminal district court in the parish of Orleans shall have a position or office of judicial administrator, deputy judicial administrator, and assistants, at least thirteen law clerks, and at least four secretaries and shall provide for the conduct of the jury commission and sanity hearings, the cost of all of which shall be appropriated in the appropriation bill which provides for judicial expenses and shall be allocated by the Judicial Budgetary Control Council to such court.", "Acts 2003, No. 169, \u00a71, eff. June 2, 2003; Acts 2004, No. 701, \u00a71, eff. July 6, 2004; Acts 2006, No. 621, \u00a719(A), eff. Jan. 1, 2009; Acts 2008, No. 675, \u00a71, eff. July 1, 2008; Acts 2008, No. 873, \u00a71, eff. July 9, 2008; Acts 2011, 1st Ex. Sess., No. 38, \u00a71; Acts 2011, No. 340, \u00a72, eff. June 29, 2011; Acts 2012, No. 474, \u00a74(B)(2)."]}, {"id": "RS_13-1385", "stat": "R.S. 13:1385", "title": "Previously repealed by Acts 1993", "cat": "repealed", "action": "Repeal", "lines": ["RS 13:1385", "\u00a71385. \u00a0REPEALED BY ACTS 1993, NO. 834, \u00a76, EFF. JUNE 22, 1993."]}, {"id": "CCP-5181", "stat": "CCP:5181", "title": "Privilege of proceeding without prior payment of costs", "cat": "referenced", "action": "Reference", "lines": ["CCP 5181", "CHAPTER 5. PAYMENT OF STATE INHERITANCE TAXES", "Art. 5181. Privilege of proceeding without prior payment of costs", "A. Except as provided in Paragraph B of this Article, an individual who is unable to pay the costs of court because of poverty and lack of means may prosecute or defend a judicial proceeding, including a succession pro a0\u00a0\u00a0\u00a0\u00a0\u00a0$\u00a0105.00 to all advance \u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0cost.", "C. The court for good cause shown may require a prisoner to pay more or less advance cost than is required by the schedule in Paragraph B of this Article if the court finds that the prisoner's prior financial record makes reliance on his present economic status inappropriate.", "Amended by Acts 1964, No. 336, \u00a71; Acts 1972, No. 663, \u00a71. Acts 1984, No. 509, \u00a71; Acts 2025, No. 34, \u00a71."]}, {"id": "CCP-5182", "stat": "CCP:5182", "title": "Restrictions on privilege", "cat": "referenced", "action": "Reference", "lines": ["CCP 5182", "Art. 5182. \u00a0Restrictions on privilege", "The privilege granted by this Chapter shall be restricted to litigants who are clearly entitled to it, with due regard to the nature of the proceeding, the court costs which otherwise would have to be paid, and the ability of the litigant to pay them or furnish security therefor, so that the fomentation of litigation by an indiscriminate resort thereto may be discouraged, without depriving a litigant of its benefits if he is entitled thereto."]}, {"id": "CCP-5183", "stat": "CCP:5183", "title": "Affidavits of poverty; documentation; order", "cat": "referenced", "action": "Reference", "lines": ["CCP 5183", "Art. 5183. Affidavits of poverty; documentation; order", "A. A person who wishes to exercise the privilege granted in this Chapter shall apply to the court for permission to do so in his first pleading, or in an ex parte written motion if requested later, to which the applicant shall annex the following:", "(1) The applicant's affidavit that the applicant is unable to pay the costs of court in advance, or as they accrue, or to furnish security therefor, because of the applicant's poverty and lack of means, accompanied by any supporting documentation.", "(2) The affidavit of a third person other than the applicant's attorney that he knows the applicant, knows the applicant's financial condition, and believes that the applicant is unable to pay the costs of court in advance, or as they accrue, or to furnish security therefor.", "(3) Repealed by Acts 2023, No. 5, \u00a73.", "B.(1) Upon the filing of the completed application and supporting affidavits, the court shall render an order that does one of the following:", "(a) Grants the application and allows the applicant to litigate or to continue the litigation without paying the costs in advance.", "(b) Denies the application with written reasons for such denial.", "(c) Sets the matter for a contradictory hearing.", "(2) The submission by the applicant of supporting documentation that the applicant is receiving public assistance benefits or that the applicant's income is less than or equal to one hundred twenty-five percent of the federal poverty level shall create a rebuttable presumption that the applicant is entitled to the privilege granted in this Chapter. If the court finds that the presumption has been rebutted, it shall provide written reasons for its finding.", "(3) The court may reconsider its original order granting the application on its own motion at any time in a contradictory hearing.", "Amended by Acts 1984, No. 456, \u00a71; Acts 1997, No. 1122, \u00a71, eff. July 14, 1997; Acts 1997, No. 1205, \u00a71; Acts 2021, No. 416, \u00a71; Acts 2023, No. 5, \u00a73."]}, {"id": "CCP-5184", "stat": "CCP:5184", "title": "Traverse of affidavits of poverty", "cat": "referenced", "action": "Reference", "lines": ["CCP 5184", "Art. 5184. \u00a0Traverse of affidavits of poverty", "A. \u00a0An adverse party or the clerk of the court in which the litigation is pending may traverse the facts alleged in the affidavits of poverty, and the right of the applicant to exercise the privilege granted in this Chapter, by a rule against him to show cause why the order of court permitting him to litigate, or to continue the litigation, without paying the costs in advance, or as they accrue, or furnishing security therefor, should not be rescinded. \u00a0However, only one rule to traverse the affidavit of poverty shall be allowed, whether the rule is filed by an adverse party or the clerk of court.", "B. \u00a0The court shall rescind its order if, on the trial of the rule to traverse, it finds that the litigant is not entitled to exercise the privilege granted in this Chapter.", "Acts 1990, No. 179, \u00a71."]}, {"id": "CCP-5185", "stat": "CCP:5185", "title": "Rights of party permitted to litigate without payment of costs", "cat": "referenced", "action": "Reference", "lines": ["CCP 5185", "Art. 5185. Rights of party permitted to litigate without payment of costs", "A. When an order of court permits a party to litigate without the payment of costs until this order is rescinded or expires, the party is entitled to:", "(1) All services required by law of a sheriff, clerk of court, court reporter, notary, or other public officer in, or in connection with, the judicial proceeding, including but not limited to the filing of pleadings and exhibits, the issuance of certificates, the certification of copies of notarial acts and public records, the issuance and service of subpoenas and process, the taking and transcribing of testimony, and the preparation of a record of appeal.", "(2)(a) The right to the compulsory attendance of not more than six witnesses for the purpose of testifying, either in court or by deposition, without the payment of the fees, mileage, and other expenses allowed these witnesses by law. If a party has been permitted to litigate without full payment of costs and is unable to pay for witnesses desired by the party, in addition to those summoned at the expense of the parish, the party shall make a sworn application to the court for the additional witnesses. The application shall allege that the testimony is relevant and material and not cumulative and that the defendant cannot safely go to trial without it. A short summary of the expected testimony of each witness shall be attached to the application.", "(b) The court shall make a private inquiry into the facts and, if satisfied that the party is entitled to the privilege, shall render an order permitting the party to subpoena additional witnesses at the expense of the parish. If the application is denied, the court shall state the reasons for the denial in writing, which shall become part of the record.", "(3) The right to a trial by jury and to the services of jurors, when allowed by law and applied for timely.", "(4) The right to have any judgment or order filed and to receive one certified copy of the judgment or order.", "(5) The right to a devolutive appeal, and to apply for supervisory writs.", "B. The party is not entitled to a suspensive appeal, or to an order or judgment required by law to be conditioned on his furnishing security other than for costs, unless the party furnishes the necessary security therefor.", "C. No public officer is required to make any cash outlay to perform any duty imposed on him under any Article in this Chapter, except to pay witnesses summoned at the expense of the parish the witness fee and mileage to which they are entitled.", "Amended by Acts 1964, No. 4, \u00a71. Acts 1984, No. 541, \u00a71; Acts 2021, No. 416, \u00a71."]}, {"id": "CCP-5186", "stat": "CCP:5186", "title": "Account and payment of costs", "cat": "referenced", "action": "Reference", "lines": ["CCP 5186", "Art. 5186. Account and payment of costs", "A. An account shall be kept of all costs incurred by a party who has been permitted to litigate without the payment of costs, by the public officers to whom these costs would be payable.", "B. If a party has been permitted to proceed without the payment of costs in a succession proceeding, the court shall order the payment from succession assets of all costs due to any public officer.", "C. If judgment is rendered in favor of the indigent party, the party against whom the judgment is rendered shall be condemned to pay all costs due to a public officer, who shall have a privilege on the judgment superior to the rights of the indigent party or his attorney. If judgment is rendered condemning the indigent party to pay court costs, an affidavit of the account by an officer to whom costs are due shall be recorded in the mortgage records and shall have the effect of a judgment for the payment due.", "Amended by Acts 1981, No. 545, \u00a71; Acts 1993, No. 852, \u00a71; Acts 1997, No. 408, \u00a71; Acts 2025, No. 34, \u00a71."]}, {"id": "CCP-5187", "stat": "CCP:5187", "title": "Compromise; dismissal of proceedings prior to judgment", "cat": "referenced", "action": "Reference", "lines": ["CCP 5187", "Art. 5187. \u00a0Compromise; dismissal of proceedings prior to judgment", "No compromise shall be effected unless all costs due these officers have been paid. \u00a0Should any compromise agreement be entered into in violation of this article, each party thereto is liable to these officers for all costs due them at the time.", "No judicial proceeding in which a party has been permitted to litigate without the payment of costs shall be dismissed prior to judgment, unless all costs due these public officers have been paid, or there is annexed to the written motion to dismiss the certificates of all counsel of record that no compromise has been effected or is contemplated.", "No release of a claim or satisfaction of a judgment shall be effective between the parties to a judicial proceeding in which one of the parties has been permitted to litigate without the payment of costs unless all costs due the clerk of court have been paid. \u00a0The clerk of court shall have a lien for the payment of such costs superior to that of any other party on any monies or other assets transferred in settlement of such claim or satisfaction of such judgment and shall be entitled to collect reasonable attorney's fees in any action to enforce this lien for the payment of such costs.", "Amended by Acts 1982, No. 533, \u00a71."]}, {"id": "CCP-5188", "stat": "CCP:5188", "title": "Unsuccessful party condemned to pay costs", "cat": "referenced", "action": "Reference", "lines": ["CCP 5188", "Art. 5188. \u00a0Unsuccessful party condemned to pay costs", "Except as otherwise provided by Articles 1920 and 2164, if judgment is rendered against a party who has been permitted to litigate without the payment of costs, he shall be condemned to pay the costs incurred by him, in accordance with the provisions of Article 5186, and those recoverable by the adverse party. \u00a0The failure of the indigent party to pay the costs specified in this Article shall not prevent entry of a judgment in favor of any party who is not responsible for the costs.", "Acts 1993, No. 852, \u00a71; Acts 2012, No. 741, \u00a71."]}, {"id": "CONST_03-18", "stat": "CONST_03:18", "title": "Gubernatorial Action on Bills", "cat": "referenced", "action": "Reference", "lines": ["CONST 3 18", "\u00a718. Gubernatorial Action on Bills; Sign, Failure to Sign, Veto; Veto Session", "Section 18.(A) Gubernatorial Action. If the governor does not approve a bill, he may veto it. A bill, except a joint resolution, shall become law if the governor signs it or if he fails to sign or veto it within ten days after delivery to him if the legislature is in the session in which the bill passed on the tenth day after such delivery, or within twenty days after delivery if the tenth day after delivery occurs after the legislative session in which the bill passed is adjourned.", "(B) Veto Message. If the governor vetoes a bill, he shall return it to the legislature, with his veto message, within twelve days after delivery to him if the legislature is in the session in which the bill passed. If the governor returns a vetoed bill after the legislative session in which the bill passed is adjourned, he shall return it, with his veto message, as provided by law.", "(C) Veto Session. (1) A bill vetoed and returned and subsequently approved by two-thirds of the elected members of each house shall become law. The legislature shall meet in veto session in the state capital at noon on the fortieth day following final adjournment of each session in which a bill that finally passed was vetoed, to consider all bills passed during that session that were vetoed by the governor and that were not reconsidered by the house of origin during the session in which the bill passed. If the fortieth day falls on Sunday, the session shall convene at noon on the succeeding Monday. No veto session shall exceed five calendar days, and any veto session may be finally adjourned prior to the end of the fifth day upon a vote of two-thirds of the elected members of each house.", "(2) No veto session shall be held if a majority of the elected members of either house declare in writing that a veto session is unnecessary. The declaration must be received by the presiding officer of the respective houses at least five days prior to the day on which the veto session is to convene.", "(3) If a veto session is to be held and the time period for the conduct of the veto session occurs during a regular or extraordinary session of the legislature, the legislature may reconsider all bills vetoed by the governor and not previously reconsidered by the legislature as part of the business of the regular or extraordinary session during the time period set forth in Subparagraph (1) of this Paragraph without the necessity of convening or adjourning a separate veto session.", "Acts 1989, No. 841, \u00a71, approved Oct. 7, 1989, eff. Nov. 7, 1989; Amended by Acts 2022, No. 278, \u00a71, approved Nov. 18, 2023, eff. Jan. 8, 2024."]}, {"id": "CONST_05-32", "stat": "CONST_05:32", "title": "Orleans Parish Courts, Officials", "cat": "referenced", "action": "Reference", "lines": ["CONST 5 32", "\u00a732. \u00a0Orleans Parish Courts, Officials", "Section 32. \u00a0Except for provisions relating to terms of office as provided elsewhere in this Article, and notwithstanding any other contrary provision of this constitution, the following courts and officers in Orleans Parish are continued, subject to change by law; the civil and criminal district courts; the city, municipal, traffic, and juvenile courts; the clerks of the civil and criminal district courts; the civil and criminal sheriffs; the constables and the clerks of the first and second city courts; the register of conveyances; and the recorder of mortgages."]}, {"id": "RS_01-0013", "stat": "R.S. 01:13", "title": "Headings and ancillary information, not part of law", "cat": "referenced", "action": "Reference", "lines": ["RS 1:13", "\u00a713. \u00a0Headings and ancillary information, not part of law", "A. \u00a0Headings to sections, source notes, and cross references are given for the purpose of convenient reference and do not constitute part of the law.", "B. \u00a0The keyword, one-liner, summary and adjoining information, abstract, digest, and other words and phrases not contained in the section or sections of the bill following the enacting clause do not constitute part of the law.", "Acts 2006, No. 826, \u00a71."]}, {"id": "RS_13-0750.1", "stat": "R.S. 13:750.1", "title": "Personal liability of clerk/deputies", "cat": "referenced", "action": "Reference", "lines": ["RS 13:750.1", "\u00a7750.1. \u00a0Personal liability of the clerk, his deputies and employees", "A. \u00a0The clerk of court is not personally liable for any damage or loss arising out of the performance of the duties imposed upon him in any capacity or for any reason unless the damage or loss is caused by his willful, wanton, or intentional act designed to cause injury. \u00a0Neither is the clerk personally liable for the actions or negligence of any deputy or employee appointed or employed by him in the performance of any duty or obligation imposed upon the clerk in any capacity.", "B. \u00a0No deputy or other employee of the clerk of court employed or appointed for the performance of any duty or obligation imposed upon the clerk by law as clerk of the court, ex officio recorder of mortgages and conveyances, or in any other capacity is liable for any damage or loss arising out of or related to the performance of his duties unless the damage or loss is caused by his willful, wanton, or intentional act designed to cause injury.", "C. \u00a0Neither the clerk in his official capacity nor any of the deputies or employees are liable for improperly filing, failing or refusing to file, erroneously issuing or failing to issue or canceling any instrument from the records of his office or in taking any other action with respect to his records, their indexes or other performance of his duties when:", "(1) \u00a0The clerk has been directed to do so by order of any court of the state or United States or by any sheriff, marshal, or other officer pursuant to execution of a writ issued by such a court or when an officer is otherwise acting or purporting to act in his official capacity.", "(2) \u00a0Acting as ex officio recorder of mortgages or conveyances, he cancels and erases from his records or takes any other action with respect to any instrument in response to a request to do so when he is presented with the evidence or documents prescribed by law authorizing the same, whether or not such requests or records are genuine or what they purport to be.", "Acts 2004, No. 769, \u00a71."]}, {"id": "RS_13-0750", "stat": "R.S. 13:750", "title": "Liability of clerk of court; limitations", "cat": "referenced", "action": "Reference", "lines": ["RS 13:750", "PART IV. \u00a0CLERKS", "SUBPART A. \u00a0GENERAL PROVISIONS", "\u00a7750. \u00a0Liability of the clerk of court; limitations", "A. \u00a0Unless the law relieves him of such, the clerk of court in his official capacity as clerk of the court, ex officio recorder of mortgages and conveyances, or in any other capacity in which he may act, is liable for any damage or loss caused by his failure to properly perform the duties and obligations of the clerk while acting in such capacity or that is caused by the fault of a clerk, his deputies, or the employees of his office arising out of the performance of their duties.", "B. \u00a0The liability of a clerk in his official capacity for the obligations of his office terminates when he ceases to hold office and his successor is appointed, who shall then succeed in his official capacity to all of the obligations of the preceding holder of the office incurred in his official capacity.", "C. \u00a0All claims against the clerk in his official capacity are extinguished four years after the act or occurrence first giving rise to the claim whether or not the basis for the liability is a continuing one. \u00a0The prescription commences to run from the day the claimant acquires, or should have acquired, knowledge of the act or occurrence first giving rise to the claim.", "Acts 2004, No. 769, \u00a71."]}, {"id": "RS_13-0782", "stat": "R.S. 13:782", "title": "Compensation of clerks", "cat": "referenced", "action": "Reference", "lines": ["RS 13:782", "\u00a7782. Compensation of clerks", "A.(1) Clerks of district courts of the various parishes shall establish their own rates of annual compensation for their services, payable out of the clerk's salary fund, which rates shall not exceed the following amounts based on the applicable population of the respective parishes, according to the latest United States census or the population estimates published pursuant to the United States Bureau of the Census Federal State Cooperative Program for Population Estimates as follows:", "Population\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0Compensation", "(a) Less than 50,000\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0$ 88,000", "(b) 50,000-200,000\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0$ 98,000", "(c) Over 200,000\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0$108,000", "(d) The annual compensation for each population class shall be increased by four percent annually through Fiscal Year 2016-2017. The applicable compensation for each fiscal year shall be used to calculate any compensation granted by Subsection J of this Section for the fiscal year.", "(e) The annual compensation for each population class shall be increased by five percent annually through Fiscal Year 2027-2028. The applicable compensation for each fiscal year shall be used to calculate any compensation granted by Subsection J of this Section for the fiscal year. The additional compensation authorized pursuant to the provisions of this Paragraph shall become effective if the clerk of a district court publishes notice of intent to increase his compensation on two separate days in the official journal of the parish in which the clerk's office is located. The last day of publication of the notice shall be at least thirty days prior to the date that the clerk of the district court increases his compensation.", "(2) A clerk is eligible to receive a salary increase as provided for by this Subsection if the clerk completes the annual certification updates and renewal courses as provided for in Subparagraph (I)(4)(c) of this Section.", "(3) Nothing in this Section shall be construed to limit clerks from participation in an approved state deferred compensation plan as specified in R.S. 42:1301 et seq. A clerk shall not authorize or receive an employer contribution that would be more favorable than that offered to the employees of the clerk's office.", "B. The governing authority of the parish of Plaquemines may pay the clerk of the Twenty-fifth Judicial District Court and ex officio recorder for said parish any such additional compensation for his services as it may deem necessary.", "C. Should any clerk of a district court receive an amount less than the maximum compensation allowed under the population category applicable to such clerk in this section, due to insufficiency of funds or other cause, and there occurs a surplus in the receipts of his office during any fiscal year within his term of office, or during any subsequent term or terms of office for which he is reelected, he shall receive out of any such surplus an amount sufficient to maintain his maximum annual compensation at the rate provided by law.", "D. In no case shall the amount of compensation received by any clerk of a district court for his services be less than nine hundred dollars per month, which sum is hereby fixed as the minimum monthly salary for any such clerk. In the event a sufficient amount is not earned from all of the fees collected by his office to provide for said minimum monthly compensation, during his term of office, or any subsequent term or terms of office for which he is re-elected, the difference between the amount earned and said minimum monthly compensation shall be paid such clerk, on his own warrant, by the governing authority of his parish.", "E. All of the maximum rates of compensation provided by this section shall be due and payable to the various clerks of the several district courts from all of the fees collected by their offices, after the salaries of deputies and assistants and any and all other expenses have been paid, as provided in R.S. 13:783(A).", "F. Any clerk of a district court who agrees to share any part of his compensation provided in this section with any other person shall forfeit his office for gross misconduct upon conviction by a court of competent jurisdiction.", "G. Notwithstanding any provision of this section or any other law to the contrary, no clerk of the district court for any parish, Orleans excepted, shall have his salary reduced because a later official United States Census shows the population of such parish to have decreased so as to place such parish within a lower population category upon which the compensation of the clerk of the district court of such parish is based as provided in this section.", "H. In addition to the above salary each individual clerk of the judicial district courts, including the register of conveyances and the recorder of mortgages for the parish of Orleans, shall be granted ten percent of his annual compensation as an expense allowance.", "I.(1) The Louisiana Clerks' of Court Certification program is hereby established to formalize and recognize the professional standards of clerks of court in the state.", "(2) Objectives. The clerks' of court certification program is designed to provide practical learning experiences which establish a curriculum that will enable the clerks of court to learn the requirements of their elected office and to establish additional professional bonds of achievement. The program will accomplish these goals by introducing clerks to new ideas that will enhance effective performance in public service; increasing the clerk's managerial competence to meet the changing environment of their parish and community; creating opportunities to enhance professional development through attendance and involvement in respective state associations; emphasizing the clerk's role as a public official and the need for continued maintenance of high standards for the clerk's office; and providing recognition for the attainment of enhanced managerial and administrative skills.", "(3) Eligibility. Only those persons holding the office of clerk of a district court shall be eligible for participation in the clerks' of court certification program.", "(4)(a) Requirements. The requisite education and training will be provided through courses of the Louisiana Clerks of Court Institute (LCCI), a continuing education program for clerks of court, offering academic training leading to professional accreditation, which was established through the Governmental Services Institute at Louisiana State University. Education and training may also be provided through courses at other state institutions of higher education or institutions of training approved by the International Association of Clerks, Recorders, Election Officials and Treasurers (IACREOT) or Louisiana Clerks of Court Association (LCCA). All such instruction shall be offered and directed toward the attainment of the certification and maintenance of said certification.", "(b)(i) A total of fifty points must be earned to meet the requirements of the professional certification program. Thirty points must be achieved under Category I - Education and twenty points must be achieved under Category II - Experience.", "(ii) Category I - Education (30 points required) Satisfactory completion of the Clerks of Court Institute approved by the Louisiana Clerks of Court Association (LCCA) or the International Association of Clerks, Recorders, Election Officials and Treasurers (IACREOT). Each session of the Clerks of Court Institute shall be twenty-five contact hours which shall equal fifteen points. A bachelor's degree in a related field may be used as fifteen points toward the satisfaction of the requirements of this category.", "(iii) Category II - Experience (20 points required) Experience as a full time Clerk of Court shall qualify for one point per year, with a maximum of ten points. Experience as a full time deputy clerk shall qualify for one-half point per year, with a maximum of ten points. Other full time administrative position on local government shall qualify for one-half point per year, with a maximum of ten points. Full time administrative position in business shall qualify for one-half point per year, with a maximum of five points. Relevant university or college credited courses shall qualify for one-half point per course, with a maximum of five points.", "(c) The clerks of court certification program will provide training opportunities and challenges for clerks of court completing the certification program to remain current with the latest developments by providing update and renewal courses on an annual basis. The general requirements for update and certification renewal will be the completion of an additional fifty points every four years. If these requirements are not met, the clerk of court will lose certification and certification compensation until recertification requirements are met.", "(d) Notwithstanding any provision of this Subsection, any clerk of court, including any clerk in the parish of Orleans, who has served fifty or more years in office as clerk shall be deemed certified under the requirements of this Subsection and shall not be required to personally attend certification renewal courses as required in this Subsection; however, such a clerk shall designate an employee of his office to attend certification renewal courses on his behalf.", "J.(1) The clerks of court certification program committee is hereby created to govern the certification program. The certification committee shall be composed of five members who shall serve one year terms and who may be reappointed. The members shall be appointed as follows:", "(a) One member shall be the chairman of the Education Committee of the Louisiana Clerks of Court Association who shall serve as chairman of the committee.", "(b) One member shall be the Program Coordinator or a representative of the Governmental Services Institute at Louisiana State University.", "(c) Three members shall be clerks of court who have achieved certification.", "(2)(a) Documents showing the successful completion of the certification program shall be submitted to and approved by the certification committee. Upon approval of the application for certification, a person holding the office of clerk of court shall receive the designation of Certified Clerk of Court, (CCC), and notice of the approval shall be forwarded to the legislative auditor by the certification committee.", "(b) If, on July 1, 1990, a clerk has completed the educational and experience requirements as provided in Subsection I of this Section and the documents showing the successful completion of the program have been submitted to and approved by the certification committee and said approval documented to the legislative auditor, the clerk shall be granted a seven percent increase in compensation to his annual salary as set forth in Subsection A of this Section.", "(c) A clerk shall complete the requirements of Paragraph I(4) of this Section in order to receive and retain the seven percent compensation enhancement. If a clerk does not complete the certification program as provided in Subsections I and J of this Section, or if after certification a clerk does not receive certification renewal within each four year period, his salary shall revert back to the salary scale provided for in Subsection A of this Section.", "K. Repealed by Acts 2013, No. 380, \u00a72, eff. June 18, 2013.", "L. Repealed by Acts 1995, No. 329, \u00a71.", "Acts 1990, No. 132, \u00a71; Acts 1990, No. 836, \u00a71, eff. July 1, 1990; Acts 1991, No. 262, \u00a71; Acts 1992, No. 595, \u00a71; Acts 1995, No. 329, \u00a71; Acts 1995, No. 536, \u00a71, eff. June 18, 1995; Acts 1997, No. 470, \u00a71; Acts 1999, No. 797, \u00a71; Acts 1999, No. 1216, \u00a71; Acts 2003, No. 157, \u00a71; Acts 2004, No. 236, \u00a71; Acts 2006, No. 724, \u00a71; Acts 2007, No. 77, \u00a71; Acts 2013, No. 380, \u00a7\u00a71, 2, eff. June 18, 2013; Acts 2024, No. 697, \u00a71, eff. July 1, 2024."]}, {"id": "RS_13-0783", "stat": "R.S. 13:783", "title": "Expenses of clerks office", "cat": "referenced", "action": "Reference", "lines": ["RS 13:783", "\u00a7783. Expenses of clerk's office", "A. The clerk shall employ all necessary deputies and assistants, fix and pay their salaries, and defray all expenses out of the clerk's salary fund.", "B. The police jury of the parish of Plaquemines may pay the clerk of court and ex-officio recorder for the parish of Plaquemines such additional expenses as it may deem necessary.", "C. The clerk shall not be required to pay the court reporter out of the clerk's salary fund or the amounts allowed to the clerk out of the clerk's salary fund for expenses. If he is not paid by the clerk, unless his compensation is otherwise fixed by law, the court reporter may collect the fees allowed by law for his services.", "D.(1)(a)(i) Each of the clerks of the district courts is hereby authorized to purchase, out of any surplus in his salary fund, an automobile for the use of his office, after having first obtained the consent of the governing authority of the parish.", "(ii) However, the consent of the governing authority shall not be necessary as to any clerk of court who prior to July 29, 1970, has purchased an automobile under authority of any previously enacted law.", "(iii) The clerks of the district courts in East Feliciana Parish, West Feliciana Parish, Livingston Parish, and St. Landry Parish shall be exempt from obtaining consent from the governing authority to purchase an automobile for office use.", "(b) Each of the clerks of court is hereby authorized to purchase insurance for the automobile with any insurance company authorized to do business under the laws of this state and to pay the premiums on the insurance out of his salary fund.", "(2) In addition to the automobile authorized to be purchased in the above Paragraph, the clerk of court of Lafayette Parish may purchase, out of any surplus in his salary fund, an additional automobile for the use of his office. Such automobile shall also be purchased in accordance with the provisions set forth in Paragraph (1) of this Subsection.", "(3) In addition to the automobile authorized to be purchased in Paragraph (1) of this Subsection, the clerk of court of Caddo Parish may purchase, out of his salary fund, an additional automobile for the use of his office. Such automobile and insurance therefor shall also be purchased in accordance with the provisions set forth in Paragraph (1) of this Subsection.", "(4) In addition to the automobile authorized to be purchased in Paragraph (1), the clerk of court of Calcasieu Parish may purchase, out of any surplus in his salary fund, in an amount not to exceed ten thousand dollars, an additional automobile for the use of his office. Such automobile and insurance therefor shall also be purchased in accordance with the provisions set forth in Paragraph (1).", "(5) Repealed by Acts 2020, No. 26, \u00a72.", "(6) The clerk of court for East Baton Rouge Parish is hereby authorized to purchase or lease the automobile authorized by Paragraph (1) of this Subsection and, in addition, is authorized to purchase or lease one additional automobile for the transportation of employees, documents, equipment, or other items related to the office of the clerk or for use for any purpose related to the operation of the office of the clerk of court. The purchase price or lease payments of an automobile authorized in this Paragraph, including the automobile insurance premiums on that automobile, shall be payable out of the clerk's salary fund. The automobile insurance shall be obtained from an insurance company authorized by law to do business in this state.", "(7) The clerk of each district court may receive an automobile expense allowance equal to fifteen percent of their annual salary provided the clerk of court maintains three hundred thousand dollars of automobile insurance per accident for bodily injury and one hundred thousand dollars of automobile insurance per accident for property damage. The expense allowance shall come from surplus funds in each of the offices of the clerks of court and at no additional expense to the state or local governing authority.", "E. Each of the clerks of the district courts is authorized to purchase, out of any surplus in his salary fund, uniforms for his deputies and assistants.", "F.(1) Each of the clerks of the district courts is authorized to contract separately or through the insurance committee that administers the clerk's insurance fund of the Louisiana Clerks of Court Association to obtain from any insurance company authorized to do business in this state, group life and accidental death and dismemberment, group health, accident, dental, hospital, surgical, or other medical expense and group disability insurance. This insurance may cover the clerk of court, the clerk's employees and retirees, dependents of the clerk, and the dependents of the clerk's employees and retirees.", "(2) The clerk may pay from the clerk's salary and expense fund the cost of insurance authorized to be contracted for by this Subsection for the clerk, his employees, and dependents of the clerk and the clerk's employees. No reduction of the insured's contribution shall be made on insurance contracts presently in effect. All costs for group insurance paid out of the clerk's salary and expense fund shall be included in each clerk's budget. The clerk, clerk's employee, or retiree shall pay any portion of the insurance cost that is not paid from the clerk's salary and expense fund.", "(3) The clerk or any clerk's employee who was a covered employee, who elects to continue coverage, and who retires under the clerks of court retirement program may elect to continue insurance coverage obtained under this Subsection and the costs may be paid in the same manner as if he were still employed provided that the clerk or clerk's employee was a clerk or clerk's employee and a member of the Louisiana Clerks' of Court Retirement and Relief Fund for at least twelve years prior to retirement and begins receiving retirement benefits immediately upon retirement from active employment.", "(4) The clerk may pay any fee for the cost of administering the clerk's insurance fund that is charged participating members. This fee may be paid from the clerk's salary and expense fund.", "(5) Any insurance cost to be paid by the clerk or the clerk's employee may be deducted directly from their salaries if so authorized. The clerk shall remit these contributions to the clerk's insurance fund when the insurance contracts are administered by that fund, or directly to any insurance company with which the clerk has contracted separately.", "(6) In the parishes of Beauregard, East Carroll, Jefferson Davis, Rapides, Richland, and Vernon, the clerk of court shall pay, from the clerk's salary fund, one hundred percent of the premium costs of the group life and accidental death and dismemberment, group health, accident, dental, hospital, surgical, or other medical expense for any employee who was a covered employee, who elects to continue coverage, and who retires from the Beauregard Parish clerk of court's office, the East Carroll Parish clerk of court's office, the Jefferson Davis Parish clerk of court's office, the Rapides Parish clerk of court's office, the Richland Parish clerk of court's office, or the Vernon Parish clerk of court's office who begins receiving monthly benefits from the Louisiana Clerks' of Court Retirement and Relief Fund immediately upon retirement from active employment and has at least twenty years of full-time service with the clerk of court's office in Beauregard Parish, East Carroll Parish, Jefferson Davis Parish, Rapides Parish, Richland Parish, or Vernon Parish. The provisions of this Paragraph shall not apply to any other insurance, such as supplemental insurance, that an employee may elect to purchase.", "(7) In the parishes of Avoyelles, Bossier, Caddo, Calcasieu, Caldwell, Cameron, Franklin, Grant, Iberia, Lafayette, LaSalle, Orleans, Ouachita, Pointe Coupee, St. Martin, St. Mary, Terrebonne, Webster, West Feliciana, and Winn, the clerk of court shall pay, from the clerk's salary fund, one hundred percent of the premium costs of the group life and accidental death and dismemberment, group health, accident, dental, hospital, surgical, or other medical expense insurance for any employee who was a covered employee, who elects to continue coverage, and who retires from the Avoyelles Parish clerk of court's office, the Bossier Parish clerk of court's office, the Caddo Parish clerk of court's office, the Calcasieu Parish clerk of court's office, the Caldwell Parish clerk of court's office, the Cameron Parish clerk of court's office, the Franklin Parish clerk of court's office, the Grant Parish clerk of court's office, the Iberia Parish clerk of court's office, the Lafayette Parish clerk of court's office, the LaSalle Parish clerk of court's office, the Orleans Parish Civil District Court clerk of court's office, the Orleans Parish Criminal District Court clerk of court's office, the Ouachita Parish clerk of court's office, the Pointe Coupee Parish clerk of court's office, the St. Martin Parish clerk of court's office, the St. Mary Parish clerk of court's office, the Terrebonne Parish clerk of court's office, the Webster Parish clerk of court's office, the West Feliciana Parish clerk of court's office, or the Winn Parish clerk of court's office who begins receiving monthly benefits from the Louisiana Clerks' of Court Retirement and Relief Fund immediately upon retirement from active employment, who has at least twenty years of full-time service with the clerk of court's office in Avoyelles Parish, Bossier Parish, Caddo Parish, Calcasieu Parish, Caldwell Parish, Cameron Parish, Franklin Parish, Grant Parish, Iberia Parish, Lafayette Parish, LaSalle Parish, Ouachita Parish, Pointe Coupee Parish, St. Martin Parish, St. Mary Parish, Terrebonne Parish, Webster Parish, West Feliciana Parish, or Winn Parish, Orleans Parish Civil District Court, or Orleans Parish Criminal District Court, and who is at least fifty-five years of age. The provisions of this Paragraph shall not apply to any other insurance, such as supplemental insurance, that an employee may elect to purchase.", "(8) The clerk of court of East Baton Rouge Parish shall pay from the clerk's salary fund one hundred percent of the premium costs of the group life and accidental death and dismemberment, group health, accident, dental, hospital, surgical, or other medical expense insurance for any clerk or employee who was a covered employee, who elects to continue coverage, and who retires from the East Baton Rouge Parish clerk of court's office who begins receiving monthly benefits from the Louisiana Clerks' of Court Retirement and Relief Fund immediately upon retirement from active employment, who has at least twelve years of full-time service with the clerk of court's office in East Baton Rouge Parish, and who is at least fifty-five years of age. The provisions of this Paragraph shall not apply to any other insurance, such as supplemental insurance, that any clerk or any employee may elect to purchase.", "(9) The clerk of court of St. James Parish, provided sufficient amounts are available, shall pay from the clerk's salary fund one hundred percent of the premium costs of the group life and accidental death and dismemberment, group health, accident, dental, hospital, surgical, or other medical expense insurance for any clerk or employee who was a covered employee, who elects to continue coverage, and who retires from the St. James Parish clerk of court's office who begins receiving monthly benefits from the Louisiana Clerks' of Court Retiremen  1961."]}, {"id": "RS_24-0177", "stat": "R.S. 24:177", "title": "Legislative intent; text, history, indices of intent", "cat": "referenced", "action": "Reference", "lines": ["RS 24:177", "\u00a7177. \u00a0Legislative intent; text, history, and other indices of intent", "A. \u00a0When the meaning of a law cannot be ascertained by the application of the provisions of Chapter 2 of the Preliminary Title of the Louisiana Civil Code and Chapter 1 of Title 1 of the Louisiana Revised Statutes of 1950, the court shall consider the intent of the legislature.", "B.(1) \u00a0The text of a law is the best evidence of legislative intent.", "(2)(a) \u00a0The occasion and necessity for the law, the circumstances under which it was enacted, concepts of reasonableness, and contemporaneous legislative history may also be considered in determining legislative intent.", "(b) \u00a0The legislature may express the intended meaning of a law in a duly adopted concurrent resolution, by the same vote and, except for gubernatorial veto and time limitations for introduction, according to the same procedures and formalities required for enactment of that law.", "C. \u00a0The legislature is presumed to have enacted an article or statute in light of the preceding law involving the same subject matter and court decisions construing those articles or statutes, and where the new article or statute is worded differently from the preceding law, the legislature is presumed to have intended to change the law.", "D. \u00a0A bill introduced but which does not become law is not competent evidence of legislative intent. \u00a0Any action by the legislature other than enactment of law or adoption of a resolution as provided in Subparagraph (B)(2)(b) of this Section shall not constitute a confession as to the meaning of the law extant.", "E.(1) \u00a0The keyword, one-liner, summary and adjoining information, abstract, digest, and other words and phrases contained outside the sections of a bill following the enacting clause are solely to provide the members of the legislature with general indicia of the content of the bill and are not subject to amendment by the legislature or any committee of the legislature and shall not constitute proof or indicia of legislative intent.", "(2) \u00a0Fiscal and actuarial notes provide the legislature with an analysis of the potential fiscal impact of a bill based on presumptions made by the legislative fiscal officer, actuary, economist, or analyst preparing the note and shall not constitute proof or indicia of legislative intent.", "(3) \u00a0Committee minutes are summary reports of committee proceedings and shall not constitute proof or indicia of legislative intent.", "(4) \u00a0Words and phrases not constituting the substance of an amendment or the recommendations of a conference committee report, and any other legislative staff documents which are not subject to amendment by the legislature or any committee of the legislature, shall not constitute proof or indicia of legislative intent.", "Acts 2006, No. 826, \u00a73."]}];

const STOP = new Set(['the','of','and','or','in','to','a','an','for','by','be','is','are','was',
  'were','been','being','have','has','had','do','does','did','will','would','shall','should',

  'further','once','here','there','all','each','every','both','few','more','most','other','some',

function normalize(t){return t.toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim()}
function tokenize(t){return normalize(t).split(' ').filter(w=>w.length>1)}
function contentWords(toks){return toks.filter(w=>!STOP.has(w)&&w.length>2)}
function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function diceCoeff(a,b){if(!a.size&&!b.size)return 0;let n=0;for(const x of a)if(b.has(x))n++;return(2*n)/(a.size+b.size)}
function idfScoreFn(qc,matched,imap){if(!qc.length)return 0;let t=0,m=0;for(const w of qc){const v=imap[w]||5;t+=v;if(matched.has(w))m+=v}return t>0?m/t:0}
function makeBigrams(toks){const s=new Set();for(let i=0;i<toks.length-1;i++)s.add(toks[i]+' '+toks[i+1]);return s}
function levenshteinNorm(a,b){
  if(!a.length||!b.length)return 0;
  const al=Math.min(a.length,200),bl=Math.min(b.length,200);
  const sa=a.substring(0,al),sb=b.substring(0,bl);
  const m=sa.length,n=sb.length;
  let prev=new Array(n+1);
  for(let j=0;j<=n;j++)prev[j]=j;
  for(let i=1;i<=m;i++){
    const curr=new Array(n+1);
    curr[0]=i;
    for(let j=1;j<=n;j++){
      curr[j]=sa[i-1]===sb[j-1]?prev[j-1]:1+Math.min(prev[j-1],prev[j],curr[j-1]);
    }
    prev=curr;
  }
  return 1-(prev[n]/Math.max(m,n));
}

function highlightText(text,queryTokens){
  if(!queryTokens||!queryTokens.length)return escHtml(text);
  const esc=escHtml(text);
  const ct=queryTokens.filter(t=>!STOP.has(t)&&t.length>2);
  if(!ct.length)return esc;
  const pat=ct.map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|');
  return esc.replace(new RegExp(`\\b(${pat})`,'gi'),'<mark>$1</mark>');
}

// Generic index builder for any set of text passages
function buildSearchEngine(passages) {
  // passages: [{id, text, meta}]
  const windows = [];
  const invIdx = {};
  const idfMap = {};

  // Build windows (1,3,5 line spans)
  for (const sz of [1,3,5]) {
    for (let i = 0; i <= passages.length - sz; i++) {
      const slice = passages.slice(i, i+sz);
      const text = slice.map(p=>p.text).join(' ');
      const tokens = tokenize(text);
      const wordSet = new Set(tokens);
      const bigrams = makeBigrams(tokens);
      windows.push({
        idx: windows.length, size:sz,
        startIdx: slice[0].idx, endIdx: slice[slice.length-1].idx,
        meta: slice[0].meta, endMeta: slice[slice.length-1].meta,
        text, tokens, wordSet, bigramSet: bigrams,
        passageIds: slice.map(p=>p.idx)
      });
    }
  }

  // Inverted index
  for (let i=0;i<windows.length;i++){
    for(const w of windows[i].wordSet){
      if(!invIdx[w])invIdx[w]=[];
      invIdx[w].push(i);
    }
  }
  // IDF
  const N=windows.length;
  for(const w in invIdx) idfMap[w]=Math.log(N/(1+invIdx[w].length));

  return {windows, invIdx, idfMap};
}

function searchEngine(engine, query) {
  const qTokens = tokenize(query);
  const qWordSet = new Set(qTokens);
  const qContent = contentWords(qTokens);
  const qNorm = normalize(query);
  const qBigrams = makeBigrams(qTokens);

  // Candidate retrieval
  const cands = new Set();
  for(const w of qTokens){
    const p=engine.invIdx[w];
    if(p)for(const i of p)cands.add(i);
  }

  // Raw score each candidate
  const W = getWeights();
  let results = [];
  for(const idx of cands){
    const win = engine.windows[idx];
    const wordDice = diceCoeff(qWordSet, win.wordSet);
    const bigramDice = diceCoeff(qBigrams, win.bigramSet);
    const matched = new Set();
    for(const w of qContent) if(win.wordSet.has(w)) matched.add(w);
    const idf = idfScoreFn(qContent, matched, engine.idfMap);
    const winNorm = normalize(win.text);
    let exactBonus = 0;
    if(qNorm.length>10 && winNorm.includes(qNorm)) exactBonus=1;
    else if(qNorm.length>5){
      const h=Math.floor(qNorm.length/2);
      if(qNorm.substring(0,h).length>8&&winNorm.includes(qNorm.substring(0,h)))exactBonus=0.4;
      if(qNorm.substring(h).length>8&&winNorm.includes(qNorm.substring(h)))exactBonus=Math.max(exactBonus,0.4);
    }
    const levScore = W.charBigram>0 ? levenshteinNorm(qNorm, winNorm) : 0;
    if(matched.size>0||exactBonus>0){
      results.push({...win, wordDice, bigramDice, levScore, idf, exactBonus, matched, qTokens});
    }
  }
  if(!results.length) return [];

  // Normalize + weight
  const useNorm = document.getElementById('normToggle').checked;
  if(useNorm && results.length>1){
    let minD=Infinity,maxD=-Infinity,minB=Infinity,maxB=-Infinity,minL=Infinity,maxL=-Infinity,minI=Infinity,maxI=-Infinity,minE=Infinity,maxE=-Infinity;
    for(const r of results){
      if(r.wordDice<minD)minD=r.wordDice;if(r.wordDice>maxD)maxD=r.wordDice;
      if(r.bigramDice<minB)minB=r.bigramDice;if(r.bigramDice>maxB)maxB=r.bigramDice;
      if(r.levScore<minL)minL=r.levScore;if(r.levScore>maxL)maxL=r.levScore;
      if(r.idf<minI)minI=r.idf;if(r.idf>maxI)maxI=r.idf;
      if(r.exactBonus<minE)minE=r.exactBonus;if(r.exactBonus>maxE)maxE=r.exactBonus;
    }
    const rD=maxD-minD||1,rB=maxB-minB||1,rL=maxL-minL||1,rI=maxI-minI||1,rE=maxE-minE||1;
    for(const r of results) r.score=W.dice*((r.wordDice-minD)/rD)+W.bigram*((r.bigramDice-minB)/rB)+W.charBigram*((r.levScore-minL)/rL)+W.idf*((r.idf-minI)/rI)+W.exact*((r.exactBonus-minE)/rE);
  } else {
    for(const r of results) r.score=W.dice*r.wordDice+W.bigram*r.bigramDice+W.charBigram*r.levScore+W.idf*r.idf+W.exact*r.exactBonus;
  }

  results.sort((a,b)=>b.score-a.score);

  // Deduplicate
  const deduped=[], covered=new Set();
  for(const r of results){
    const c=Math.floor((r.startIdx+r.endIdx)/2);
    if(covered.has(c))continue;
    deduped.push(r);
    for(let l=r.startIdx;l<=r.endIdx;l++)covered.add(l);
    if(deduped.length>=50)break;
  }
  return deduped;
}

// ═══════════════════ BUILD INDEXES ═══════════════════
let billEngine, lawEngine;
let billPassages = [], lawPassages = [];

function initEngines() {
  const t0 = performance.now();

  // Bill passages
  for (const l of BILL) {
    billPassages.push({idx: billPassages.length, text: l.t, meta: {id:l.id, p:l.p, pl:l.pl}});
  }
  billEngine = buildSearchEngine(billPassages);

  // Law passages — flatten all law lines with statute metadata
  for (const law of LAWS) {
    for (let i=0; i<law.lines.length; i++) {
      lawPassages.push({
        idx: lawPassages.length,
        text: law.lines[i],
        meta: {stat:law.stat, title:law.title, cat:law.cat, lawId:law.id, lineIdx:i}
      });
    }
  }
  lawEngine = buildSearchEngine(lawPassages);

  const ms = (performance.now()-t0).toFixed(0);
  document.getElementById('stats').textContent = `${BILL.length} bill lines | ${LAWS.length} statutes | ${lawPassages.length} law lines | ${ms}ms`;
}

// ═══════════════════ MODE MANAGEMENT ═══════════════════
let currentMode = 'align';
let searchDirection = 'bill'; // 'bill' or 'laws'

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+mode).classList.add('active');

  if(mode==='bill'){searchDirection='bill';renderBillMode()}
  else if(mode==='laws'){searchDirection='laws';renderLawsMode()}
  else if(mode==='align'){renderAlignMode()}
  else{searchDirection='bill';renderSideMode()}

  updateDirIndicator();
}

function updateDirIndicator(){
  const el=document.getElementById('dirIndicator');
  el.textContent = searchDirection==='bill' ? 'in Bill' : 'in Laws';
  el.style.background = searchDirection==='bill' ? 'rgba(59,130,246,0.2)' : 'rgba(167,139,250,0.2)';
  el.style.color = searchDirection==='bill' ? 'var(--accent)' : 'var(--purple)';
}

// ═══════════════════ MODE 1: SEARCH BILL ═══════════════════
function renderBillMode(){
  const main=document.getElementById('mainLayout');
  main.innerHTML=`<div class="panel full-panel" id="leftPanel"></div><div class="resizer" id="resizer"></div><div class="panel results-sidebar" id="rightPanel"><div class="empty-state"><h3>Search Bill Text</h3><p>Type or paste law text, press <kbd>Enter</kbd></p></div></div>`;
  renderBillText('leftPanel');
  initResizer();
}

function renderBillText(containerId){
  const panel=document.getElementById(containerId);
  // Legend
  let html='<div class="legend">';
  html+='<div class="legend-item"><div class="legend-swatch" style="background:var(--new-law);opacity:0.6"></div>New/amended law text (underlined)</div>';
  html+='<div class="legend-item"><div class="legend-swatch" style="background:var(--orange);opacity:0.6"></div>Mixed</div>';
  html+='<div class="legend-item"><div class="legend-swatch" style="background:transparent;border:1px solid var(--muted)"></div>Operational/procedural</div>';
  html+='</div>';
  let cp=0; let cs=-1;
  for(const l of BILL){
    if(l.p!==cp){cp=l.p;html+=`<div class="page-marker" id="pg-${containerId}-${cp}">PAGE ${cp}</div>`}
    // Section marker when section changes
    if(l.s!=null && l.s!==cs){
      cs=l.s;
      const stLabel = (l.st||'').replace(/_/g,' ');
      html+=`<div class="section-marker" id="sec-${containerId}-${cs}">Section ${cs} — ${stLabel}</div>`;
    }
    const pl=l.pl!=null?l.pl:'';
    const fmtClass = l.f==='new'?'fmt-new':l.f==='mixed'?'fmt-mixed':'fmt-plain';
    const ltClass = l.lt==='section_header'?'lt-section-header':l.lt==='statute_header'?'lt-statute-header':'';
    html+=`<div class="text-line ${fmtClass} ${ltClass}" id="bl-${containerId}-${l.id}" data-gid="${l.id}"><span class="line-num">${pl}</span><span class="line-text">${escHtml(l.t)}</span></div>`;
  }
  panel.innerHTML=html;
}

// ═══════════════════ MODE 2: SEARCH LAWS ═══════════════════
function renderLawsMode(){
  const main=document.getElementById('mainLayout');
  main.innerHTML=`<div class="panel full-panel" id="leftPanel"></div><div class="resizer" id="resizer"></div><div class="panel results-sidebar" id="rightPanel"><div class="empty-state"><h3>Search Law Text</h3><p>Type or paste bill text, press <kbd>Enter</kbd></p></div></div>`;
  renderAllLawsText('leftPanel');
  initResizer();
}

function renderAllLawsText(containerId){
  const panel=document.getElementById(containerId);
  let html='';let gIdx=0;
  for(const law of LAWS){
    html+=`<div class="law-marker" id="law-${containerId}-${law.id}">${escHtml(law.stat)} -- ${escHtml(law.title)} <span style="font-weight:400;opacity:0.7">[${escHtml(law.cat)}]</span></div>`;

      html+=`<div class="text-line" id="ll-${containerId}-${gIdx}" data-gidx="${gIdx}"><span class="line-num">${i+1}</span><span class="line-text">${escHtml(law.lines[i])}</span></div>`;
